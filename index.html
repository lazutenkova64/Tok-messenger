<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Thunder - Pay Anywhere Cascade Slot</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --gold: #ffd700;
            --red: #e63946;
            --dark-gold: #b8860b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a0a00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
            user-select: none;
            -webkit-user-select: none;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(255, 180, 0, 0.2) 0%, transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(255, 100, 0, 0.3) 0%, transparent 50%), radial-gradient(ellipse at 20% 80%, rgba(255, 200, 50, 0.15) 0%, transparent 40%), radial-gradient(ellipse at 80% 80%, rgba(255, 200, 50, 0.15) 0%, transparent 40%), linear-gradient(180deg, #1a0800 0%, #2d1500 20%, #3d1a00 40%, #2d1000 60%, #1a0500 80%, #0d0200 100%);
            background-attachment: fixed;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255, 150, 0, 0.03) 3px, rgba(255, 150, 0, 0.03) 4px), radial-gradient(circle at 50% 30%, rgba(255, 200, 50, 0.08) 0%, transparent 70%), radial-gradient(circle at 30% 70%, rgba(255, 180, 0, 0.05) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(255, 180, 0, 0.05) 0%, transparent 50%);
        }
        body::after {
            background: radial-gradient(circle at 50% 15%, rgba(255, 215, 0, 0.2) 0%, transparent 40%), radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05) 0%, transparent 60%);
        }
        body.zeus-rage {
            animation: rageBg 0.6s ease-in-out forwards;
        }
        @keyframes rageBg {
            0% {
                background: #1a0a00;
            }
            50% {
                background: #3d0a0a;
            }
            100% {
                background: #2a0500;
            }
        }
        .golden-gates {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 300px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }
        .golden-gates .gate-left,
        .golden-gates .gate-right {
            position: absolute;
            width: 50px;
            height: 280px;
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.4) 0%, rgba(180, 130, 0, 0.35) 30%, rgba(255, 215, 0, 0.4) 60%, rgba(180, 130, 0, 0.35) 100%);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.4), 0 0 80px rgba(255, 150, 0, 0.2);
        }
        .golden-gates .gate-left {
            left: 100px;
            border-right: 3px solid rgba(255, 215, 0, 0.6);
        }
        .golden-gates .gate-right {
            right: 100px;
            border-left: 3px solid rgba(255, 215, 0, 0.6);
        }
        .golden-gates .gate-arch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 200px;
            border: 8px solid rgba(255, 215, 0, 0.5);
            border-radius: 200px 200px 0 0;
            border-bottom: none;
            box-shadow: 0 0 60px rgba(255, 200, 0, 0.5), 0 0 100px rgba(255, 150, 0, 0.3);
        }
        .fire-sparks {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .fire-spark {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkFloat 3s ease-in-out infinite;
            box-shadow: 0 0 6px #ffd700, 0 0 12px #ff8c00;
        }
        @keyframes sparkFloat {
            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            50% {
                transform: translateY(-60px) translateX(20px);
                opacity: 0.7;
            }
            80% {
                opacity: 0.3;
            }
        }
        .game-container {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: stretch;
            padding: 20px;
            z-index: 1;
        }
        .left-panel {
            width: 85px;
            background: linear-gradient(180deg, rgba(30, 15, 0, 0.9) 0%, rgba(20, 8, 0, 0.95) 100%);
            border: 2px solid rgba(180, 130, 0, 0.6);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 10px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 150, 0, 0.2);
        }
        .left-panel.inactive {
            opacity: 0.3;
            border-color: rgba(100, 70, 0, 0.4);
        }
        .left-panel .panel-label {
            color: #cca300;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        .left-panel .multiplier-counter {
            color: #ffd700;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            transition: all 0.2s;
        }
        .left-panel .multiplier-counter.pulse {
            animation: counterPulse 0.3s ease-out;
        }
        @keyframes counterPulse {
            0% {
                transform: scale(1.6);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }
        .main-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1;
        }
        .game-header {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 10px;
        }
        .game-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 15px rgba(255, 200, 0, 0.5));
        }
        .freespin-badge {
            background: linear-gradient(135deg, #e63946, #ff4500);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            animation: badgeGlow 1.5s ease-in-out infinite;
            display: none;
            box-shadow: 0 0 20px rgba(255, 50, 0, 0.5);
        }
        .freespin-badge.active {
            display: block;
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(255, 50, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 35px rgba(255, 80, 0, 0.9);
            }
        }
        .spin-total-display {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 22px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        .spin-total-display.visible {
            opacity: 1;
        }
        .spin-total-display.multiplying {
            animation: multiplyFlash 0.6s ease-out;
        }
        @keyframes multiplyFlash {
            0% {
                transform: translateX(-50%) scale(2);
                color: #fff;
            }
            100% {
                transform: translateX(-50%) scale(1);
                color: #ffd700;
            }
        }
        canvas#gameCanvas {
            border: 3px solid rgba(180, 130, 0, 0.6);
            border-radius: 15px;
            background: linear-gradient(180deg, rgba(10, 5, 0, 0.85) 0%, rgba(20, 10, 0, 0.9) 100%);
            box-shadow: 0 0 50px rgba(255, 150, 0, 0.3), 0 0 100px rgba(255, 100, 0, 0.15), inset 0 0 80px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s;
        }
        body.zeus-rage canvas#gameCanvas {
            box-shadow: 0 0 80px rgba(255, 30, 0, 0.7), 0 0 120px rgba(200, 30, 0, 0.4), inset 0 0 100px rgba(200, 20, 0, 0.3);
            border-color: #8b0000;
        }
        .right-panel {
            width: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zeus-canvas-container {
            width: 170px;
            height: 420px;
            position: relative;
        }
        #zeusCanvas {
            width: 170px;
            height: 420px;
            border: none;
            background: transparent;
            box-shadow: none;
            border-radius: 0;
        }
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(180deg, rgba(30, 15, 0, 0.9), rgba(20, 8, 0, 0.95));
            border: 2px solid rgba(180, 130, 0, 0.5);
            border-radius: 40px;
            padding: 14px 22px;
            box-shadow: 0 0 30px rgba(255, 150, 0, 0.2);
            flex-wrap: wrap;
            justify-content: center;
        }
        .win-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .win-label {
            color: #cca300;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .win-amount {
            color: #ffd700;
            font-size: 34px;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            transition: all 0.1s;
            min-width: 120px;
            text-align: center;
        }
        .win-amount.counting {
            animation: winCount 0.1s ease-out;
        }
        @keyframes winCount {
            0% {
                transform: scale(1.15);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }
        .balance-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .balance-label {
            color: #cca300;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .balance-amount {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .bet-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bet-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bet-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .bet-amount {
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
        }
        .bet-label-small {
            color: #cca300;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-spin {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #e63946, #c0392b);
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 35px rgba(230, 57, 70, 0.5);
            text-transform: uppercase;
        }
        .btn-spin:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.8);
        }
        .btn-spin:active {
            transform: scale(0.95);
        }
        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.2);
        }
        .btn-buy-bonus {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a0500;
            border: 2px solid #ffd700;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.4);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-buy-bonus:hover {
            box-shadow: 0 0 25px rgba(255, 200, 0, 0.7);
            transform: scale(1.03);
        }
        .btn-buy-bonus:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-fast {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-fast:hover {
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .btn-fast.active {
            background: #ffd700;
            color: #1a0500;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }
        .btn-auto {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-auto:hover {
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .btn-auto.active {
            background: #ffd700;
            color: #1a0500;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }
        .auto-spins-select {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(30, 15, 0, 0.95), rgba(20, 8, 0, 0.95));
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 10px;
            display: none;
            z-index: 10;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            width: 180px;
            box-shadow: 0 0 30px rgba(255, 150, 0, 0.4);
        }
        .auto-spins-select.show {
            display: flex;
        }
        .auto-spin-option {
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 5px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.2s;
        }
        .auto-spin-option:hover {
            background: #ffd700;
            color: #1a0500;
        }
        .win-float-text {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            font-weight: 900;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
            animation: winFloatUp 1.5s ease-out forwards;
            white-space: nowrap;
        }
        @keyframes winFloatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            60% {
                opacity: 0.8;
                transform: translateY(-50px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.8);
            }
        }
        .big-win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .big-win-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .big-win-content {
            text-align: center;
            animation: bigWinIn 0.5s ease-out;
        }
        @keyframes bigWinIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .big-win-amount {
            font-size: 80px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.9), 0 0 120px rgba(255, 150, 0, 0.5);
            animation: bigWinPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes bigWinPulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }
        .big-win-label {
            font-size: 30px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin-top: 10px;
        }
        .big-win-sparks {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 201;
        }
        .big-spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            animation: bigSparkFly 1.5s ease-out forwards;
            box-shadow: 0 0 10px #ffd700, 0 0 20px #ff8c00;
        }
        @keyframes bigSparkFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
        .bonus-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .bonus-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .bonus-popup {
            background: linear-gradient(135deg, #2a1500, #3d1a00);
            border: 3px solid #ffd700;
            border-radius: 22px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 0 90px rgba(255, 215, 0, 0.6);
            animation: bonusIn 0.5s ease-out;
            cursor: pointer;
        }
        @keyframes bonusIn {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .bonus-popup h2 {
            color: #ffd700;
            font-size: 38px;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.9);
        }
        .bonus-popup .bonus-spins {
            color: #fff;
            font-size: 65px;
            font-weight: 900;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.6);
        }
        .bonus-popup .bonus-subtitle {
            color: #e0c080;
            font-size: 17px;
            margin-top: 12px;
        }
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            .left-panel {
                width: 100%;
                flex-direction: row;
                height: 65px;
                padding: 10px;
            }
            .right-panel {
                display: none;
            }
            canvas#gameCanvas {
                width: 100%;
                height: auto;
            }
            .golden-gates {
                display: none;
            }
            .bottom-panel {
                gap: 8px;
                padding: 10px 14px;
            }
            .btn-spin {
                width: 65px;
                height: 65px;
                font-size: 14px;
            }
            .big-win-amount {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="golden-gates"><div class="gate-left"></div><div class="gate-right"></div><div class="gate-arch"></div></div>
    <div class="fire-sparks" id="fireSparks"></div>
    <div class="big-win-overlay" id="bigWinOverlay"><div class="big-win-content"><div class="big-win-amount" id="bigWinAmount"></div><div class="big-win-label" id="bigWinLabel"></div></div></div>
    <div class="big-win-sparks" id="bigWinSparks"></div>
    <div class="bonus-overlay" id="bonusOverlay"><div class="bonus-popup" id="bonusPopup"><h2>⚡ ЯРОСТЬ ЗЕВСА! ⚡</h2><div class="bonus-spins" id="bonusSpinsDisplay">15</div><div class="bonus-subtitle">FREE SPINS</div><div class="bonus-subtitle" style="margin-top:6px;font-size:14px;">Нажмите для запуска</div></div></div>
    <div class="game-container">
        <div class="left-panel inactive" id="leftPanel"><div class="panel-label">Total<br>Multiplier</div><div class="multiplier-counter" id="totalMultiplierDisplay">1x</div></div>
        <div class="main-area" id="mainArea">
            <div class="game-header"><div class="game-title">⚡ ZEUS THUNDER ⚡</div><div class="freespin-badge" id="freespinBadge">FREE SPINS <span id="freespinCountDisplay">15</span></div></div>
            <div class="spin-total-display" id="spinTotalDisplay"></div>
            <canvas id="gameCanvas" width="630" height="525"></canvas>
            <div class="auto-spins-select" id="autoSpinsSelect"><span class="auto-spin-option" data-spins="5">5</span><span class="auto-spin-option" data-spins="10">10</span><span class="auto-spin-option" data-spins="20">20</span><span class="auto-spin-option" data-spins="40">40</span><span class="auto-spin-option" data-spins="50">50</span><span class="auto-spin-option" data-spins="100">100</span></div>
            <div class="bottom-panel">

                        groups.push({ symbol: sym, cells: cellMap[sym], count, payout }); } } return groups; }

                ctx.globalAlpha = 1;
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0; }
            drawZeusIcon(ctx, size) { const s = size * 0.6;
                ctx.fillStyle = '#f5e6d3';
                ctx.beginPath();
                ctx.arc(0, -s * 0.05, s * 0.35, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#e8d5c0';
                ctx.beginPath();
                ctx.moveTo(-s * 0.2, s * 0.08);
                ctx.quadraticCurveTo(0, s * 0.5, s * 0.2, s * 0.08);
                ctx.quadraticCurveTo(0, s * 0.2, -s * 0.2, s * 0.08);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(-s * 0.2, -s * 0.35);
                ctx.lineTo(-s * 0.15, -s * 0.5);
                ctx.lineTo(-s * 0.02, -s * 0.3);
                ctx.lineTo(0, -s * 0.55);
                ctx.lineTo(s * 0.02, -s * 0.3);
                ctx.lineTo(s * 0.15, -s * 0.5);
                ctx.lineTo(s * 0.2, -s * 0.35);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#1a1a3a';
                ctx.beginPath();
                ctx.arc(-s * 0.08, -s * 0.12, s * 0.04, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.08, -s * 0.12, s * 0.04, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.font = `${s*0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('⚡', 0, -s * 0.5); }
            lightenColor(hex, p) { const n = parseInt(hex.replace('#', ''), 16),
                    a = Math.round(2.55 * p); return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xFF)+a)},${Math.min(255,(n&0xFF)+a)})`; }
        }

        const canvas = document.getElementById('gameCanvas'),
            ctx = canvas.getContext('2d');
        const zeusCanvas = document.getElementById('zeusCanvas'),
            zctx = zeusCanvas.getContext('2d');
        const engine = new SlotEngine();
        if (!ctx.roundRect) ctx.roundRect = function(x, y, w, h, r) { if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
            ctx.beginPath();
            ctx.moveTo(x + r.tl, y);
            ctx.lineTo(x + w - r.tr, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
            ctx.lineTo(x + w, y + h - r.br);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
            ctx.lineTo(x + r.bl, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
            ctx.lineTo(x, y + r.tl);
            ctx.quadraticCurveTo(x, y, x + r.tl, y);
            ctx.closePath(); };
        createFireSparks();
        document.getElementById('btnSpin').addEventListener('click', () => { if (!engine.isProcessing && engine.state === GameStateEnum.IDLE && (engine.balance >= engine.bet || engine.isFreeSpins)) engine.spin(); });
        document.getElementById('betUp').addEventListener('click', () => engine.increaseBet());
        document.getElementById('betDown').addEventListener('click', () => engine.decreaseBet());
        document.getElementById('btnBuyBonus').addEventListener('click', () => engine.buyBonus());
        document.getElementById('btnFast').addEventListener('click', () => engine.toggleFastMode());
        document.getElementById('btnAuto').addEventListener('click', () => { document.getElementById('autoSpinsSelect').classList.toggle('show'); });
        document.querySelectorAll('.auto-spin-option').forEach(el => { el.addEventListener('click', () => { const spins = parseInt(el.dataset.spins); if (spins > 0) engine.startAutoSpins(spins); }); });

        function gameLoop() { engine.updateParticles();
            engine.render(ctx);
            drawZeusFigure(zctx, engine.zeusArmRaised, engine.zeusLightningActive, engine.zeusTridentRaised, engine.zeusMouthOpen);
            engine.updateSpinButton();
            document.getElementById('betUp').disabled = engine.betIndex >= BET_OPTIONS.length - 1 || engine.isProcessing || engine.autoSpinsRemaining > 0;
            document.getElementById('betDown').disabled = engine.betIndex <= 0 || engine.isProcessing || engine.autoSpinsRemaining > 0;
            document.getElementById('btnBuyBonus').disabled = engine.isProcessing || engine.isFreeSpins || engine.balance < engine.bet * 100 || engine.autoSpinsRemaining > 0; if (engine.activeOrbs.some(o => o.multiplier >= 50)) { if (!document.body.classList.contains('zeus-rage')) { document.body.classList.add('zeus-rage');
                    setTimeout(() => document.body.classList.remove('zeus-rage'), 2500); } }
            requestAnimationFrame(gameLoop); }
        engine.updateBetDisplay();
        engine.updateWinDisplay();
        engine.updateBalanceDisplay();
        engine.updateSpinButton();
        engine.setWinLabel('Выигрыш');
        drawZeusFigure(zctx, false, false, false, false);
        gameLoop();
        console.log('⚡ ZEUS THUNDER - Полная версия!');
        console.log('🔱 Трезубец + рот Зевса реагируют на иксы');
        console.log('💰 Бонус: икс умножает только раунд где выпал');
        console.log('🏷️ "Последний выигрыш" / "Выигрыш"');
    </script>
</body>
