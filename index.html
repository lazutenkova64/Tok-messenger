<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Thunder - Cascade Slot</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --gold: #ffd700;
            --red: #e63946;
            --dark-gold: #b8860b;
            --cell-size: 85px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
            user-select: none;
            -webkit-user-select: none;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(255, 180, 0, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 100, 0, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(255, 200, 50, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 200, 50, 0.15) 0%, transparent 40%),
                linear-gradient(180deg,
                    #1a0800 0%,
                    #2d1500 20%,
                    #3d1a00 40%,
                    #2d1000 60%,
                    #1a0500 80%,
                    #0d0200 100%);
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(255, 150, 0, 0.03) 3px,
                    rgba(255, 150, 0, 0.03) 4px),
                radial-gradient(circle at 50% 30%, rgba(255, 200, 50, 0.08) 0%, transparent 70%),
                radial-gradient(circle at 30% 70%, rgba(255, 180, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(255, 180, 0, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 50% 15%, rgba(255, 215, 0, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body.zeus-rage {
            animation: rageBg 0.6s ease-in-out forwards;
        }

        @keyframes rageBg {
            0% {
                background: #1a0a00;
            }
            50% {
                background: #3d0a0a;
            }
            100% {
                background: #2a0500;
            }
        }

        .golden-gates {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 300px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .golden-gates .gate-left,
        .golden-gates .gate-right {
            position: absolute;
            width: 50px;
            height: 280px;
            background: linear-gradient(180deg,
                    rgba(255, 215, 0, 0.4) 0%,
                    rgba(180, 130, 0, 0.35) 30%,
                    rgba(255, 215, 0, 0.4) 60%,
                    rgba(180, 130, 0, 0.35) 100%);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.4), 0 0 80px rgba(255, 150, 0, 0.2);
        }

        .golden-gates .gate-left {
            left: 100px;
            border-right: 3px solid rgba(255, 215, 0, 0.6);
        }

        .golden-gates .gate-right {
            right: 100px;
            border-left: 3px solid rgba(255, 215, 0, 0.6);
        }

        .golden-gates .gate-arch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 200px;
            border: 8px solid rgba(255, 215, 0, 0.5);
            border-radius: 200px 200px 0 0;
            border-bottom: none;
            box-shadow: 0 0 60px rgba(255, 200, 0, 0.5), 0 0 100px rgba(255, 150, 0, 0.3);
        }

        .fire-sparks {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
        }

        .fire-spark {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkFloat 3s ease-in-out infinite;
            box-shadow: 0 0 6px #ffd700, 0 0 12px #ff8c00;
        }

        @keyframes sparkFloat {
            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            50% {
                transform: translateY(-60px) translateX(20px);
                opacity: 0.7;
            }
            80% {
                opacity: 0.3;
            }
        }

        .game-container {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: stretch;
            padding: 20px;
            z-index: 1;
        }

        .left-panel {
            width: 85px;
            background: linear-gradient(180deg,
                    rgba(30, 15, 0, 0.9) 0%,
                    rgba(20, 8, 0, 0.95) 100%);
            border: 2px solid rgba(180, 130, 0, 0.6);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 10px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 150, 0, 0.2);
        }

        .left-panel.inactive {
            opacity: 0.3;
            border-color: rgba(100, 70, 0, 0.4);
        }

        .left-panel .panel-label {
            color: #cca300;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .left-panel .multiplier-counter {
            color: #ffd700;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            transition: all 0.2s;
        }

        .left-panel .multiplier-counter.pulse {
            animation: counterPulse 0.3s ease-out;
        }

        @keyframes counterPulse {
            0% {
                transform: scale(1.6);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        .main-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 10px;
        }

        .game-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 15px rgba(255, 200, 0, 0.5));
        }

        .freespin-badge {
            background: linear-gradient(135deg, #e63946, #ff4500);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            animation: badgeGlow 1.5s ease-in-out infinite;
            display: none;
            box-shadow: 0 0 20px rgba(255, 50, 0, 0.5);
        }

        .freespin-badge.active {
            display: block;
        }

        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(255, 50, 0, 0.5);
            }
            50% {
                box-shadow: 0 0 35px rgba(255, 80, 0, 0.9);
            }
        }

        canvas {
            border: 3px solid rgba(180, 130, 0, 0.6);
            border-radius: 15px;
            background: linear-gradient(180deg,
                    rgba(10, 5, 0, 0.85) 0%,
                    rgba(20, 10, 0, 0.9) 100%);
            box-shadow: 0 0 50px rgba(255, 150, 0, 0.3),
                0 0 100px rgba(255, 100, 0, 0.15),
                inset 0 0 80px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s;
        }

        body.zeus-rage canvas {
            box-shadow: 0 0 80px rgba(255, 30, 0, 0.7),
                0 0 120px rgba(200, 30, 0, 0.4),
                inset 0 0 100px rgba(200, 20, 0, 0.3);
            border-color: #8b0000;
        }

        .right-panel {
            width: 160px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zeus-canvas-container {
            width: 150px;
            height: 400px;
            position: relative;
        }

        #zeusCanvas {
            width: 150px;
            height: 400px;
            border: none;
            background: transparent;
            box-shadow: none;
            border-radius: 0;
        }

        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 20px;
            background: linear-gradient(180deg,
                    rgba(30, 15, 0, 0.9),
                    rgba(20, 8, 0, 0.95));
            border: 2px solid rgba(180, 130, 0, 0.5);
            border-radius: 40px;
            padding: 14px 28px;
            box-shadow: 0 0 30px rgba(255, 150, 0, 0.2);
        }

        .win-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .win-label {
            color: #cca300;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .win-amount {
            color: #ffd700;
            font-size: 34px;
            font-weight: 900;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            transition: all 0.1s;
            min-width: 140px;
            text-align: center;
        }

        .win-amount.counting {
            animation: winCount 0.1s ease-out;
        }

        @keyframes winCount {
            0% {
                transform: scale(1.15);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bet-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bet-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .bet-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .bet-amount {
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            min-width: 70px;
            text-align: center;
        }
        .bet-label-small {
            color: #cca300;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-spin {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #e63946, #c0392b);
            color: #fff;
            font-size: 19px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 35px rgba(230, 57, 70, 0.5);
            text-transform: uppercase;
        }
        .btn-spin:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.8);
        }
        .btn-spin:active {
            transform: scale(0.95);
        }
        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.2);
        }

        .btn-buy-bonus {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a0500;
            border: 2px solid #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.4);
            transition: all 0.2s;
        }
        .btn-buy-bonus:hover {
            box-shadow: 0 0 25px rgba(255, 200, 0, 0.7);
            transform: scale(1.03);
        }
        .btn-buy-bonus:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .orb-popup {
            position: absolute;
            font-size: 24px;
            font-weight: 900;
            pointer-events: none;
            animation: orbFloat 1.8s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.9);
        }

        @keyframes orbFloat {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            25% {
                transform: scale(1.5);
                opacity: 1;
            }
            70% {
                transform: scale(1);
                opacity: 0.9;
            }
            100% {
                transform: scale(0.6);
                opacity: 0;
            }
        }

        .bonus-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .bonus-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .bonus-popup {
            background: linear-gradient(135deg, #2a1500, #3d1a00);
            border: 3px solid #ffd700;
            border-radius: 22px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 0 90px rgba(255, 215, 0, 0.6);
            animation: bonusIn 0.5s ease-out;
        }
        @keyframes bonusIn {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .bonus-popup h2 {
            color: #ffd700;
            font-size: 38px;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.9);
        }
        .bonus-popup .bonus-spins {
            color: #fff;
            font-size: 65px;
            font-weight: 900;
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.6);
        }
        .bonus-popup .bonus-subtitle {
            color: #e0c080;
            font-size: 17px;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            .left-panel {
                width: 100%;
                flex-direction: row;
                height: 65px;
                padding: 10px;
            }
            .right-panel {
                display: none;
            }
            canvas {
                width: 100%;
                height: auto;
            }
            .golden-gates {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="golden-gates">
        <div class="gate-left"></div>
        <div class="gate-right"></div>
        <div class="gate-arch"></div>
    </div>

    <div class="fire-sparks" id="fireSparks"></div>

    <div class="bonus-overlay" id="bonusOverlay">
        <div class="bonus-popup">
            <h2>⚡ ЯРОСТЬ ЗЕВСА! ⚡</h2>
            <div class="bonus-spins" id="bonusSpinsDisplay">15</div>
            <div class="bonus-subtitle">FREE SPINS</div>
            <div class="bonus-subtitle" style="margin-top: 6px; font-size: 14px;">Накопительный множитель активирован!</div>
        </div>
    </div>

    <div class="game-container">
        <div class="left-panel inactive" id="leftPanel">
            <div class="panel-label">Total<br>Multiplier</div>
            <div class="multiplier-counter" id="totalMultiplierDisplay">1x</div>
        </div>

        <div class="main-area" id="mainArea">
            <div class="game-header">
                <div class="game-title">⚡ ZEUS THUNDER ⚡</div>
                <div class="freespin-badge" id="freespinBadge">
                    FREE SPINS <span id="freespinCountDisplay">15</span>
                </div>
            </div>
            <canvas id="gameCanvas" width="630" height="525"></canvas>
            <div class="bottom-panel">
                <div class="win-display">
                    <div class="win-label">Выигрыш</div>
                    <div class="win-amount" id="winDisplay">0</div>
                </div>
                <div class="bet-controls">
                    <div>
                        <div class="bet-label-small">Ставка</div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="bet-btn" id="betDown">−</button>
                            <span class="bet-amount" id="betDisplay">100</span>
                            <button class="bet-btn" id="betUp">+</button>
                        </div>
                    </div>
                </div>
                <button class="btn-buy-bonus" id="btnBuyBonus" title="Купить бонус (100x ставки)">
                    BUY BONUS
                </button>
                <button class="btn-spin" id="btnSpin">SPIN</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="zeus-canvas-container">
                <canvas id="zeusCanvas" width="150" height="400"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ==================== КОНСТАНТЫ ====================
        const COLS = 6;
        const ROWS = 5;
        const CELL_SIZE = 85;
        const GRID_OFFSET_X = 45;
        const GRID_OFFSET_Y = 45;
        const SYMBOL_SIZE = 52;
        const CASCADE_DELAY = 2000;
        const MIN_BET = 50;
        const BET_OPTIONS = [50, 100, 200, 300, 400, 500, 1000, 2000, 5000];

        const SYMBOLS = {
            BLUE_CRYSTAL: 'blue_crystal',
            GREEN_CRYSTAL: 'green_crystal',
            YELLOW_CRYSTAL: 'yellow_crystal',
            PURPLE_CRYSTAL: 'purple_crystal',
            RED_CRYSTAL: 'red_crystal',
            CUP: 'cup',
            RING: 'ring',
            HOURGLASS: 'hourglass',
            CROWN: 'crown',
            ZEUS_SCATTER: 'zeus_scatter'
        };

        const SYMBOL_PROBABILITIES = [
            { symbol: SYMBOLS.BLUE_CRYSTAL, prob: 20 },
            { symbol: SYMBOLS.GREEN_CRYSTAL, prob: 18 },
            { symbol: SYMBOLS.YELLOW_CRYSTAL, prob: 17 },
            { symbol: SYMBOLS.PURPLE_CRYSTAL, prob: 13 },
            { symbol: SYMBOLS.RED_CRYSTAL, prob: 12 },
            { symbol: SYMBOLS.CUP, prob: 7 },
            { symbol: SYMBOLS.RING, prob: 5 },
            { symbol: SYMBOLS.HOURGLASS, prob: 3.5 },
            { symbol: SYMBOLS.CROWN, prob: 2.5 },
            { symbol: SYMBOLS.ZEUS_SCATTER, prob: 2 }
        ];

        // Выплаты: % от ставки
        const PAYTABLE_MIN = {
            blue_crystal: 0.25,
            green_crystal: 0.40,
            yellow_crystal: 0.50,
            purple_crystal: 0.80,
            red_crystal: 1.0,
            cup: 1.5,
            ring: 2.0,
            hourglass: 2.5,
            crown: 10,
            zeus_scatter: 100
        };

        const PAYTABLE_MAX = {
            blue_crystal: 2,
            green_crystal: 4,
            yellow_crystal: 5,
            purple_crystal: 8,
            red_crystal: 10,
            cup: 12,
            ring: 15,
            hourglass: 25,
            crown: 50,
            zeus_scatter: 100
        };

        const ORB_TIERS = [
            { min: 2, max: 5, prob: 70 },
            { min: 6, max: 15, prob: 20 },
            { min: 20, max: 50, prob: 8 },
            { min: 100, max: 500, prob: 2 }
        ];

        const SYMBOL_COLORS = {
            blue_crystal: '#3498db',
            green_crystal: '#2ecc71',
            yellow_crystal: '#f1c40f',
            purple_crystal: '#9b59b6',
            red_crystal: '#e74c3c',
            cup: '#1abc9c',
            ring: '#e67e22',
            hourglass: '#f39c12',
            crown: '#e74c3c',
            zeus_scatter: '#ffd700'
        };

        const SYMBOL_EMOJIS = {
            blue_crystal: '💎',
            green_crystal: '💚',
            yellow_crystal: '💛',
            purple_crystal: '💜',
            red_crystal: '❤️',
            cup: '🏆',
            ring: '💍',
            hourglass: '⏳',
            crown: '👑',
            zeus_scatter: '⚡'
        };

        const GameStateEnum = {
            IDLE: 'IDLE',
            SPINNING: 'SPINNING',
            CASCADING: 'CASCADING',
            WIN_ANIMATION: 'WIN_ANIMATION',
            BONUS_TRANSITION: 'BONUS_TRANSITION'
        };

        // ==================== ГЕНЕРАЦИЯ ИСКР ====================
        function createFireSparks() {
            const container = document.getElementById('fireSparks');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const spark = document.createElement('div');
                spark.className = 'fire-spark';
                spark.style.left = Math.random() * 100 + '%';
                spark.style.top = Math.random() * 100 + '%';
                spark.style.animationDelay = Math.random() * 5 + 's';
                spark.style.animationDuration = (2 + Math.random() * 4) + 's';
                spark.style.width = (2 + Math.random() * 4) + 'px';
                spark.style.height = spark.style.width;
                container.appendChild(spark);
            }
        }

        // ==================== ОТРИСОВКА ЗЕВСА ====================
        function drawZeusFigure(zctx, armRaised, lightningActive) {
            const w = 150;
            const h = 400;
            zctx.clearRect(0, 0, w, h);

            // Облако под ногами
            zctx.fillStyle = 'rgba(255,255,255,0.12)';
            zctx.beginPath();
            zctx.ellipse(75, 380, 55, 18, 0, 0, Math.PI * 2);
            zctx.fill();
            zctx.fillStyle = 'rgba(255,255,255,0.08)';
            zctx.beginPath();
            zctx.ellipse(65, 375, 35, 14, 0, 0, Math.PI * 2);
            zctx.fill();
            zctx.beginPath();
            zctx.ellipse(85, 373, 40, 16, 0, 0, Math.PI * 2);
            zctx.fill();

            // Ноги в сандалиях
            zctx.fillStyle = '#c4956a';
            zctx.fillRect(52, 340, 18, 35);
            zctx.fillRect(80, 340, 18, 35);
            zctx.fillStyle = '#8B6914';
            zctx.beginPath();
            zctx.roundRect(48, 368, 26, 12, 6);
            zctx.fill();
            zctx.beginPath();
            zctx.roundRect(76, 368, 26, 12, 6);

        // ==================== ДВИЖОК СЛОТА ====================
        class SlotEngine {
            constructor() {
                this.grid = [];
                this.state = GameStateEnum.IDLE;
                this.bet = 100;
                this.betIndex = 1;
                this.totalWin = 0;
                this.displayedWin = 0;
                this.isProcessing = false;
                this.balance = 100000;
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;
                this.bonusTotalWin = 0;
                this.activeOrbs = [];
                this.particles = [];
                this.zeusArmRaised = false;
                this.zeusLightningActive = false;
                this.initGrid();
            }

            getRandomSymbolByProbability() {
                const rand = Math.random() * 100;
                let cumulative = 0;
                for (const entry of SYMBOL_PROBABILITIES) {
                    cumulative += entry.prob;
                    if (rand <= cumulative) {
                        return entry.symbol;
                    }
                }
                return SYMBOLS.BLUE_CRYSTAL;
            }

            getRandomOrbMultiplier() {
                const rand = Math.random() * 100;
                let cumulative = 0;
                for (const tier of ORB_TIERS) {
                    cumulative += tier.prob;
                    if (rand <= cumulative) {
                        const step = tier.max <= 15 ? 1 : (tier.max <= 50 ? 5 : 50);
                        const steps = Math.floor((tier.max - tier.min) / step) + 1;
                        return tier.min + Math.floor(Math.random() * steps) * step;
                    }
                }
                return 2;
            }

            initGrid() {
                this.grid = [];
                for (let r = 0; r < ROWS; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        this.grid[r][c] = this.createCell(r, c, this.getRandomSymbolByProbability());
                        this.grid[r][c].y = this.grid[r][c].targetY;
                        this.grid[r][c].scale = 1;
                        this.grid[r][c].opacity = 1;
                    }
                }
                this.clearOrbs();
            }

            createCell(r, c, symbol) {
                return {
                    symbol: symbol,
                    y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                    targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                    velocity: 0,
                    scale: 1,
                    opacity: 1,
                    isWinning: false,
                    isExploding: false,
                    hasOrb: false,
                    orbMultiplier: 1,
                    bounceOffset: 0,
                    rowPosition: r
                };
            }

            clearOrbs() {
                this.activeOrbs = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r] && this.grid[r][c]) {
                            this.grid[r][c].hasOrb = false;
                            this.grid[r][c].orbMultiplier = 1;
                        }
                    }
                }
            }

            getPayoutForCount(symbol, count) {
                if (symbol === SYMBOLS.ZEUS_SCATTER) {
                    if (count >= 6) return PAYTABLE_MAX.zeus_scatter * this.bet;
                    if (count >= 4) return 3 * this.bet;
                    return 0;
                }
                const minPay = PAYTABLE_MIN[symbol] || 0;
                const maxPay = PAYTABLE_MAX[symbol] || 0;
                const minCount = 8;
                const maxCount = 12;
                if (count < minCount) return 0;
                if (count >= maxCount) return maxPay * this.bet;
                // Линейная интерполяция между min и max
                const ratio = (count - minCount) / (maxCount - minCount);
                const payout = minPay + (maxPay - minPay) * ratio;
                return payout * this.bet;
            }

            findGroups() {
                const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
                const groups = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (visited[r][c]) continue;
                        if (!this.grid[r] || !this.grid[r][c]) continue;
                        const cell = this.grid[r][c];
                        if (!cell.symbol || cell.isExploding || cell.scale < 0.1) continue;
                        const symbol = cell.symbol;
                        const group = [];
                        const stack = [{ r, c }];
                        while (stack.length > 0) {
                            const { r: cr, c: cc } = stack.pop();
                            if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
                            if (visited[cr][cc]) continue;
                            if (!this.grid[cr] || !this.grid[cr][cc]) continue;
                            const checkCell = this.grid[cr][cc];
                            if (!checkCell.symbol || checkCell.symbol !== symbol) continue;
                            if (checkCell.isExploding || checkCell.scale < 0.1) continue;
                            visited[cr][cc] = true;
                            group.push({ r: cr, c: cc });
                            stack.push({ r: cr - 1, c: cc });
                            stack.push({ r: cr + 1, c: cc });
                            stack.push({ r: cr, c: cc - 1 });
                            stack.push({ r: cr, c: cc + 1 });
                        }
                        const minCount = symbol === SYMBOLS.ZEUS_SCATTER ? 4 : 8;
                        if (group.length >= minCount) {
                            const payout = this.getPayoutForCount(symbol, group.length);
                            groups.push({
                                symbol,
                                cells: group,
                                count: group.length,
                                payout: payout
                            });
                        }
                    }
                }
                return groups;
            }

            applyCascadeGravity() {
                let moved = false;
                for (let c = 0; c < COLS; c++) {
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (!this.grid[r]) this.grid[r] = [];
                        if (!this.grid[r][c]) this.grid[r][c] = this.createCell(r, c, null);
                        if (this.grid[r][c].symbol === null || this.grid[r][c].isExploding || this.grid[r][c].scale <
                            0.1) {
                            for (let above = r - 1; above >= 0; above--) {
                                if (this.grid[above] && this.grid[above][c] && this.grid[above][c].symbol !== null && !this
                                    .grid[above][c].isExploding && this.grid[above][c].scale > 0.1) {
                                    const from = this.grid[above][c];
                                    const to = this.grid[r][c];
                                    to.symbol = from.symbol;
                                    to.hasOrb = from.hasOrb;
                                    to.orbMultiplier = from.orbMultiplier;
                                    to.y = from.y;
                                    to.targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                                    to.velocity = 0;
                                    to.scale = 1;
                                    to.opacity = 1;
                                    to.isWinning = false;
                                    to.isExploding = false;
                                    to.bounceOffset = 0;
                                    to.rowPosition = r;
                                    from.symbol = null;
                                    from.hasOrb = false;
                                    from.orbMultiplier = 1;
                                    from.isWinning = false;
                                    from.isExploding = false;
                                    from.scale = 0;
                                    moved = true;
                                    break;
                                }
                            }
                        }
                    }
                }
                return moved;
            }

            fillEmptyCellsForCascade() {
                for (let c = 0; c < COLS; c++) {
                    let emptyCount = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (!this.grid[r]) this.grid[r] = [];
                        if (!this.grid[r][c]) this.grid[r][c] = this.createCell(r, c, null);
                        if (this.grid[r][c].symbol === null || this.grid[r][c].isExploding || this.grid[r][c].scale <
                            0.1) {
                            emptyCount++;
                        }
                    }
                    let added = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (!this.grid[r]) this.grid[r] = [];
                        if (!this.grid[r][c]) this.grid[r][c] = this.createCell(r, c, null);
                        if (this.grid[r][c].symbol === null || this.grid[r][c].isExploding || this.grid[r][c].scale <
                            0.1) {
                            this.grid[r][c].symbol = this.getRandomSymbolByProbability();
                            this.grid[r][c].y = GRID_OFFSET_Y - (emptyCount - added) * CELL_SIZE - 30;
                            this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                            this.grid[r][c].velocity = 0;
                            this.grid[r][c].scale = 1;
                            this.grid[r][c].opacity = 1;
                            this.grid[r][c].isWinning = false;
                            this.grid[r][c].isExploding = false;
                            this.grid[r][c].hasOrb = false;
                            this.grid[r][c].orbMultiplier = 1;
                            this.grid[r][c].bounceOffset = 0;
                            this.grid[r][c].rowPosition = r;
                            added++;
                        }
                    }
                }
            }

            spawnParticles(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                    const speed = 3 + Math.random() * 7;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 4,
                        life: 1,
                        decay: 0.01 + Math.random() * 0.03,
                        color,
                        size: 2 + Math.random() * 6
                    });
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= p.decay;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            zeusThrowOrbs() {
                if (this.zeusArmRaised) return;
                this.zeusArmRaised = true;
                setTimeout(() => {
                    this.zeusLightningActive = true;
                    const orbCount = 1 + Math.floor(Math.random() * 4);
                    const usedCells = new Set();
                    for (let i = 0; i < orbCount; i++) {
                        let r, c,
                            attempts = 0;
                        do { r = Math.floor(Math.random() * ROWS);
                            c = Math.floor(Math.random() * COLS);
                            attempts++; } while (usedCells.has(`${r},${c}`) && attempts < 100);
                        if (attempts >= 100) break;
                        usedCells.add(`${r},${c}`);
                        const multiplier = this.getRandomOrbMultiplier();
                        const colors = ['#2ecc71', '#3498db', '#e91e90', '#ffd700'];
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        if (this.grid[r] && this.grid[r][c] && this.grid[r][c].symbol && !this.grid[r][c]
                            .isExploding) {
                            this.grid[r][c].hasOrb = true;
                            this.grid[r][c].orbMultiplier = multiplier;
                            this.activeOrbs.push({ r, c, multiplier, color });
                            this.spawnOrbEffect(r, c, color, multiplier);
                        }
                    }
                    setTimeout(() => {
                        this.zeusLightningActive = false;
                        this.zeusArmRaised = false;
                    }, 400);
                }, 400);
            }

            spawnOrbEffect(r, c, color, multiplier) {
                const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                const y = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                const orbDiv = document.createElement('div');
                orbDiv.className = 'orb-popup';
                orbDiv.textContent = `${multiplier}x`;
                orbDiv.style.left = x + 'px';
                orbDiv.style.top = y + 'px';
                orbDiv.style.color = color;
                const mainArea = document.getElementById('mainArea');
                if (mainArea) mainArea.appendChild(orbDiv);
                setTimeout(() => orbDiv.remove(), 1800);
            }

            applyOrbsToWin(baseWin) {
                if (this.activeOrbs.length === 0) return baseWin;
                if (baseWin <= 0) return 0;
                let totalOrbValue = 0;
                for (const orb of this.activeOrbs) totalOrbValue += orb.multiplier;
                if (this.isFreeSpins) {
                    this.totalMultiplier += totalOrbValue;
                    this.updateTotalMultiplierDisplay();
                    this.bonusTotalWin += baseWin;
                    return 0;
                } else {
                    return baseWin * (1 + totalOrbValue);
                }
            }

            async spin() {
                if (this.state !== GameStateEnum.IDLE || this.isProcessing) return;
                if (this.balance < this.bet && !this.isFreeSpins) return;
                this.isProcessing = true;
                this.state = GameStateEnum.SPINNING;
                this.totalWin = 0;
                this.displayedWin = 0;
                this.updateWinDisplay();
                this.clearOrbs();
                this.particles = [];
                if (!this.isFreeSpins) this.balance -= this.bet;

                await this.animateInitialCascade();
                await this.sleep(400);
                await this.cascadeCycle();

                const finalWin = this.applyOrbsToWin(this.totalWin);
                this.totalWin = finalWin;
                if (!this.isFreeSpins) this.balance += finalWin;
                await this.animateWinCounter(finalWin);

                const scatterCount = this.countScatters();
                if (scatterCount >= 4 && !this.isFreeSpins) {
                    await this.enterBonusGame(15);
                } else if (scatterCount >= 3 && this.isFreeSpins) {
                    this.freeSpinsRemaining += 5;
                    this.updateFreespinDisplay();
                    this.showRetriggerEffect();
                }

                if (this.isFreeSpins) {
                    this.freeSpinsRemaining--;
                    this.updateFreespinDisplay();
                    if (this.freeSpinsRemaining <= 0) {
                        await this.finishBonusGame();
                    }
                }

                this.state = GameStateEnum.IDLE;
                this.isProcessing = false;
                this.updateSpinButton();
            }

            async animateInitialCascade() {
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        if (!this.grid[r]) this.grid[r] = [];
                        if (!this.grid[r][c]) this.grid[r][c] = this.createCell(r, c, null);
                        const cell = this.grid[r][c];
                        cell.symbol = this.getRandomSymbolByProbability();
                        cell.y = -150 - r * 50 - c * 10;
                        cell.targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                        cell.velocity = 0;
                        cell.scale = 1;
                        cell.opacity = 1;
                        cell.isWinning = false;
                        cell.isExploding = false;
                        cell.hasOrb = false;
                        cell.orbMultiplier = 1;
                        cell.bounceOffset = 0;
                        cell.rowPosition = r;
                    }
                }
                const promises = [];
                for (let c = 0; c < COLS; c++) {
                    promises.push(this.dropColumnCascade(c, c * 55));
                }
                await Promise.all(promises);
            }

            dropColumnCascade(col, delay) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const GRAVITY = 0.95;
                        const DAMPING = 0.3;
                        let settleFrames = 0;
                        const animate = () => {
                            let allSettled = true;
                            for (let r = 0; r < ROWS; r++) {
                                if (!this.grid[r] || !this.grid[r][col]) continue;
                                const cell = this.grid[r][col];
                                const target = cell.targetY;
                                const dy = target - cell.y;
                                if (Math.abs(dy) > 0.5) {
                                    allSettled = false;
                                    cell.velocity += GRAVITY;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy) + 1);
                                    if (cell.y >= target) {
                                        cell.y = target;
                                        if (Math.abs(cell.velocity) > 1) {
                                            cell.bounceOffset = -8;
                                            cell.velocity = -cell.velocity * DAMPING;
                                        } else {
                                            cell.velocity = 0;
                                            cell.bounceOffset = 0;
                                        }
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                    if (cell.bounceOffset < 0) {
                                        cell.bounceOffset *= 0.7;
                                        if (Math.abs(cell.bounceOffset) < 0.3) cell.bounceOffset = 0;
                                    }
                                }
                            }
                            if (!allSettled) {
                                settleFrames = 0;
                                requestAnimationFrame(animate);
                            } else {
                                settleFrames++;
                                if (settleFrames < 8) {
                                    requestAnimationFrame(animate);
                                } else {
                                    for (let r = 0; r < ROWS; r++) {
                                        if (this.grid[r] && this.grid[r][col]) {
                                            this.grid[r][col].y = this.grid[r][col].targetY;
                                            this.grid[r][col].bounceOffset = 0;
                                            this.grid[r][col].velocity = 0;
                                        }
                                    }
                                    resolve();
                                }
                            }
                        };
                        requestAnimationFrame(animate);
                    }, delay);
                });
            }

            async cascadeCycle() {
                let hasWins = true;
                let iterations = 0;
                const maxIterations = 30;
                while (hasWins && iterations < maxIterations) {
                    iterations++;
                    this.state = GameStateEnum.CASCADING;
                    await this.sleep(CASCADE_DELAY);

                    const groups = this.findGroups();
                    if (groups.length === 0) {
                        hasWins = false;
                        break;
                    }

                    this.state = GameStateEnum.WIN_ANIMATION;
                    this.highlightWinningCells(groups);
                    await this.animateWinningHighlight(groups);
                    await this.sleep(600);

                    let cycleWin = 0;
                    for (const group of groups) {
                        cycleWin += group.payout;
                    }
                    this.totalWin += cycleWin;

                    await this.animateExplosion(groups);
                    await this.sleep(300);
                    this.removeExplodedSymbols(groups);
                    this.applyCascadeGravity();
                    this.fillEmptyCellsForCascade();
                    await this.animateCascadeDrop();
                    await this.sleep(400);
                }
            }

            highlightWinningCells(groups) {
                for (const group of groups) {
                    for (const cell of group.cells) {
                        if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                            this.grid[cell.r][cell.c].isWinning = true;
                        }
                    }
                }
            }

            async animateWinningHighlight(groups) {
                return new Promise(resolve => {
                    const startTime = performance.now();
                    const duration = 1200;
                    const animate = (time) => {
                        const progress = Math.min((time - startTime) / duration, 1);
                        const s = 1 + Math.sin(progress * Math.PI * 4) * 0.18;
                        for (const group of groups) {
                            for (const cell of group.cells) {
                                if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                                    this.grid[cell.r][cell.c].scale = s;
                                }
                            }
                        }
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            for (const group of groups) {
                                for (const cell of group.cells) {
                                    if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                                        this.grid[cell.r][cell.c].scale = 1.25;
                                    }
                                }
                            }
                            resolve();
                        }
                    };
                    requestAnimationFrame(animate);
                });
            }

            async animateExplosion(groups) {
                return new Promise(resolve => {
                    const startTime = performance.now();
                    const duration = 500;
                    const animate = (time) => {
                        const progress = Math.min((time - startTime) / duration, 1);
                        const s = 1.25 + progress * 0.5;
                        for (const group of groups) {
                            for (const cell of group.cells) {
                                if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                                    const c = this.grid[cell.r][cell.c];
                                    c.scale = s;
                                    c.opacity = 1 - progress;
                                    c.isExploding = true;
                                }
                            }
                        }
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            resolve();
                        }
                    };
                    requestAnimationFrame(animate);
                });
            }

            removeExplodedSymbols(groups) {
                for (const group of groups) {
                    for (const cell of group.cells) {
                        if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                            const gc = this.grid[cell.r][cell.c];
                            this.spawnParticles(
                                GRID_OFFSET_X + cell.c * CELL_SIZE + CELL_SIZE / 2,
                                gc.y + gc.bounceOffset,
                                SYMBOL_COLORS[gc.symbol] || '#fff',
                                15
                            );
                            gc.symbol = null;
                            gc.hasOrb = false;
                            gc.orbMultiplier = 1;
                            gc.isWinning = false;
                            gc.isExploding = false;
                            gc.scale = 0;
                            gc.opacity = 1;
                            gc.bounceOffset = 0;
                        }
                    }
                }
            }

            async animateCascadeDrop() {
                return new Promise(resolve => {
                    const GRAVITY = 0.9;
                    const DAMPING = 0.3;
                    let settleFrames = 0;
                    const animate = () => {
                        let allSettled = true;
                        for (let c = 0; c < COLS; c++) {
                            for (let r = 0; r < ROWS; r++) {
                                if (!this.grid[r] || !this.grid[r][c]) continue;
                                const cell = this.grid[r][c];
                                if (!cell.symbol || cell.scale < 0.1) continue;
                                cell.scale = Math.min(1, cell.scale + 0.15);
                                const target = cell.targetY;
                                const dy = target - cell.y;
                                if (Math.abs(dy) > 0.5) {
                                    allSettled = false;
                                    cell.velocity += GRAVITY;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy) + 1);
                                    if (cell.y >= target) {
                                        cell.y = target;
                                        if (Math.abs(cell.velocity) > 0.6) {
                                            cell.bounceOffset = -5;
                                            cell.velocity = -cell.velocity * DAMPING;
                                        } else {
                                            cell.velocity = 0;
                                            cell.bounceOffset = 0;
                                        }
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                    if (cell.bounceOffset < 0) {
                                        cell.bounceOffset *= 0.7;
                                        if (Math.abs(cell.bounceOffset) < 0.3) cell.bounceOffset = 0;
                                    }
                                }
                            }
                        }
                        if (!allSettled) {
                            settleFrames = 0;
                            requestAnimationFrame(animate);
                        } else {
                            settleFrames++;
                            if (settleFrames < 6) {
                                requestAnimationFrame(animate);
                            } else {
                                for (let c = 0; c < COLS; c++) {
                                    for (let r = 0; r < ROWS; r++) {
                                        if (this.grid[r] && this.grid[r][c]) {
                                            const cell = this.grid[r][c];
                                            cell.y = cell.targetY;
                                            cell.bounceOffset = 0;
                                            cell.velocity = 0;
                                            if (cell.symbol) cell.scale = 1;
                                        }
                                    }
                                }
                                resolve();
                            }
                        }
                    };
                    requestAnimationFrame(animate);
                });
            }

            async animateWinCounter(targetWin) {
                const startWin = this.displayedWin;
                const duration = 900;
                const startTime = performance.now();
                return new Promise(resolve => {
                    const animate = (time) => {
                        const progress = Math.min((time - startTime) / duration, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        this.displayedWin = Math.round((startWin + (targetWin - startWin) * eased) * 100) /
                            100;
                        this.updateWinDisplay();
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            this.displayedWin = Math.round(targetWin * 100) / 100;
                            this.updateWinDisplay();
                            resolve();
                        }
                    };
                    requestAnimationFrame(animate);
                });
            }

            countScatters() {
                let count = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r] && this.grid[r][c] && this.grid[r][c].symbol === SYMBOLS.ZEUS_SCATTER && !this
                            .grid[r][c].isExploding && this.grid[r][c].scale > 0.1) {
                            count++;
                        }
                    }
                }
                return count;
            }

            async enterBonusGame(spins) {
                this.state = GameStateEnum.BONUS_TRANSITION;
                this.isFreeSpins = true;
                this.freeSpinsRemaining = spins;
                this.totalMultiplier = 1;
                this.bonusTotalWin = 0;
                document.getElementById('leftPanel').classList.remove('inactive');
                document.getElementById('freespinBadge').classList.add('active');
                this.updateFreespinDisplay();
                this.updateTotalMultiplierDisplay();
                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                if (spinsDisplay) spinsDisplay.textContent = spins;
                if (overlay) overlay.classList.add('active');
                document.body.classList.add('zeus-rage');
                await this.sleep(2500);
                document.body.classList.remove('zeus-rage');
                if (overlay) overlay.classList.remove('active');
                this.state = GameStateEnum.IDLE;
            }

            async finishBonusGame() {
                const finalBonusWin = this.bonusTotalWin * this.totalMultiplier;
                this.totalWin = finalBonusWin;
                this.balance += finalBonusWin;
                await this.animateWinCounter(finalBonusWin);
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;
                this.bonusTotalWin = 0;
                document.getElementById('leftPanel').classList.add('inactive');
                document.getElementById('freespinBadge').classList.remove('active');
                this.updateTotalMultiplierDisplay();
                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                const h2 = overlay?.querySelector('h2');
                const subtitle = overlay?.querySelector('.bonus-subtitle');
                if (spinsDisplay) spinsDisplay.textContent = finalBonusWin.toFixed(0);
                if (h2) h2.textContent = '🏆 БОНУС ЗАВЕРШЕН! 🏆';
                if (subtitle) subtitle.textContent = 'Общий выигрыш:';
                if (overlay) overlay.classList.add('active');
                await this.sleep(3000);
                if (overlay) overlay.classList.remove('active');
                if (h2) h2.textContent = '⚡ ЯРОСТЬ ЗЕВСА! ⚡';
                if (subtitle) subtitle.textContent = 'FREE SPINS';
            }

            showRetriggerEffect() {
                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                const h2 = overlay?.querySelector('h2');
                if (spinsDisplay) spinsDisplay.textContent = '+5 SPINS';
                if (h2) h2.textContent = '⚡ РЕТРИГГЕР! ⚡';
                if (overlay) overlay.classList.add('active');
                setTimeout(() => {
                    if (overlay) overlay.classList.remove('active');
                    if (h2) h2.textContent = '⚡ ЯРОСТЬ ЗЕВСА! ⚡';
                }, 1500);
            }

            buyBonus() {
                if (this.state !== GameStateEnum.IDLE || this.isProcessing) return;
                if (this.isFreeSpins) return;
                const cost = this.bet * 100;
                if (this.balance < cost) return;
                this.balance -= cost;
                this.isProcessing = true;
                this.enterBonusGame(15).then(() => { this.isProcessing = false; });
            }

            setBet(index) {
                if (index < 0 || index >= BET_OPTIONS.length) return;
                this.betIndex = index;
                this.bet = BET_OPTIONS[index];
                this.updateBetDisplay();
            }
            increaseBet() { if (this.betIndex < BET_OPTIONS.length - 1) this.setBet(this.betIndex + 1); }
            decreaseBet() { if (this.betIndex > 0) this.setBet(this.betIndex - 1); }

            sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

            updateWinDisplay() {
                const el = document.getElementById('winDisplay');
                if (el) { el.textContent = this.displayedWin.toFixed(0);
                    el.classList.add('counting');
                    setTimeout(() => el.classList.remove('counting'), 100); }
            }
            updateBetDisplay() { const el = document.getElementById('betDisplay'); if (el) el.textContent = this.bet; }
            updateFreespinDisplay() { const el = document.getElementById('freespinCountDisplay'); if (el) el
                    .textContent = this.freeSpinsRemaining; }
            updateTotalMultiplierDisplay() {
                const el = document.getElementById('totalMultiplierDisplay');
                if (el) { el.textContent = this.totalMultiplier + 'x';
                    el.classList.add('pulse');
                    setTimeout(() => el.classList.remove('pulse'), 300); }
            }
            updateSpinButton() {
                const btn = document.getElementById('btnSpin');
                if (!btn) return;
                btn.textContent = this.isFreeSpins ? 'FREE' : 'SPIN';
                btn.disabled = this.state !== GameStateEnum.IDLE || (this.balance < this.bet && !this.isFreeSpins);
            }

            render(ctx) {
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                // Фон
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        ctx.fillStyle = 'rgba(15, 8, 0, 0.6)';
                        ctx.strokeStyle = 'rgba(180, 130, 0, 0.25)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(GRID_OFFSET_X + c * CELL_SIZE + 4, GRID_OFFSET_Y + r * CELL_SIZE + 4,
                            CELL_SIZE - 8, CELL_SIZE - 8, 10);
                        ctx.fill();
                        ctx.stroke();
                    }
                }
                // Символы
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (!this.grid[r] || !this.grid[r][c]) continue;
                        const cell = this.grid[r][c];
                        if (!cell.symbol || cell.scale < 0.05) continue;
                        const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const y = cell.y + cell.bounceOffset;
                        ctx.save();
                        ctx.translate(x, y);
                        const s = Math.max(0.05, cell.scale);
                        ctx.scale(s, s);
                        ctx.globalAlpha = Math.max(0, Math.min(1, cell.opacity));
                        if (cell.isWinning && !cell.isExploding) { ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 35; }
                        if (cell.isExploding) { ctx.shadowColor = '#fff';
                            ctx.shadowBlur = 45; }
                        if (cell.hasOrb && !cell.isExploding) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 25;
                            ctx.fillStyle = 'rgba(255,215,0,0.3)';
                            ctx.beginPath();
                            ctx.arc(0, 0, SYMBOL_SIZE / 2 + 10, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                        const color = SYMBOL_COLORS[cell.symbol] || '#555';
                        const grad = ctx.createRadialGradient(-4, -9, 4, 0, 0, SYMBOL_SIZE / 2);
                        grad.addColorStop(0, this.lightenColor(color, 55));
                        grad.addColorStop(1, color);
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(0, 0, SYMBOL_SIZE / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.lineWidth = 2.5;
                        ctx.stroke();
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.font = `${SYMBOL_SIZE*0.5}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#fff';
                        if (cell.symbol === SYMBOLS.ZEUS_SCATTER) {
                            this.drawZeusIcon(ctx, SYMBOL_SIZE);
                        } else {
                            ctx.fillText(SYMBOL_EMOJIS[cell.symbol] || '?', 0, 2);
                        }
                        if (cell.hasOrb && !cell.isExploding) {
                            ctx.font = 'bold 14px Arial';
                            ctx.fillStyle = '#ffd700';
                            ctx.shadowColor = 'rgba(0,0,0,0.9)';
                            ctx.shadowBlur = 4;
                            ctx.fillText(`x${cell.orbMultiplier}`, 0, -SYMBOL_SIZE / 2 - 14);
                            ctx.shadowBlur = 0;
                        }
                        ctx.restore();
                    }
                }
                // Частицы
                for (const p of this.particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            drawZeusIcon(ctx, size) {
                const s = size * 0.6;
                ctx.fillStyle = '#f5e6d3';
                ctx.beginPath();
                ctx.arc(0, -s * 0.05, s * 0.35, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#c4a882';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#e8d5c0';
                ctx.beginPath();
                ctx.moveTo(-s * 0.2, s * 0.08);
                ctx.quadraticCurveTo(0, s * 0.5, s * 0.2, s * 0.08);
                ctx.quadraticCurveTo(0, s * 0.2, -s * 0.2, s * 0.08);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(-s * 0.2, -s * 0.35);
                ctx.lineTo(-s * 0.15, -s * 0.5);
                ctx.lineTo(-s * 0.02, -s * 0.3);
                ctx.lineTo(0, -s * 0.55);
                ctx.lineTo(s * 0.02, -s * 0.3);
                ctx.lineTo(s * 0.15, -s * 0.5);
                ctx.lineTo(s * 0.2, -s * 0.35);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#1a1a3a';
                ctx.beginPath();
                ctx.arc(-s * 0.08, -s * 0.12, s * 0.04, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.08, -s * 0.12, s * 0.04, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.font = `${s*0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('⚡', 0, -s * 0.5);
            }

            lightenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF00) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return `rgb(${R},${G},${B})`;
            }
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const zeusCanvas = document.getElementById('zeusCanvas');
        const zctx = zeusCanvas.getContext('2d');
        const engine = new SlotEngine();

        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                ctx.beginPath();
                ctx.moveTo(x + r.tl, y);
                ctx.lineTo(x + w - r.tr, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                ctx.lineTo(x + w, y + h - r.br);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                ctx.lineTo(x + r.bl, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                ctx.lineTo(x, y + r.tl);
                ctx.quadraticCurveTo(x, y, x + r.tl, y);
                ctx.closePath();
            };
        }

        createFireSparks();

        document.getElementById('btnSpin').addEventListener('click', () => {
            if (!engine.isProcessing && engine.state === GameStateEnum.IDLE && (engine.balance >= engine.bet || engine
                    .isFreeSpins)) {
                engine.spin();
            }
        });
        document.getElementById('betUp').addEventListener('click', () => engine.increaseBet());
        document.getElementById('betDown').addEventListener('click', () => engine.decreaseBet());
        document.getElementById('btnBuyBonus').addEventListener('click', () => engine.buyBonus());

        function gameLoop() {
            engine.updateParticles();
            engine.render(ctx);
            drawZeusFigure(zctx, engine.zeusArmRaised, engine.zeusLightningActive);
            engine.updateSpinButton();
            document.getElementById('betUp').disabled = engine.betIndex >= BET_OPTIONS.length - 1 || engine
                .isProcessing;
            document.getElementById('betDown').disabled = engine.betIndex <= 0 || engine.isProcessing;
            document.getElementById('btnBuyBonus').disabled = engine.isProcessing || engine.isFreeSpins || engine
                .balance < engine.bet * 100;
            if (engine.activeOrbs.some(o => o.multiplier >= 50)) {
                if (!document.body.classList.contains('zeus-rage')) {
                    document.body.classList.add('zeus-rage');
                    setTimeout(() => document.body.classList.remove('zeus-rage'), 2500);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        engine.updateBetDisplay();
        engine.updateWinDisplay();
        engine.updateSpinButton();
        drawZeusFigure(zctx, false, false);
        gameLoop();

        console.log('⚡ Zeus Thunder - Полная версия запущена!');
        console.log('🎰 Выплаты по таблице: 8-9 символов = мин, 12+ = макс');
        console.log('👑 Зевс: золотая броня, синие камни, корона, борода');
        console.log('💰 Ставки: 50-5000, покупка бонуса 100x');
    </script>
</body>
