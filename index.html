<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Messenger Pro Max</title>
    
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ========== МАСШТАБНАЯ СИСТЕМА СТИЛЕЙ ========== */
        :root {
            --bg-main: #0f0f0f;
            --bg-sidebar: #171717;
            --bg-item-active: #2b5278;
            --bg-msg-in: #181818;
            --bg-msg-out: #2b5278;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #3390ec;
            --danger: #ff595a;
            --online: #4ade80;
            --vh: 1vh;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100%;
            max-width: 1600px;
            background: var(--bg-main);
            position: relative;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 400px;
            min-width: 300px;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            z-index: 10;
        }

        .sidebar-header {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-bar {
            background: #242424;
            border-radius: 10px;
            padding: 8px 12px;
            margin: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover { background: #222; }
        .chat-item.active { background: var(--bg-item-active); }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
            flex-shrink: 0;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--online);
            border: 2px solid var(--bg-sidebar);
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            display: none;
        }

        /* --- CHAT AREA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: #080808;
            position: relative;
        }

        .chat-header {
            height: 60px;
            background: rgba(23, 23, 23, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #222;
            justify-content: space-between;
        }

        #messages-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* --- MESSAGES --- */
        .msg-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            margin-bottom: 2px;
        }

        .msg-out {
            align-self: flex-end;
            background: var(--bg-msg-out);
            border-bottom-right-radius: 4px;
        }

        .msg-in {
            align-self: flex-start;
            background: var(--bg-msg-in);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            font-size: 11px;
            opacity: 0.6;
            margin-left: 8px;
            float: right;
            margin-top: 4px;
        }

        /* --- INPUT --- */
        .input-panel {
            padding: 10px 20px;
            background: var(--bg-sidebar);
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        #msg-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            padding: 10px 0;
            resize: none;
            max-height: 150px;
            font-size: 16px;
        }

        /* --- AUTH MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input.auth-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #333;
            background: #111;
            color: white;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; left: 0; height: 100%; }
            .sidebar.hidden { transform: translateX(-100%); }
            .main-content { position: absolute; width: 100%; height: 100%; }
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal-overlay">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px;">Messenger Pro</h2>
            <input type="email" id="email" class="auth-field" placeholder="Email">
            <input type="password" id="password" class="auth-field" placeholder="Пароль">
            <button class="btn-primary" onclick="handleAuth('login')">Войти</button>
            <button class="btn-primary" style="background: transparent;" onclick="handleAuth('signup')">Создать аккаунт</button>
        </div>
    </div>

    <div class="app-shell" id="app-shell" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars" style="cursor: pointer;"></i>
                <div class="search-bar">
                    <i class="fas fa-search" style="color: #888;"></i>
                    <input type="text" placeholder="Поиск..." id="user-search">
                </div>
            </div>
            <div class="chat-list" id="chat-list">
                </div>
        </aside>

        <main class="main-content">
            <header class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="avatar" id="current-chat-avatar">?</div>
                    <div>
                        <div id="current-chat-name" style="font-weight: bold;">Выберите чат</div>
                        <div id="current-chat-status" style="font-size: 12px; color: var(--text-muted);">в сети</div>
                    </div>
                </div>
                <div style="display: flex; gap: 20px; color: var(--text-muted);">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </header>

            <div id="messages-flow"></div>

            <div class="input-panel">
                <i class="far fa-smile" style="font-size: 22px; color: var(--text-muted); cursor: pointer;"></i>
                <textarea id="msg-input" placeholder="Напишите сообщение..." rows="1"></textarea>
                <i class="fas fa-paperclip" style="font-size: 22px; color: var(--text-muted); cursor: pointer;"></i>
                <div id="send-btn" style="color: var(--accent); font-size: 24px; cursor: pointer;">
                    <i class="fas fa-paper-plane"></i>
                </div>
            </div>
        </main>
    </div>

<script>
// ========== CONFIGURATION ==========
const CONFIG = {
    SUPABASE_URL: "ВАШ_SUPABASE_URL",
    SUPABASE_KEY: "ВАШ_SUPABASE_ANON_KEY",
    ABLY_KEY: "ВАШ_ABLY_KEY"
};

const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
let ably, currentUser, currentChatId = null;
let activeChannels = new Map();

// ========== CORE LOGIC ==========

async function init() {
    setupViewport();
    const { data: { session } } = await supabase.auth.getSession();
    
    if (session) {
        currentUser = session.user;
        showApp();
    }
}

async function handleAuth(type) {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        let result;
        if (type === 'signup') {
            result = await supabase.auth.signUp({ email, password });
            if (result.data.user) {
                // Создаем профиль в БД
                await supabase.from('profiles').insert({ 
                    id: result.data.user.id, 
                    email, 
                    username: email.split('@')[0] 
                });
            }
        } else {
            result = await supabase.auth.signInWithPassword({ email, password });
        }

        if (result.error) throw result.error;
        location.reload();
    } catch (err) {
        alert(err.message);
    }
}

async function showApp() {
    document.getElementById('auth-modal').style.display = 'none';
    document.getElementById('app-shell').style.display = 'flex';
    
    initAbly();
    loadChats();
    setupEventListeners();
}

function initAbly() {
    ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY, clientId: currentUser.id });
    
    // Глобальный канал присутствия
    const globalChannel = ably.channels.get('global-presence');
    globalChannel.presence.enter({ status: 'online' });
}

async function loadChats() {
    const { data: chats, error } = await supabase
        .from('chats')
        .select(`*, profiles:u2_id(username, avatar_url)`) // Упрощенный пример связи
        .or(`u1_id.eq.${currentUser.id},u2_id.eq.${currentUser.id}`);

    const container = document.getElementById('chat-list');
    container.innerHTML = '';

    chats?.forEach(chat => {
        const div = document.createElement('div');
        div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
        div.onclick = () => selectChat(chat);
        div.innerHTML = `
            <div class="avatar">${chat.profiles?.username[0].toUpperCase()}</div>
            <div style="flex: 1">
                <div style="display: flex; justify-content: space-between">
                    <b>${chat.profiles?.username}</b>
                    <span style="font-size: 11px; color: #666">12:45</span>
                </div>
                <div style="font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    Последнее сообщение...
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

async function selectChat(chat) {
    currentChatId = chat.id;
    document.getElementById('current-chat-name').innerText = chat.profiles?.username;
    
    // Подписка на канал чата через Ably
    if (!activeChannels.has(chat.id)) {
        const channel = ably.channels.get(`chat:${chat.id}`);
        channel.subscribe('msg', (m) => renderMessage(m.data));
        activeChannels.set(chat.id, channel);
    }

    // Загрузка истории
    const { data: messages } = await supabase
        .from('messages')
        .select('*')
        .eq('chat_id', chat.id)
        .order('created_at', { ascending: true });

    const flow = document.getElementById('messages-flow');
    flow.innerHTML = '';
    messages?.forEach(renderMessage);
    flow.scrollTop = flow.scrollHeight;
}

function renderMessage(msg) {
    const flow = document.getElementById('messages-flow');
    const isOut = msg.sender_id === currentUser.id;
    
    const div = document.createElement('div');
    div.className = `msg-bubble ${isOut ? 'msg-out' : 'msg-in'}`;
    div.innerHTML = `
        ${msg.text}
        <span class="msg-meta">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
    `;
    flow.appendChild(div);
    flow.scrollTop = flow.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentChatId) return;

    const msgData = {
        chat_id: currentChatId,
        sender_id: currentUser.id,
        text: text,
        created_at: new Date().toISOString()
    };

    input.value = '';
    
    // 1. В базу
    const { error } = await supabase.from('messages').insert([msgData]);
    
    // 2. В Ably для мгновенной доставки
    if (!error) {
        activeChannels.get(currentChatId).publish('msg', msgData);
    }
}

// ========== HELPERS ==========
function setupEventListeners() {
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    };
}

function setupViewport() {
    const setVh = () => {
        document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    };
    window.addEventListener('resize', setVh);
    setVh();
}

init();
</script>
</body>
</html>
