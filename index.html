<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Thunder - Tumble Slot</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --gold: #ffd700;
            --red: #e63946;
            --dark-gold: #b8860b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        body.zeus-rage {
            animation: rageBg 0.6s ease-in-out forwards;
        }

        @keyframes rageBg {
            0% {
                background: var(--bg);
            }
            50% {
                background: #2d0a0a;
            }
            100% {
                background: #1a0800;
            }
        }

        .game-container {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        /* ---- ЛЕВАЯ ПАНЕЛЬ (счетчик множителя в бонусе) ---- */
        .left-panel {
            width: 80px;
            background: linear-gradient(180deg, #1a1a3a 0%, #0d0d2b 100%);
            border: 2px solid #3a3a6a;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 10px;
            transition: all 0.3s;
        }

        .left-panel.inactive {
            opacity: 0.3;
            border-color: #2a2a4a;
        }

        .left-panel .panel-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .left-panel .multiplier-counter {
            color: #ffd700;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            transition: all 0.2s;
        }

        .left-panel .multiplier-counter.pulse {
            animation: counterPulse 0.3s ease-out;
        }

        @keyframes counterPulse {
            0% {
                transform: scale(1.6);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        /* ---- ОСНОВНОЕ ПОЛЕ ---- */
        .main-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 10px;
        }

        .game-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 3px;
        }

        .freespin-badge {
            background: linear-gradient(135deg, #e63946, #ff6b6b);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            animation: badgeGlow 1.5s ease-in-out infinite;
            display: none;
        }

        .freespin-badge.active {
            display: block;
        }

        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(230, 57, 70, 0.9);
            }
        }

        .freespin-counter {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }

        .freespin-counter span {
            color: #fff;
            font-size: 24px;
        }

        /* ---- Canvas ---- */
        canvas {
            border: 3px solid #4a3a2a;
            border-radius: 15px;
            background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s;
        }

        body.zeus-rage canvas {
            box-shadow: 0 0 60px rgba(255, 80, 0, 0.6), inset 0 0 80px rgba(200, 50, 0, 0.3);
            border-color: #8b0000;
        }

        /* ---- ПРАВАЯ ПАНЕЛЬ (Дед Зевс) ---- */
        .right-panel {
            width: 130px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .zeus-container {
            position: relative;
            width: 100%;
            height: 280px;
        }

        .zeus-figure {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            transition: transform 0.3s;
        }

        /* Тело Деда */
        .zeus-body {
            width: 70px;
            height: 90px;
            background: linear-gradient(180deg, #f5f0e8 0%, #e0d5c0 60%, #c4b5a0 100%);
            border-radius: 20px 20px 5px 5px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .zeus-toga {
            position: absolute;
            bottom: 0;
            left: -5px;
            right: -5px;
            height: 50px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0%, #e8ddd0 100%);
            border-radius: 0 0 10px 10px;
            clip-path: polygon(0% 30%, 50% 0%, 100% 30%, 100% 100%, 0% 100%);
        }

        /* Голова */
        .zeus-head {
            width: 50px;
            height: 55px;
            background: radial-gradient(circle at 50% 40%, #f5e6d3 0%, #d4b896 100%);
            border-radius: 50%;
            margin: -30px auto 0;
            position: relative;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Борода */
        .zeus-beard {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 30px;
            background: linear-gradient(180deg, #e8d5c0 0%, #c4b5a0 100%);
            border-radius: 0 0 20px 20px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        /* Глаза */
        .zeus-eyes {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .zeus-eye {
            width: 6px;
            height: 8px;
            background: #1a1a3a;
            border-radius: 50%;
        }

        /* Коронa */
        .zeus-crown {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 18px;
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            clip-path: polygon(0% 100%, 10% 30%, 30% 0%, 50% 50%, 70% 0%, 90% 30%, 100% 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            animation: crownGlow 2s ease-in-out infinite;
        }

        @keyframes crownGlow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            }
            50% {
                box-shadow: 0 0 35px rgba(255, 215, 0, 1), 0 0 60px rgba(255, 200, 0, 0.5);
            }
        }

        /* Рука с молнией */
        .zeus-arm-container {
            position: absolute;
            top: 15px;
            right: -15px;
            z-index: 10;
            transform-origin: top left;
            transition: transform 0.4s ease-in-out;
        }

        .zeus-arm-container.raised {
            transform: rotate(-130deg);
        }

        .zeus-arm {
            width: 20px;
            height: 60px;
            background: linear-gradient(180deg, #f5e6d3 0%, #d4b896 100%);
            border-radius: 8px;
            position: relative;
        }

        .zeus-hand {
            width: 16px;
            height: 16px;
            background: #f5e6d3;
            border-radius: 50%;
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Молния в руке */
        .zeus-lightning {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 30px;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 0 20px #fff, 0 0 40px #ffd700, 0 0 60px #ff8c00;
            opacity: 0;
            transition: all 0.1s;
        }

        .zeus-lightning.active {
            opacity: 1;
            animation: lightningFlash 0.3s ease-out;
        }

        @keyframes lightningFlash {
            0% {
                opacity: 1;
                height: 25px;
                box-shadow: 0 0 30px #fff, 0 0 60px #ffd700;
            }
            50% {
                opacity: 1;
                height: 70px;
                box-shadow: 0 0 50px #fff, 0 0 80px #ffd700, 0 0 100px #ff8c00;
            }
            100% {
                opacity: 0;
                height: 10px;
            }
        }

        /* Ноги */
        .zeus-legs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 2px;
        }

        .zeus-leg {
            width: 15px;
            height: 35px;
            background: linear-gradient(180deg, #e0d5c0 0%, #c4b5a0 100%);
            border-radius: 0 0 8px 8px;
        }

        /* Сандалии */
        .zeus-sandal {
            width: 20px;
            height: 12px;
            background: #8b6914;
            border-radius: 10px 10px 3px 3px;
            margin: 0 auto;
        }

        /* Облако под ногами */
        .zeus-cloud {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 25px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            filter: blur(8px);
        }

        /* ---- НИЖНЯЯ ПАНЕЛЬ ---- */
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 25px;
            background: linear-gradient(180deg, #1a1a3a, #0d0d2b);
            border: 2px solid #3a3a6a;
            border-radius: 40px;
            padding: 12px 30px;
        }

        .win-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .win-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .win-amount {
            color: #ffd700;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: all 0.1s;
            min-width: 120px;
            text-align: center;
        }

        .win-amount.counting {
            animation: winCount 0.1s ease-out;
        }

        @keyframes winCount {
            0% {
                transform: scale(1.15);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        .bet-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bet-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bet-amount {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
        }

        .btn-spin {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #e63946, #c0392b);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.4);
            text-transform: uppercase;
        }

        .btn-spin:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(230, 57, 70, 0.7);
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.2);
        }

        /* ---- ВСПЛЫВАЮЩИЕ МНОЖИТЕЛИ ---- */
        .orb-popup {
            position: absolute;
            font-size: 22px;
            font-weight: 900;
            pointer-events: none;
            animation: orbFloat 1.8s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        @keyframes orbFloat {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            30% {
                transform: scale(1.4);
                opacity: 1;
            }
            70% {
                transform: scale(1);
                opacity: 0.9;
            }
            100% {
                transform: scale(0.7);
                opacity: 0;
            }
        }

        /* ---- БОНУС-ЭКРАН (при входе в фриспины) ---- */
        .bonus-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .bonus-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .bonus-popup {
            background: linear-gradient(135deg, #1a1a4a, #2a1a3a);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.5);
            animation: bonusIn 0.5s ease-out;
        }

        @keyframes bonusIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .bonus-popup h2 {
            color: #ffd700;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .bonus-popup .bonus-spins {
            color: #fff;
            font-size: 60px;
            font-weight: 900;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
        }

        .bonus-popup .bonus-subtitle {
            color: #ccc;
            font-size: 16px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 10px;
            }
            .left-panel {
                width: 100%;
                flex-direction: row;
                height: 60px;
                padding: 10px;
            }
            .right-panel {
                display: none;
            }
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <!-- Бонусный оверлей -->
    <div class="bonus-overlay" id="bonusOverlay">
        <div class="bonus-popup">
            <h2>⚡ ЯРОСТЬ ЗЕВСА! ⚡</h2>
            <div class="bonus-spins" id="bonusSpinsDisplay">15</div>
            <div class="bonus-subtitle">FREE SPINS</div>
            <div class="bonus-subtitle" style="margin-top: 5px; font-size: 13px;">Накопительный множитель активирован!</div>
        </div>
    </div>

    <div class="game-container">
        <!-- Левая панель: накопительный множитель (бонус) -->
        <div class="left-panel inactive" id="leftPanel">
            <div class="panel-label">Total<br>Multiplier</div>
            <div class="multiplier-counter" id="totalMultiplierDisplay">1x</div>
        </div>

        <!-- Основная область -->
        <div class="main-area" id="mainArea">
            <div class="game-header">
                <div class="game-title">⚡ ZEUS THUNDER ⚡</div>
                <div class="freespin-badge" id="freespinBadge">
                    FREE SPINS <span id="freespinCountDisplay">15</span>
                </div>
            </div>
            <canvas id="gameCanvas" width="600" height="500"></canvas>
            <div class="bottom-panel">
                <div class="win-display">
                    <div class="win-label">Выигрыш</div>
                    <div class="win-amount" id="winDisplay">0</div>
                </div>
                <div class="bet-display">
                    <div class="bet-label">Ставка</div>
                    <div class="bet-amount" id="betDisplay">1.00</div>
                </div>
                <button class="btn-spin" id="btnSpin">SPIN</button>
            </div>
        </div>

        <!-- Правая панель: Дед Зевс -->
        <div class="right-panel">
            <div class="zeus-container" id="zeusContainer">
                <div class="zeus-figure">
                    <div class="zeus-head">
                        <div class="zeus-crown"></div>
                        <div class="zeus-eyes">
                            <div class="zeus-eye"></div>
                            <div class="zeus-eye"></div>
                        </div>
                        <div class="zeus-beard"></div>
                    </div>
                    <div class="zeus-body">
                        <div class="zeus-toga"></div>
                        <div class="zeus-arm-container" id="zeusArmContainer">
                            <div class="zeus-arm">
                                <div class="zeus-hand"></div>
                            </div>
                            <div class="zeus-lightning" id="zeusLightning"></div>
                        </div>
                    </div>
                    <div class="zeus-legs">
                        <div class="zeus-leg">
                            <div class="zeus-sandal"></div>
                        </div>
                        <div class="zeus-leg">
                            <div class="zeus-sandal"></div>
                        </div>
                    </div>
                    <div class="zeus-cloud"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== КОНСТАНТЫ ====================
        const COLS = 6;
        const ROWS = 5;
        const CELL_SIZE = 80;
        const GRID_OFFSET_X = 40;
        const GRID_OFFSET_Y = 40;
        const SYMBOL_SIZE = 50;

        // Типы символов
        const SYMBOLS = {
            LOW: ['stone_1', 'stone_2', 'stone_3', 'stone_4', 'stone_5'],
            MID: ['cup', 'ring'],
            HIGH: ['hourglass', 'crown'],
            SCATTER: 'zeus_scatter'
        };

        // Таблица выплат (Scatter Pays: количество -> множитель ставки)
        const PAYTABLE = {
            stone_1: { 8: 2, 10: 5, 12: 10 },
            stone_2: { 8: 2, 10: 5, 12: 10 },
            stone_3: { 8: 3, 10: 6, 12: 12 },
            stone_4: { 8: 3, 10: 6, 12: 12 },
            stone_5: { 8: 4, 10: 8, 12: 15 },
            cup: { 8: 5, 10: 12, 12: 25 },
            ring: { 8: 5, 10: 12, 12: 25 },
            hourglass: { 8: 10, 10: 25, 12: 50 },
            crown: { 8: 15, 10: 40, 12: 100 },
            zeus_scatter: { 4: 3, 5: 10, 6: 50 }
        };

        // Множители для сфер
        const ORB_MULTIPLIERS = [2, 3, 4, 5, 8, 10, 12, 15, 20, 25, 50, 100, 250, 500];

        // Цвета для символов
        const SYMBOL_COLORS = {
            stone_1: '#8e44ad',
            stone_2: '#2980b9',
            stone_3: '#27ae60',
            stone_4: '#f39c12',
            stone_5: '#e74c3c',
            cup: '#3498db',
            ring: '#f1c40f',
            hourglass: '#e67e22',
            crown: '#e74c3c',
            zeus_scatter: '#ffd700'
        };

        const SYMBOL_EMOJIS = {
            stone_1: '💎',
            stone_2: '🔮',
            stone_3: '🟢',
            stone_4: '🔥',
            stone_5: '💥',
            cup: '🏆',
            ring: '💍',
            hourglass: '⏳',
            crown: '👑',
            zeus_scatter: '⚡'
        };

        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        const GameStateEnum = {
            IDLE: 'IDLE',
            SPINNING: 'SPINNING',
            TUMBLING: 'TUMBLING',
            WIN_ANIMATION: 'WIN_ANIMATION',
            BONUS_TRANSITION: 'BONUS_TRANSITION'
        };

        class SlotEngine {
            constructor() {
                this.grid = this.createEmptyGrid();
                this.state = GameStateEnum.IDLE;
                this.bet = 1.0;
                this.totalWin = 0;
                this.displayedWin = 0;
                this.isProcessing = false; // Флаг для предотвращения повторных спинов

                // Бонусный режим
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;

                // Сферы на текущем поле
                this.activeOrbs = [];
                this.particles = [];

                // Зевс
                this.zeusArmRaised = false;
                this.zeusLightningActive = false;

                this.initGrid();
            }

            createEmptyGrid() {
                const grid = [];
                for (let r = 0; r < ROWS; r++) {
                    grid[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        grid[r][c] = {
                            symbol: null,
                            y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                            targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                            velocity: 0,
                            scale: 1,
                            opacity: 1,
                            isWinning: false,
                            hasOrb: false,
                            orbMultiplier: 1,
                            bounceOffset: 0 // Для анимации отскока
                        };
                    }
                }
                return grid;
            }

            initGrid() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        this.grid[r][c].symbol = this.randomSymbol();
                        this.grid[r][c].y = this.grid[r][c].targetY;
                        this.grid[r][c].velocity = 0;
                        this.grid[r][c].scale = 1;
                        this.grid[r][c].opacity = 1;
                        this.grid[r][c].isWinning = false;
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                        this.grid[r][c].bounceOffset = 0;
                    }
                }
                this.clearOrbs();
            }

            randomSymbol() {
                const rand = Math.random();
                if (rand < 0.03) return SYMBOLS.SCATTER;
                if (rand < 0.10) return SYMBOLS.HIGH[Math.floor(Math.random() * SYMBOLS.HIGH.length)];
                if (rand < 0.25) return SYMBOLS.MID[Math.floor(Math.random() * SYMBOLS.MID.length)];
                return SYMBOLS.LOW[Math.floor(Math.random() * SYMBOLS.LOW.length)];
            }

            clearOrbs() {
                this.activeOrbs = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                    }
                }
            }

            // ==================== ПОИСК ГРУПП ====================
            findGroups() {
                const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
                const groups = [];

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (visited[r][c] || !this.grid[r][c].symbol) continue;
                        const symbol = this.grid[r][c].symbol;
                        const group = [];
                        const stack = [{ r, c }];

                        while (stack.length > 0) {
                            const { r: cr, c: cc } = stack.pop();
                            if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
                            if (visited[cr][cc]) continue;
                            if (this.grid[cr][cc].symbol !== symbol) continue;

                            visited[cr][cc] = true;
                            group.push({ r: cr, c: cc });

                            stack.push({ r: cr - 1, c: cc });
                            stack.push({ r: cr + 1, c: cc });
                            stack.push({ r: cr, c: cc - 1 });
                            stack.push({ r: cr, c: cc + 1 });
                        }

                        // Скаттер: от 4 штук, остальные: от 8
                        const minCount = symbol === SYMBOLS.SCATTER ? 4 : 8;
                        if (group.length >= minCount) {
                            groups.push({
                                symbol,
                                cells: group,
                                count: group.length,
                                payout: this.getPayout(symbol, group.length)
                            });
                        }
                    }
                }
                return groups;
            }

            getPayout(symbol, count) {
                const table = PAYTABLE[symbol];
                if (!table) return 0;
                const thresholds = Object.keys(table).map(Number).sort((a, b) => a - b);
                let payout = 0;
                for (const threshold of thresholds) {
                    if (count >= threshold) {
                        payout = table[threshold];
                    }
                }
                return payout * this.bet;
            }

            // ==================== TUMBLE: СДВИГ СИМВОЛОВ ====================
            applyGravity() {
                let moved = false;
                for (let c = 0; c < COLS; c++) {
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (this.grid[r][c].symbol === null) {
                            for (let above = r - 1; above >= 0; above--) {
                                if (this.grid[above][c].symbol !== null) {
                                    this.grid[r][c].symbol = this.grid[above][c].symbol;
                                    this.grid[r][c].hasOrb = this.grid[above][c].hasOrb;
                                    this.grid[r][c].orbMultiplier = this.grid[above][c].orbMultiplier;
                                    // НЕ меняем y — он будет анимирован отдельно
                                    this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                                    this.grid[r][c].velocity = 0;
                                    this.grid[r][c].scale = 1;
                                    this.grid[r][c].opacity = 1;
                                    this.grid[r][c].isWinning = false;
                                    this.grid[r][c].bounceOffset = 0;

                                    this.grid[above][c].symbol = null;
                                    this.grid[above][c].hasOrb = false;
                                    this.grid[above][c].orbMultiplier = 1;
                                    this.grid[above][c].isWinning = false;
                                    moved = true;
                                    break;
                                }
                            }
                        }
                    }
                }
                return moved;
            }

            fillEmptyCells() {
                for (let c = 0; c < COLS; c++) {
                    let emptyAbove = 0;
                    // Считаем сколько пустых ячеек над каждой позицией
                    for (let r = 0; r < ROWS; r++) {
                        if (this.grid[r][c].symbol === null) {
                            emptyAbove++;
                            // Создаем новый символ над экраном
                            this.grid[r][c].symbol = this.randomSymbol();
                            this.grid[r][c].y = GRID_OFFSET_Y - (emptyAbove) * CELL_SIZE - 20;
                            this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                            this.grid[r][c].velocity = 0;
                            this.grid[r][c].scale = 1;
                            this.grid[r][c].opacity = 1;
                            this.grid[r][c].isWinning = false;
                            this.grid[r][c].hasOrb = false;
                            this.grid[r][c].orbMultiplier = 1;
                            this.grid[r][c].bounceOffset = 0;
                        }
                    }
                }
            }

            removeWinningSymbols(groups) {
                const cellsToRemove = new Set();
                for (const group of groups) {
                    for (const cell of group.cells) {
                        cellsToRemove.add(`${cell.r},${cell.c}`);
                        this.grid[cell.r][cell.c].isWinning = true;
                    }
                }
                // Удаляем после анимации
                for (const key of cellsToRemove) {
                    const [r, c] = key.split(',').map(Number);
                    this.spawnParticles(
                        GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2,
                        this.grid[r][c].y + this.grid[r][c].bounceOffset,
                        SYMBOL_COLORS[this.grid[r][c].symbol] || '#fff'
                    );
                    this.grid[r][c].symbol = null;
                    this.grid[r][c].hasOrb = false;
                    this.grid[r][c].orbMultiplier = 1;
                    this.grid[r][c].isWinning = false;
                    this.grid[r][c].scale = 1;
                    this.grid[r][c].bounceOffset = 0;
                }
            }

            spawnParticles(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 / 10) * i + Math.random() * 0.5;
                    const speed = 2 + Math.random() * 5;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 3,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.03,
                        color,
                        size: 2 + Math.random() * 4
                    });
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            // ==================== СФЕРЫ ОТ ЗЕВСА ====================
            zeusThrowOrbs() {
                if (this.zeusArmRaised) return; // Уже в процессе

                this.zeusArmRaised = true;
                const armContainer = document.getElementById('zeusArmContainer');
                if (armContainer) armContainer.classList.add('raised');

                setTimeout(() => {
                    this.zeusLightningActive = true;
                    const lightning = document.getElementById('zeusLightning');
                    if (lightning) lightning.classList.add('active');

                    const orbCount = 2 + Math.floor(Math.random() * 4);
                    const usedCells = new Set();

                    for (let i = 0; i < orbCount; i++) {
                        let r, c;
                        do {
                            r = Math.floor(Math.random() * ROWS);
                            c = Math.floor(Math.random() * COLS);
                        } while (usedCells.has(`${r},${c}`) && usedCells.size < ROWS * COLS);

                        if (usedCells.size >= ROWS * COLS) break;
                        usedCells.add(`${r},${c}`);

                        const multiplier = ORB_MULTIPLIERS[Math.floor(Math.random() * ORB_MULTIPLIERS.length)];
                        const colors = ['#2ecc71', '#3498db', '#e91e90', '#ffd700'];
                        const color = colors[Math.floor(Math.random() * colors.length)];

                        this.grid[r][c].hasOrb = true;
                        this.grid[r][c].orbMultiplier = multiplier;
                        this.activeOrbs.push({ r, c, multiplier, color });

                        this.spawnOrbEffect(r, c, color, multiplier);
                    }

                    setTimeout(() => {
                        this.zeusLightningActive = false;
                        this.zeusArmRaised = false;
                        if (armContainer) armContainer.classList.remove('raised');
                        if (lightning) lightning.classList.remove('active');
                    }, 400);

                }, 400);
            }

            spawnOrbEffect(r, c, color, multiplier) {
                const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                const y = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                const orbDiv = document.createElement('div');
                orbDiv.className = 'orb-popup';
                orbDiv.textContent = `${multiplier}x`;
                orbDiv.style.left = x + 'px';
                orbDiv.style.top = y + 'px';
                orbDiv.style.color = color;
                const mainArea = document.getElementById('mainArea');
                if (mainArea) mainArea.appendChild(orbDiv);
                setTimeout(() => orbDiv.remove(), 1800);
            }

            applyOrbsToWin(baseWin) {
                if (this.activeOrbs.length === 0) return baseWin;
                if (baseWin <= 0) return 0;

                let totalOrbMultiplier = 0;
                for (const orb of this.activeOrbs) {
                    totalOrbMultiplier += orb.multiplier;
                }

                if (this.isFreeSpins) {
                    // В бонусе: добавляем орбы в накопитель и применяем его
                    this.totalMultiplier += totalOrbMultiplier;
                    this.updateTotalMultiplierDisplay();
                    return baseWin * this.totalMultiplier;
                } else {
                    // В обычной игре: просто суммируем орбы
                    return baseWin * (1 + totalOrbMultiplier);
                }
            }

            // ==================== ОСНОВНОЙ ЦИКЛ ====================
            async spin() {
                if (this.state !== GameStateEnum.IDLE || this.isProcessing) return;
                this.isProcessing = true;
                this.state = GameStateEnum.SPINNING;
                this.totalWin = 0;
                this.clearOrbs();
                this.particles = [];

                await this.animateInitialDrop();
                await this.sleep(300);

                // Цикл тамблов
                await this.tumbleCycle();

                const finalWin = this.applyOrbsToWin(this.totalWin);
                this.totalWin = finalWin;
                await this.animateWinCounter(finalWin);

                // Проверка скаттеров
                const scatterCount = this.countScatters();
                if (scatterCount >= 4 && !this.isFreeSpins) {
                    await this.enterBonusGame(15);
                } else if (scatterCount >= 3 && this.isFreeSpins) {
                    this.freeSpinsRemaining += 5;
                    this.updateFreespinDisplay();
                    this.showRetriggerEffect();
                }

                if (this.isFreeSpins) {
                    this.freeSpinsRemaining--;
                    this.updateFreespinDisplay();
                    if (this.freeSpinsRemaining <= 0) {
                        this.exitBonusGame();
                    }
                }

                this.state = GameStateEnum.IDLE;
                this.isProcessing = false;
                this.updateSpinButton();
            }

            async animateInitialDrop() {
                // Поднимаем все символы наверх
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        this.grid[r][c].symbol = this.randomSymbol();
                        this.grid[r][c].y = -100 - r * 50 - c * 15;
                        this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                        this.grid[r][c].velocity = 0;
                        this.grid[r][c].scale = 1;
                        this.grid[r][c].opacity = 1;
                        this.grid[r][c].isWinning = false;
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                        this.grid[r][c].bounceOffset = 0;
                    }
                }

                // Падение по столбцам
                const promises = [];
                for (let c = 0; c < COLS; c++) {
                    promises.push(this.dropColumn(c, c * 50));
                }
                await Promise.all(promises);
                await this.sleep(300);
            }

            dropColumn(col, delay) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const GRAVITY = 1.2;
                        const DAMPING = 0.35;
                        const BOUNCE_HEIGHT = 8;
                        let allSettled = false;
                        let settleCount = 0;

                        const animate = () => {
                            allSettled = true;
                            for (let r = 0; r < ROWS; r++) {
                                const cell = this.grid[r][col];
                                const target = cell.targetY;
                                const dy = target - cell.y;

                                if (Math.abs(dy) > 0.3) {
                                    allSettled = false;
                                    cell.velocity += GRAVITY;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy) + 1);

                                    if (cell.y >= target) {
                                        cell.y = target;
                                        if (Math.abs(cell.velocity) > 1) {
                                            cell.bounceOffset = -BOUNCE_HEIGHT;
                                            cell.velocity = -cell.velocity * DAMPING;
                                        } else {
                                            cell.velocity = 0;
                                            cell.bounceOffset = 0;
                                        }
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                    // Затухание отскока
                                    if (cell.bounceOffset < 0) {
                                        cell.bounceOffset *= 0.7;
                                        if (Math.abs(cell.bounceOffset) < 0.3) cell.bounceOffset = 0;
                                    }
                                }
                            }

                            if (!allSettled) {
                                requestAnimationFrame(animate);
                            } else {
                                settleCount++;
                                if (settleCount < 5) {
                                    // Даем время на затухание отскоков
                                    requestAnimationFrame(animate);
                                } else {
                                    // Финально фиксируем позиции
                                    for (let r = 0; r < ROWS; r++) {
                                        this.grid[r][col].y = this.grid[r][col].targetY;
                                        this.grid[r][col].bounceOffset = 0;
                                        this.grid[r][col].velocity = 0;
                                    }
                                    resolve();
                                }
                            }
                        };
                        requestAnimationFrame(animate);
                    }, delay);
                });
            }

            async tumbleCycle() {
                let hasWins = true;
                let iterations = 0;
                const maxIterations = 20; // Защита от бесконечного цикла

                while (hasWins && iterations < maxIterations) {
                    iterations++;
                    this.state = GameStateEnum.TUMBLING;
                    await this.sleep(300);

                    const groups = this.findGroups();
                    if (groups.length === 0) {
                        hasWins = false;
                        break;
                    }

                    let cycleWin = 0;
                    for (const group of groups) {
                        cycleWin += group.payout;
                    }
                    this.totalWin += cycleWin;

                    this.state = GameStateEnum.WIN_ANIMATION;
                    await this.animateWinningSymbols(groups);
                    await this.sleep(200);

                    this.removeWinningSymbols(groups);
                    await this.sleep(100);

                    // Сдвиг и заполнение
                    this.applyGravity();
                    this.fillEmptyCells();
                    await this.animateGravityDrop();
                    await this.sleep(200);
                }
            }

            async animateWinningSymbols(groups) {
                const winningCells = [];
                for (const group of groups) {
                    for (const cell of group.cells) {
                        winningCells.push(this.grid[cell.r][cell.c]);
                    }
                }

                return new Promise(resolve => {
                    const startTime = performance.now();
                    const duration = 400;

                    const pulse = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const scale = 1 + Math.sin(progress * Math.PI * 3) * 0.12;
                        for (const cell of winningCells) {
                            cell.scale = scale;
                        }
                        if (progress < 1) {
                            requestAnimationFrame(pulse);
                        } else {
                            for (const cell of winningCells) {
                                cell.scale = 1;
                            }
                            resolve();
                        }
                    };
                    requestAnimationFrame(pulse);
                });
            }

            async animateGravityDrop() {
                return new Promise(resolve => {
                    const GRAVITY = 1.0;
                    const DAMPING = 0.3;
                    let allSettled = true;
                    let settleCount = 0;

                    const animate = () => {
                        allSettled = true;
                        for (let c = 0; c < COLS; c++) {
                            for (let r = 0; r < ROWS; r++) {
                                const cell = this.grid[r][c];
                                if (!cell.symbol) continue;
                                const target = cell.targetY;
                                const dy = target - cell.y;

                                if (Math.abs(dy) > 0.3) {
                                    allSettled = false;
                                    cell.velocity += GRAVITY;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy) + 1);

                                    if (cell.y >= target) {
                                        cell.y = target;
                                        if (Math.abs(cell.velocity) > 0.5) {
                                            cell.bounceOffset = -5;
                                            cell.velocity = -cell.velocity * DAMPING;
                                        } else {
                                            cell.velocity = 0;
                                            cell.bounceOffset = 0;
                                        }
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                    if (cell.bounceOffset < 0) {
                                        cell.bounceOffset *= 0.7;
                                        if (Math.abs(cell.bounceOffset) < 0.3) cell.bounceOffset = 0;
                                    }
                                }
                            }
                        }

                        if (!allSettled) {
                            requestAnimationFrame(animate);
                        } else {
                            settleCount++;
                            if (settleCount < 4) {
                                requestAnimationFrame(animate);
                            } else {
                                for (let c = 0; c < COLS; c++) {
                                    for (let r = 0; r < ROWS; r++) {
                                        const cell = this.grid[r][c];
                                        cell.y = cell.targetY;
                                        cell.bounceOffset = 0;
                                        cell.velocity = 0;
                                    }
                                }
                                resolve();
                            }
                        }
                    };
                    requestAnimationFrame(animate);
                });
            }

            async animateWinCounter(targetWin) {
                const startWin = this.displayedWin;
                const duration = 800;
                const startTime = performance.now();

                return new Promise(resolve => {
                    const count = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        this.displayedWin = Math.round((startWin + (targetWin - startWin) * eased) * 100) /
                            100;
                        this.updateWinDisplay();

                        if (progress < 1) {
                            requestAnimationFrame(count);
                        } else {
                            this.displayedWin = Math.round(targetWin * 100) / 100;
                            this.updateWinDisplay();
                            resolve();
                        }
                    };
                    requestAnimationFrame(count);
                });
            }

            countScatters() {
                let count = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c].symbol === SYMBOLS.SCATTER) count++;
                    }
                }
                return count;
            }

            async enterBonusGame(spins) {
                this.state = GameStateEnum.BONUS_TRANSITION;
                this.isFreeSpins = true;
                this.freeSpinsRemaining = spins;
                this.totalMultiplier = 1;

                document.getElementById('leftPanel').classList.remove('inactive');
                document.getElementById('freespinBadge').classList.add('active');
                this.updateFreespinDisplay();
                this.updateTotalMultiplierDisplay();

                // Показываем оверлей
                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                if (spinsDisplay) spinsDisplay.textContent = spins;
                if (overlay) overlay.classList.add('active');

                document.body.classList.add('zeus-rage');
                await this.sleep(2500);
                document.body.classList.remove('zeus-rage');

                if (overlay) overlay.classList.remove('active');
                this.state = GameStateEnum.IDLE;
            }

            exitBonusGame() {
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;
                document.getElementById('leftPanel').classList.add('inactive');
                document.getElementById('freespinBadge').classList.remove('active');
                this.updateTotalMultiplierDisplay();
            }

            showRetriggerEffect() {
                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                if (spinsDisplay) spinsDisplay.textContent = '+5 SPINS';
                if (overlay) overlay.classList.add('active');
                setTimeout(() => {
                    if (overlay) overlay.classList.remove('active');
                }, 1500);
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            updateWinDisplay() {
                const el = document.getElementById('winDisplay');
                if (el) {
                    el.textContent = this.displayedWin.toFixed(2);
                    el.classList.add('counting');
                    setTimeout(() => el.classList.remove('counting'), 100);
                }
            }

            updateFreespinDisplay() {
                const el = document.getElementById('freespinCountDisplay');
                if (el) el.textContent = this.freeSpinsRemaining;
            }

            updateTotalMultiplierDisplay() {
                const el = document.getElementById('totalMultiplierDisplay');
                if (el) {
                    el.textContent = this.totalMultiplier + 'x';
                    el.classList.add('pulse');
                    setTimeout(() => el.classList.remove('pulse'), 300);
                }
            }

            updateSpinButton() {
                const btn = document.getElementById('btnSpin');
                if (!btn) return;
                if (this.isFreeSpins) {
                    btn.textContent = 'FREE';
                } else {
                    btn.textContent = 'SPIN';
                }
                btn.disabled = this.state !== GameStateEnum.IDLE;
            }

            // ==================== РЕНДЕРИНГ ====================
            render(ctx) {
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

                // Фон сетки
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const baseY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;

                        ctx.fillStyle = 'rgba(15, 15, 35, 0.5)';
                        ctx.strokeStyle = 'rgba(80, 80, 120, 0.25)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(
                            GRID_OFFSET_X + c * CELL_SIZE + 5,
                            GRID_OFFSET_Y + r * CELL_SIZE + 5,
                            CELL_SIZE - 10,
                            CELL_SIZE - 10,
                            8
                        );
                        ctx.fill();
                        ctx.stroke();
                    }
                }

                // Символы
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = this.grid[r][c];
                        if (!cell.symbol) continue;

                        const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const y = cell.y + cell.bounceOffset;

                        ctx.save();
                        ctx.translate(x, y);
                        ctx.scale(cell.scale, cell.scale);
                        ctx.globalAlpha = cell.opacity;

                        // Свечение выигрыша
                        if (cell.isWinning) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 25;
                        }

                        // Ореол сферы
                        if (cell.hasOrb) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 20;
                            ctx.fillStyle = 'rgba(255, 215, 0, 0.25)';
                            ctx.beginPath();
                            ctx.arc(0, 0, SYMBOL_SIZE / 2 + 8, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }

                        // Круг символа
                        const color = SYMBOL_COLORS[cell.symbol] || '#666';
                        const gradient = ctx.createRadialGradient(-3, -8, 3, 0, 0, SYMBOL_SIZE / 2);
                        gradient.addColorStop(0, this.lightenColor(color, 50));
                        gradient.addColorStop(1, color);

                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(0, 0, SYMBOL_SIZE / 2, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        // Эмодзи или иконка
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.font = `${SYMBOL_SIZE * 0.55}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#fff';

                        // Для скаттера рисуем лицо Деда
                        if (cell.symbol === SYMBOLS.SCATTER) {
                            this.drawZeusIcon(ctx, SYMBOL_SIZE);
                        } else {
                            ctx.fillText(SYMBOL_EMOJIS[cell.symbol] || '?', 0, 2);
                        }

                        // Множитель сферы
                        if (cell.hasOrb) {
                            ctx.font = 'bold 13px Arial';
                            ctx.fillStyle = '#ffd700';
                            ctx.shadowColor = 'rgba(0,0,0,0.8)';
                            ctx.shadowBlur = 3;
                            ctx.fillText(`x${cell.orbMultiplier}`, 0, -SYMBOL_SIZE / 2 - 12);
                            ctx.shadowBlur = 0;
                        }

                        ctx.restore();
                    }
                }

                // Частицы
                for (const p of this.particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            drawZeusIcon(ctx, size) {
                const s = size * 0.7;
                // Голова
                ctx.fillStyle = '#f5e6d3';
                ctx.beginPath();
                ctx.arc(0, -s * 0.1, s * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#c4a882';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Борода
                ctx.fillStyle = '#e8d5c0';
                ctx.beginPath();
                ctx.moveTo(-s * 0.25, s * 0.05);
                ctx.quadraticCurveTo(0, s * 0.55, s * 0.25, s * 0.05);
                ctx.quadraticCurveTo(0, s * 0.2, -s * 0.25, s * 0.05);
                ctx.fill();
                ctx.stroke();

                // Корона
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(-s * 0.25, -s * 0.4);
                ctx.lineTo(-s * 0.2, -s * 0.55);
                ctx.lineTo(-s * 0.05, -s * 0.35);
                ctx.lineTo(0, -s * 0.6);
                ctx.lineTo(s * 0.05, -s * 0.35);
                ctx.lineTo(s * 0.2, -s * 0.55);
                ctx.lineTo(s * 0.25, -s * 0.4);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#b8860b';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Глаза
                ctx.fillStyle = '#1a1a3a';
                ctx.beginPath();
                ctx.arc(-s * 0.1, -s * 0.15, s * 0.05, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.1, -s * 0.15, s * 0.05, 0, Math.PI * 2);
                ctx.fill();

                // Молния (маленькая, на фоне)
                ctx.fillStyle = '#ffd700';
                ctx.font = `${s * 0.5}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('⚡', 0, -s * 0.2);
            }

            lightenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF00) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return `rgb(${R},${G},${B})`;
            }
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const engine = new SlotEngine();

        // Polyfill roundRect
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                ctx.beginPath();
                ctx.moveTo(x + r.tl, y);
                ctx.lineTo(x + w - r.tr, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                ctx.lineTo(x + w, y + h - r.br);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                ctx.lineTo(x + r.bl, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                ctx.lineTo(x, y + r.tl);
                ctx.quadraticCurveTo(x, y, x + r.tl, y);
                ctx.closePath();
            };
        }

        document.getElementById('btnSpin').addEventListener('click', () => {
            if (!engine.isProcessing && engine.state === GameStateEnum.IDLE) {
                engine.spin();
            }
        });

        // Главный цикл рендеринга
        function gameLoop() {
            engine.updateParticles();
            engine.render(ctx);
            engine.updateSpinButton();

            // Zeus Rage при больших множителях
            if (engine.activeOrbs.some(o => o.multiplier >= 50)) {
                if (!document.body.classList.contains('zeus-rage')) {
                    document.body.classList.add('zeus-rage');
                    setTimeout(() => document.body.classList.remove('zeus-rage'), 2000);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        engine.initGrid();
        engine.updateWinDisplay();
        engine.updateSpinButton();
        gameLoop();

        console.log('⚡ Zeus Thunder - Слот запущен!');
        console.log('🎅 Скаттер: Дед Зевс (от 4 шт. — бонус, от 3 шт. в бонусе — +5 спинов)');
        console.log('💎 Tumble: группы от 8 символов');
        console.log('🌩️ Сферы: множители 2x-500x от Зевса');
        console.log('🔄 Free Spins: накопительный множитель');
    </script>
</body>
</html>
