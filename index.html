<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Thunder - Cascade Slot</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --gold: #ffd700;
            --red: #e63946;
            --dark-gold: #b8860b;
            --cell-size: 85px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        body.zeus-rage {
            animation: rageBg 0.6s ease-in-out forwards;
        }

        @keyframes rageBg {
            0% {
                background: var(--bg);
            }
            50% {
                background: #2d0a0a;
            }
            100% {
                background: #1a0800;
            }
        }

        .game-container {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: stretch;
            padding: 20px;
        }

        /* ---- ЛЕВАЯ ПАНЕЛЬ ---- */
        .left-panel {
            width: 85px;
            background: linear-gradient(180deg, #1a1a3a 0%, #0d0d2b 100%);
            border: 2px solid #3a3a6a;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 10px;
            transition: all 0.3s;
        }

        .left-panel.inactive {
            opacity: 0.3;
            border-color: #2a2a4a;
        }

        .left-panel .panel-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .left-panel .multiplier-counter {
            color: #ffd700;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            transition: all 0.2s;
        }

        .left-panel .multiplier-counter.pulse {
            animation: counterPulse 0.3s ease-out;
        }

        @keyframes counterPulse {
            0% {
                transform: scale(1.6);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        /* ---- ОСНОВНОЕ ПОЛЕ ---- */
        .main-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 10px;
        }

        .game-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 3px;
        }

        .freespin-badge {
            background: linear-gradient(135deg, #e63946, #ff6b6b);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            animation: badgeGlow 1.5s ease-in-out infinite;
            display: none;
        }

        .freespin-badge.active {
            display: block;
        }

        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(230, 57, 70, 0.9);
            }
        }

        .freespin-counter {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }

        .freespin-counter span {
            color: #fff;
            font-size: 26px;
        }

        /* ---- Canvas ---- */
        canvas {
            border: 3px solid #4a3a2a;
            border-radius: 15px;
            background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s;
        }

        body.zeus-rage canvas {
            box-shadow: 0 0 60px rgba(255, 80, 0, 0.6), inset 0 0 80px rgba(200, 50, 0, 0.3);
            border-color: #8b0000;
        }

        /* ---- ПРАВАЯ ПАНЕЛЬ ---- */
        .right-panel {
            width: 135px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .zeus-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .zeus-figure {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 105px;
            transition: transform 0.3s;
        }

        .zeus-body {
            width: 75px;
            height: 95px;
            background: linear-gradient(180deg, #f5f0e8 0%, #e0d5c0 60%, #c4b5a0 100%);
            border-radius: 22px 22px 5px 5px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .zeus-toga {
            position: absolute;
            bottom: 0;
            left: -6px;
            right: -6px;
            height: 55px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.85) 0%, #e8ddd0 100%);
            border-radius: 0 0 12px 12px;
            clip-path: polygon(0% 25%, 50% 0%, 100% 25%, 100% 100%, 0% 100%);
        }

        .zeus-head {
            width: 55px;
            height: 58px;
            background: radial-gradient(circle at 50% 40%, #f5e6d3 0%, #d4b896 100%);
            border-radius: 50%;
            margin: -32px auto 0;
            position: relative;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .zeus-beard {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 38px;
            height: 32px;
            background: linear-gradient(180deg, #e8d5c0 0%, #c4b5a0 100%);
            border-radius: 0 0 22px 22px;
            clip-path: polygon(18% 0%, 82% 0%, 100% 100%, 0% 100%);
        }

        .zeus-eyes {
            position: absolute;
            top: 19px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 9px;
        }

        .zeus-eye {
            width: 7px;
            height: 9px;
            background: #1a1a3a;
            border-radius: 50%;
        }

        .zeus-crown {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 38px;
            height: 20px;
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            clip-path: polygon(0% 100%, 8% 28%, 28% 0%, 50% 48%, 72% 0%, 92% 28%, 100% 100%);
            box-shadow: 0 0 22px rgba(255, 215, 0, 0.7);
            animation: crownGlow 2s ease-in-out infinite;
        }

        @keyframes crownGlow {
            0%,
            100% {
                box-shadow: 0 0 22px rgba(255, 215, 0, 0.7);
            }
            50% {
                box-shadow: 0 0 38px rgba(255, 215, 0, 1), 0 0 65px rgba(255, 200, 0, 0.5);
            }
        }

        .zeus-arm-container {
            position: absolute;
            top: 18px;
            right: -18px;
            z-index: 10;
            transform-origin: top left;
            transition: transform 0.4s ease-in-out;
        }

        .zeus-arm-container.raised {
            transform: rotate(-135deg);
        }

        .zeus-arm {
            width: 22px;
            height: 65px;
            background: linear-gradient(180deg, #f5e6d3 0%, #d4b896 100%);
            border-radius: 9px;
            position: relative;
        }

        .zeus-hand {
            width: 18px;
            height: 18px;
            background: #f5e6d3;
            border-radius: 50%;
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
        }

        .zeus-lightning {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 32px;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 0 22px #fff, 0 0 45px #ffd700, 0 0 65px #ff8c00;
            opacity: 0;
            transition: all 0.1s;
        }

        .zeus-lightning.active {
            opacity: 1;
            animation: lightningFlash 0.3s ease-out;
        }

        @keyframes lightningFlash {
            0% {
                opacity: 1;
                height: 28px;
                box-shadow: 0 0 32px #fff, 0 0 65px #ffd700;
            }
            50% {
                opacity: 1;
                height: 75px;
                box-shadow: 0 0 55px #fff, 0 0 85px #ffd700, 0 0 110px #ff8c00;
            }
            100% {
                opacity: 0;
                height: 12px;
            }
        }

        .zeus-legs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 3px;
        }

        .zeus-leg {
            width: 16px;
            height: 38px;
            background: linear-gradient(180deg, #e0d5c0 0%, #c4b5a0 100%);
            border-radius: 0 0 9px 9px;
        }

        .zeus-sandal {
            width: 22px;
            height: 13px;
            background: #8b6914;
            border-radius: 11px 11px 3px 3px;
            margin: 0 auto;
        }

        .zeus-cloud {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 105px;
            height: 28px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            filter: blur(8px);
        }

        /* ---- НИЖНЯЯ ПАНЕЛЬ ---- */
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 25px;
            background: linear-gradient(180deg, #1a1a3a, #0d0d2b);
            border: 2px solid #3a3a6a;
            border-radius: 40px;
            padding: 14px 32px;
        }

        .win-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .win-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .win-amount {
            color: #ffd700;
            font-size: 34px;
            font-weight: 900;
            text-shadow: 0 0 22px rgba(255, 215, 0, 0.5);
            transition: all 0.1s;
            min-width: 130px;
            text-align: center;
        }

        .win-amount.counting {
            animation: winCount 0.1s ease-out;
        }

        @keyframes winCount {
            0% {
                transform: scale(1.15);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: #ffd700;
            }
        }

        .bet-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bet-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bet-amount {
            color: #fff;
            font-size: 19px;
            font-weight: 700;
        }

        .btn-spin {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #e63946, #c0392b);
            color: #fff;
            font-size: 19px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 32px rgba(230, 57, 70, 0.4);
            text-transform: uppercase;
        }

        .btn-spin:hover {
            transform: scale(1.05);
            box-shadow: 0 0 48px rgba(230, 57, 70, 0.7);
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 12px rgba(230, 57, 70, 0.2);
        }

        /* ---- ВСПЛЫВАЮЩИЕ МНОЖИТЕЛИ ---- */
        .orb-popup {
            position: absolute;
            font-size: 24px;
            font-weight: 900;
            pointer-events: none;
            animation: orbFloat 1.8s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
        }

        @keyframes orbFloat {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            25% {
                transform: scale(1.5);
                opacity: 1;
            }
            70% {
                transform: scale(1);
                opacity: 0.9;
            }
            100% {
                transform: scale(0.6);
                opacity: 0;
            }
        }

        /* ---- БОНУС-ЭКРАН ---- */
        .bonus-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .bonus-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .bonus-popup {
            background: linear-gradient(135deg, #1a1a4a, #2a1a3a);
            border: 3px solid #ffd700;
            border-radius: 22px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 0 85px rgba(255, 215, 0, 0.5);
            animation: bonusIn 0.5s ease-out;
        }

        @keyframes bonusIn {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .bonus-popup h2 {
            color: #ffd700;
            font-size: 38px;
            margin-bottom: 12px;
            text-shadow: 0 0 35px rgba(255, 215, 0, 0.8);
        }

        .bonus-popup .bonus-spins {
            color: #fff;
            font-size: 65px;
            font-weight: 900;
            text-shadow: 0 0 45px rgba(255, 255, 255, 0.5);
        }

        .bonus-popup .bonus-subtitle {
            color: #ccc;
            font-size: 17px;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            .left-panel {
                width: 100%;
                flex-direction: row;
                height: 65px;
                padding: 10px;
            }
            .right-panel {
                display: none;
            }
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="bonus-overlay" id="bonusOverlay">
        <div class="bonus-popup">
            <h2>⚡ ЯРОСТЬ ЗЕВСА! ⚡</h2>
            <div class="bonus-spins" id="bonusSpinsDisplay">15</div>
            <div class="bonus-subtitle">FREE SPINS</div>
            <div class="bonus-subtitle" style="margin-top: 6px; font-size: 14px;">Накопительный множитель активирован!</div>
        </div>
    </div>

    <div class="game-container">
        <div class="left-panel inactive" id="leftPanel">
            <div class="panel-label">Total<br>Multiplier</div>
            <div class="multiplier-counter" id="totalMultiplierDisplay">1x</div>
        </div>

        <div class="main-area" id="mainArea">
            <div class="game-header">
                <div class="game-title">⚡ ZEUS THUNDER ⚡</div>
                <div class="freespin-badge" id="freespinBadge">
                    FREE SPINS <span id="freespinCountDisplay">15</span>
                </div>
            </div>
            <canvas id="gameCanvas" width="630" height="525"></canvas>
            <div class="bottom-panel">
                <div class="win-display">
                    <div class="win-label">Выигрыш</div>
                    <div class="win-amount" id="winDisplay">0</div>
                </div>
                <div class="bet-display">
                    <div class="bet-label">Ставка</div>
                    <div class="bet-amount" id="betDisplay">1.00</div>
                </div>
                <button class="btn-spin" id="btnSpin">SPIN</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="zeus-container" id="zeusContainer">
                <div class="zeus-figure">
                    <div class="zeus-head">
                        <div class="zeus-crown"></div>
                        <div class="zeus-eyes">
                            <div class="zeus-eye"></div>
                            <div class="zeus-eye"></div>
                        </div>
                        <div class="zeus-beard"></div>
                    </div>
                    <div class="zeus-body">
                        <div class="zeus-toga"></div>
                        <div class="zeus-arm-container" id="zeusArmContainer">
                            <div class="zeus-arm">
                                <div class="zeus-hand"></div>
                            </div>
                            <div class="zeus-lightning" id="zeusLightning"></div>
                        </div>
                    </div>
                    <div class="zeus-legs">
                        <div class="zeus-leg">
                            <div class="zeus-sandal"></div>
                        </div>
                        <div class="zeus-leg">
                            <div class="zeus-sandal"></div>
                        </div>
                    </div>
                    <div class="zeus-cloud"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== КОНСТАНТЫ ====================
        const COLS = 6;
        const ROWS = 5;
        const CELL_SIZE = 85;
        const GRID_OFFSET_X = 45;
        const GRID_OFFSET_Y = 45;
        const SYMBOL_SIZE = 52;
        const CASCADE_DELAY = 2000; // 2 секунды задержки

        // 10 символов
        const SYMBOLS = {
            BLUE_CRYSTAL: 'blue_crystal',
            GREEN_CRYSTAL: 'green_crystal',
            YELLOW_CRYSTAL: 'yellow_crystal',
            PURPLE_CRYSTAL: 'purple_crystal',
            RED_CRYSTAL: 'red_crystal',
            CUP: 'cup',
            RING: 'ring',
            HOURGLASS: 'hourglass',
            CROWN: 'crown',
            ZEUS_SCATTER: 'zeus_scatter'
        };

        const LOW_SYMBOLS = [
            SYMBOLS.BLUE_CRYSTAL,
            SYMBOLS.GREEN_CRYSTAL,
            SYMBOLS.YELLOW_CRYSTAL,
            SYMBOLS.PURPLE_CRYSTAL,
            SYMBOLS.RED_CRYSTAL
        ];

        const MID_SYMBOLS = [SYMBOLS.CUP, SYMBOLS.RING];
        const HIGH_SYMBOLS = [SYMBOLS.HOURGLASS, SYMBOLS.CROWN];
        const ALL_REGULAR_SYMBOLS = [...LOW_SYMBOLS, ...MID_SYMBOLS, ...HIGH_SYMBOLS];

        // Таблица выплат (количество -> множитель ставки)
        const PAYTABLE = {
            blue_crystal: { 8: 2, 9: 3, 10: 5, 11: 8, 12: 12 },
            green_crystal: { 8: 2, 9: 3, 10: 5, 11: 8, 12: 12 },
            yellow_crystal: { 8: 3, 9: 4, 10: 6, 11: 10, 12: 15 },
            purple_crystal: { 8: 3, 9: 4, 10: 6, 11: 10, 12: 15 },
            red_crystal: { 8: 4, 9: 6, 10: 8, 11: 12, 12: 18 },
            cup: { 8: 5, 9: 8, 10: 12, 11: 18, 12: 25 },
            ring: { 8: 5, 9: 8, 10: 12, 11: 18, 12: 25 },
            hourglass: { 8: 10, 9: 15, 10: 25, 11: 40, 12: 50 },
            crown: { 8: 15, 9: 25, 10: 40, 11: 60, 12: 100 },
            zeus_scatter: { 4: 3, 5: 10, 6: 50, 7: 100, 8: 200 }
        };

        // Множители с вероятностями
        const ORB_MULTIPLIERS_COMMON = [2, 2, 2, 3, 3, 3, 4, 4, 5, 5, 8, 8]; // ~15% шанс
        const ORB_MULTIPLIERS_RARE = [10, 10, 15, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70, 75]; // ~5% шанс
        const ORB_MULTIPLIERS_LEGENDARY = [100, 150, 200, 250, 500]; // ~0.5% шанс

        // Цвета символов
        const SYMBOL_COLORS = {
            blue_crystal: '#3498db',
            green_crystal: '#2ecc71',
            yellow_crystal: '#f1c40f',
            purple_crystal: '#9b59b6',
            red_crystal: '#e74c3c',
            cup: '#1abc9c',
            ring: '#e67e22',
            hourglass: '#f39c12',
            crown: '#e74c3c',
            zeus_scatter: '#ffd700'
        };

        const SYMBOL_EMOJIS = {
            blue_crystal: '💎',
            green_crystal: '💚',
            yellow_crystal: '💛',
            purple_crystal: '💜',
            red_crystal: '❤️',
            cup: '🏆',
            ring: '💍',
            hourglass: '⏳',
            crown: '👑',
            zeus_scatter: '⚡'
        };

        // ==================== СОСТОЯНИЯ ИГРЫ ====================
        const GameStateEnum = {
            IDLE: 'IDLE',
            SPINNING: 'SPINNING',
            CASCADING: 'CASCADING',
            WIN_ANIMATION: 'WIN_ANIMATION',
            BONUS_TRANSITION: 'BONUS_TRANSITION'
        };

        class SlotEngine {
            constructor() {
                this.grid = [];
                this.state = GameStateEnum.IDLE;
                this.bet = 1.0;
                this.totalWin = 0;
                this.displayedWin = 0;
                this.isProcessing = false;

                // Бонусный режим
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;

                // Сферы на поле
                this.activeOrbs = [];
                this.particles = [];

                // Зевс
                this.zeusArmRaised = false;
                this.zeusLightningActive = false;

                // Для анимации каскада
                this.cascadeInProgress = false;
                this.cascadeColumnsAnimated = [];

                this.initGrid();
            }

            initGrid() {
                this.grid = [];
                for (let r = 0; r < ROWS; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        this.grid[r][c] = {
                            symbol: this.getRandomRegularSymbol(),
                            y: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                            targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                            velocity: 0,
                            scale: 1,
                            opacity: 1,
                            isWinning: false,
                            isExploding: false,
                            hasOrb: false,
                            orbMultiplier: 1,
                            bounceOffset: 0,
                            columnDropOrder: c,
                            rowPosition: r
                        };
                    }
                }
                this.clearOrbs();
            }

            getRandomRegularSymbol() {
                const rand = Math.random();
                if (rand < 0.04) return SYMBOLS.ZEUS_SCATTER;
                if (rand < 0.12) return HIGH_SYMBOLS[Math.floor(Math.random() * HIGH_SYMBOLS.length)];
                if (rand < 0.28) return MID_SYMBOLS[Math.floor(Math.random() * MID_SYMBOLS.length)];
                return LOW_SYMBOLS[Math.floor(Math.random() * LOW_SYMBOLS.length)];
            }

            getRandomSymbolForCascade() {
                const rand = Math.random();
                if (rand < 0.03) return SYMBOLS.ZEUS_SCATTER;
                if (rand < 0.10) return HIGH_SYMBOLS[Math.floor(Math.random() * HIGH_SYMBOLS.length)];
                if (rand < 0.25) return MID_SYMBOLS[Math.floor(Math.random() * MID_SYMBOLS.length)];
                return LOW_SYMBOLS[Math.floor(Math.random() * LOW_SYMBOLS.length)];
            }

            clearOrbs() {
                this.activeOrbs = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r] && this.grid[r][c]) {
                            this.grid[r][c].hasOrb = false;
                            this.grid[r][c].orbMultiplier = 1;
                        }
                    }
                }
            }

            // ==================== ПОИСК ГРУПП ====================
            findGroups() {
                const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
                const groups = [];

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (visited[r][c] || !this.grid[r][c] || !this.grid[r][c].symbol) continue;
                        if (this.grid[r][c].isExploding) continue;

                        const symbol = this.grid[r][c].symbol;
                        const group = [];
                        const stack = [{ r, c }];

                        while (stack.length > 0) {
                            const { r: cr, c: cc } = stack.pop();
                            if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
                            if (visited[cr][cc]) continue;
                            if (!this.grid[cr][cc] || !this.grid[cr][cc].symbol) continue;
                            if (this.grid[cr][cc].symbol !== symbol) continue;
                            if (this.grid[cr][cc].isExploding) continue;

                            visited[cr][cc] = true;
                            group.push({ r: cr, c: cc });

                            stack.push({ r: cr - 1, c: cc });
                            stack.push({ r: cr + 1, c: cc });
                            stack.push({ r: cr, c: cc - 1 });
                            stack.push({ r: cr, c: cc + 1 });
                        }

                        const minCount = symbol === SYMBOLS.ZEUS_SCATTER ? 4 : 8;
                        if (group.length >= minCount) {
                            groups.push({
                                symbol,
                                cells: group,
                                count: group.length,
                                payout: this.getPayout(symbol, group.length)
                            });
                        }
                    }
                }
                return groups;
            }

            getPayout(symbol, count) {
                const table = PAYTABLE[symbol];
                if (!table) return 0;
                const thresholds = Object.keys(table).map(Number).sort((a, b) => a - b);
                let payout = 0;
                for (const threshold of thresholds) {
                    if (count >= threshold) {
                        payout = table[threshold];
                    }
                }
                return payout * this.bet;
            }

            // ==================== КАСКАДНАЯ МЕХАНИКА ====================
            applyCascadeGravity() {
                let moved = false;
                for (let c = 0; c < COLS; c++) {
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (!this.grid[r][c] || this.grid[r][c].symbol === null || this.grid[r][c].isExploding) {
                            // Ищем символ сверху
                            for (let above = r - 1; above >= 0; above--) {
                                if (this.grid[above][c] && this.grid[above][c].symbol !== null && !this.grid[
                                        above][c].isExploding) {
                                    // Перемещаем символ вниз
                                    if (!this.grid[r][c]) {
                                        this.grid[r][c] = {
                                            symbol: null,
                                            y: 0,
                                            targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                                            velocity: 0,
                                            scale: 1,
                                            opacity: 1,
                                            isWinning: false,
                                            isExploding: false,
                                            hasOrb: false,
                                            orbMultiplier: 1,
                                            bounceOffset: 0,
                                            columnDropOrder: c,
                                            rowPosition: r
                                        };
                                    }
                                    this.grid[r][c].symbol = this.grid[above][c].symbol;
                                    this.grid[r][c].hasOrb = this.grid[above][c].hasOrb;
                                    this.grid[r][c].orbMultiplier = this.grid[above][c].orbMultiplier;
                                    this.grid[r][c].y = this.grid[above][c].y;
                                    this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                                    this.grid[r][c].velocity = 0;
                                    this.grid[r][c].scale = 1;
                                    this.grid[r][c].opacity = 1;
                                    this.grid[r][c].isWinning = false;
                                    this.grid[r][c].isExploding = false;
                                    this.grid[r][c].bounceOffset = 0;
                                    this.grid[r][c].rowPosition = r;

                                    // Очищаем верхнюю ячейку
                                    this.grid[above][c].symbol = null;
                                    this.grid[above][c].hasOrb = false;
                                    this.grid[above][c].orbMultiplier = 1;
                                    this.grid[above][c].isWinning = false;
                                    this.grid[above][c].isExploding = false;
                                    moved = true;
                                    break;
                                }
                            }
                        }
                    }
                }
                return moved;
            }

            fillEmptyCellsForCascade() {
                for (let c = 0; c < COLS; c++) {
                    let emptyCount = 0;
                    // Считаем пустые ячейки в колонке
                    for (let r = 0; r < ROWS; r++) {
                        if (!this.grid[r][c] || this.grid[r][c].symbol === null || this.grid[r][c].isExploding) {
                            emptyCount++;
                        }
                    }

                    let newSymbolsAdded = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (!this.grid[r][c] || this.grid[r][c].symbol === null || this.grid[r][c].isExploding) {
                            if (!this.grid[r][c]) {
                                this.grid[r][c] = {
                                    symbol: null,
                                    y: 0,
                                    targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                                    velocity: 0,
                                    scale: 1,
                                    opacity: 1,
                                    isWinning: false,
                                    isExploding: false,
                                    hasOrb: false,
                                    orbMultiplier: 1,
                                    bounceOffset: 0,
                                    columnDropOrder: c,
                                    rowPosition: r
                                };
                            }
                            this.grid[r][c].symbol = this.getRandomSymbolForCascade();
                            this.grid[r][c].y = GRID_OFFSET_Y - (emptyCount - newSymbolsAdded) * CELL_SIZE - 30;
                            this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                            this.grid[r][c].velocity = 0;
                            this.grid[r][c].scale = 1;
                            this.grid[r][c].opacity = 1;
                            this.grid[r][c].isWinning = false;
                            this.grid[r][c].isExploding = false;
                            this.grid[r][c].hasOrb = false;
                            this.grid[r][c].orbMultiplier = 1;
                            this.grid[r][c].bounceOffset = 0;
                            this.grid[r][c].rowPosition = r;
                            newSymbolsAdded++;
                        }
                    }
                }
            }

            spawnParticles(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
                    const speed = 3 + Math.random() * 6;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 3,
                        life: 1,
                        decay: 0.012 + Math.random() * 0.025,
                        color,
                        size: 2 + Math.random() * 5
                    });
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.12;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            // ==================== СФЕРЫ ОТ ЗЕВСА ====================
            getRandomOrbMultiplier() {
                const rand = Math.random();
                if (rand < 0.005) {
                    return ORB_MULTIPLIERS_LEGENDARY[Math.floor(Math.random() * ORB_MULTIPLIERS_LEGENDARY.length)];
                } else if (rand < 0.055) {
                    return ORB_MULTIPLIERS_RARE[Math.floor(Math.random() * ORB_MULTIPLIERS_RARE.length)];
                } else if (rand < 0.205) {
                    return ORB_MULTIPLIERS_COMMON[Math.floor(Math.random() * ORB_MULTIPLIERS_COMMON.length)];
                }
                return null;
            }

            zeusThrowOrbs() {
                if (this.zeusArmRaised) return;

                this.zeusArmRaised = true;
                const armContainer = document.getElementById('zeusArmContainer');
                if (armContainer) armContainer.classList.add('raised');

                setTimeout(() => {
                    this.zeusLightningActive = true;
                    const lightning = document.getElementById('zeusLightning');
                    if (lightning) lightning.classList.add('active');

                    const orbCount = 1 + Math.floor(Math.random() * 4);
                    const usedCells = new Set();

                    for (let i = 0; i < orbCount; i++) {
                        let r, c;
                        let attempts = 0;
                        do {
                            r = Math.floor(Math.random() * ROWS);
                            c = Math.floor(Math.random() * COLS);
                            attempts++;
                        } while (usedCells.has(`${r},${c}`) && attempts < ROWS * COLS * 2);

                        if (attempts >= ROWS * COLS * 2) break;
                        usedCells.add(`${r},${c}`);

                        const multiplier = this.getRandomOrbMultiplier();
                        if (!multiplier) continue;

                        const colors = ['#2ecc71', '#3498db', '#e91e90', '#ffd700'];
                        const color = colors[Math.floor(Math.random() * colors.length)];

                        if (this.grid[r] && this.grid[r][c]) {
                            this.grid[r][c].hasOrb = true;
                            this.grid[r][c].orbMultiplier = multiplier;
                            this.activeOrbs.push({ r, c, multiplier, color });
                            this.spawnOrbEffect(r, c, color, multiplier);
                        }
                    }

                    setTimeout(() => {
                        this.zeusLightningActive = false;
                        this.zeusArmRaised = false;
                        if (armContainer) armContainer.classList.remove('raised');
                        if (lightning) lightning.classList.remove('active');
                    }, 400);

                }, 400);
            }

            spawnOrbEffect(r, c, color, multiplier) {
                const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                const y = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                const orbDiv = document.createElement('div');
                orbDiv.className = 'orb-popup';
                orbDiv.textContent = `${multiplier}x`;
                orbDiv.style.left = x + 'px';
                orbDiv.style.top = y + 'px';
                orbDiv.style.color = color;
                const mainArea = document.getElementById('mainArea');
                if (mainArea) mainArea.appendChild(orbDiv);
                setTimeout(() => orbDiv.remove(), 1800);
            }

            applyOrbsToWin(baseWin) {
                if (this.activeOrbs.length === 0) return baseWin;
                if (baseWin <= 0) return 0;

                let totalOrbValue = 0;
                for (const orb of this.activeOrbs) {
                    totalOrbValue += orb.multiplier;
                }

                if (this.isFreeSpins) {
                    this.totalMultiplier += totalOrbValue;
                    this.updateTotalMultiplierDisplay();
                    return baseWin * this.totalMultiplier;
                } else {
                    return baseWin * (1 + totalOrbValue);
                }
            }

            // ==================== ОСНОВНОЙ ЦИКЛ ====================
            async spin() {
                if (this.state !== GameStateEnum.IDLE || this.isProcessing) return;
                this.isProcessing = true;
                this.state = GameStateEnum.SPINNING;
                this.totalWin = 0;
                this.displayedWin = 0;
                this.updateWinDisplay();
                this.clearOrbs();
                this.particles = [];

                // Инициализация нового поля
                await this.animateInitialCascade();

                // Запуск каскадного цикла
                await this.cascadeCycle();

                // Применяем орбы к финальному выигрышу
                const finalWin = this.applyOrbsToWin(this.totalWin);
                this.totalWin = finalWin;
                await this.animateWinCounter(finalWin);

                // Проверка скаттеров
                const scatterCount = this.countScatters();
                if (scatterCount >= 4 && !this.isFreeSpins) {
                    await this.enterBonusGame(15);
                } else if (scatterCount >= 3 && this.isFreeSpins) {
                    this.freeSpinsRemaining += 5;
                    this.updateFreespinDisplay();
                    this.showRetriggerEffect();
                }

                if (this.isFreeSpins) {
                    this.freeSpinsRemaining--;
                    this.updateFreespinDisplay();
                    if (this.freeSpinsRemaining <= 0) {
                        this.exitBonusGame();
                    }
                }

                this.state = GameStateEnum.IDLE;
                this.isProcessing = false;
                this.updateSpinButton();
            }

            async animateInitialCascade() {
                // Сбрасываем все символы наверх
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        if (!this.grid[r] || !this.grid[r][c]) {
                            if (!this.grid[r]) this.grid[r] = [];
                            this.grid[r][c] = {
                                symbol: null,
                                y: 0,
                                targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                                velocity: 0,
                                scale: 1,
                                opacity: 1,
                                isWinning: false,
                                isExploding: false,
                                hasOrb: false,
                                orbMultiplier: 1,
                                bounceOffset: 0,
                                columnDropOrder: c,
                                rowPosition: r
                            };
                        }
                        this.grid[r][c].symbol = this.getRandomRegularSymbol();
                        this.grid[r][c].y = -120 - r * 45 - c * 8;
                        this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                        this.grid[r][c].velocity = 0;
                        this.grid[r][c].scale = 1;
                        this.grid[r][c].opacity = 1;
                        this.grid[r][c].isWinning = false;
                        this.grid[r][c].isExploding = false;
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                        this.grid[r][c].bounceOffset = 0;
                        this.grid[r][c].rowPosition = r;
                    }
                }

                // Падение по столбцам (каскадом)
                const promises = [];
                for (let c = 0; c < COLS; c++) {
                    promises.push(this.dropColumnCascade(c, c * 60));
                }
                await Promise.all(promises);
                await this.sleep(400);
            }

            dropColumnCascade(col, delay) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const GRAVITY = 0.9;
                        const DAMPING = 0.3;
                        const BOUNCE_HEIGHT = 8;
                        let settleCount = 0;

                        const animate = () => {
                            let allSettled = true;
                            for (let r = 0; r < ROWS; r++) {
                                if (!this.grid[r] || !this.grid[r][col]) continue;
                                const cell = this.grid[r][col];
                                const target = cell.targetY;
                                const dy = target - cell.y;

                                if (Math.abs(dy) > 0.3) {
                                    allSettled = false;
                                    cell.velocity += GRAVITY;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy) + 1);

                                    if (cell.y >= target) {
                                        cell.y = target;
                                        if (Math.abs(cell.velocity) > 0.8) {
                                            cell.bounceOffset = -BOUNCE_HEIGHT * (Math.abs(cell.velocity) / 5);
                                            cell.velocity = -cell.velocity * DAMPING;
                                        } else {
                                            cell.velocity = 0;
                                            cell.bounceOffset = 0;
                                        }
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                    if (cell.bounceOffset < 0) {
                                        cell.bounceOffset *= 0.7;
                                        if (Math.abs(cell.bounceOffset) < 0.3) cell.bounceOffset = 0;
                                    }
                                }
                            }

                            if (!allSettled) {
                                requestAnimationFrame(animate);
                            } else {
                                settleCount++;
                                if (settleCount < 6) {
                                    requestAnimationFrame(animate);
                                } else {
                                    for (let r = 0; r < ROWS; r++) {
                                        if (this.grid[r] && this.grid[r][col]) {
                                            this.grid[r][col].y = this.grid[r][col].targetY;
                                            this.grid[r][col].bounceOffset = 0;
                                            this.grid[r][col].velocity = 0;
                                        }
                                    }
                                    resolve();
                                }
                            }
                        };
                        requestAnimationFrame(animate);
                    }, delay);
                });
            }

            async cascadeCycle() {
                let hasWins = true;
                let iterations = 0;
                const maxIterations = 30;

                while (hasWins && iterations < maxIterations) {
                    iterations++;
                    this.state = GameStateEnum.CASCADING;

                    // Задержка 2 секунды перед проверкой
                    await this.sleep(CASCADE_DELAY);

                    const groups = this.findGroups();
                    if (groups.length === 0) {
                        hasWins = false;
                        break;
                    }

                    // Подсветка выигрышных символов
                    this.state = GameStateEnum.WIN_ANIMATION;
                    this.highlightWinningCells(groups);

                    // Анимация подсветки
                    await this.animateWinningHighlight(groups);
                    await this.sleep(600);

                    // Суммируем выигрыш
                    let cycleWin = 0;
                    for (const group of groups) {
                        cycleWin += group.payout;
                    }
                    this.totalWin += cycleWin;

                    // Взрыв символов
                    await this.animateExplosion(groups);
                    await this.sleep(300);

                    // Удаление взорванных символов
                    this.removeExplodedSymbols(groups);

                    // Сдвиг символов вниз
                    this.applyCascadeGravity();
                    this.fillEmptyCellsForCascade();

                    // Анимация падения новых символов
                    await this.animateCascadeDrop();
                    await this.sleep(400);
                }
            }

            highlightWinningCells(groups) {
                for (const group of groups) {
                    for (const cell of group.cells) {
                        if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                            this.grid[cell.r][cell.c].isWinning = true;
                        }
                    }
                }
            }

            async animateWinningHighlight(groups) {
                return new Promise(resolve => {
                    const startTime = performance.now();
                    const duration = 1200;

                    const pulse = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const pulseScale = 1 + Math.sin(progress * Math.PI * 4) * 0.15;

                        for (const group of groups) {
                            for (const cell of group.cells) {
                                if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                                    this.grid[cell.r][cell.c].scale = pulseScale;
                                }
                            }
                        }

                        if (progress < 1) {
                            requestAnimationFrame(pulse);
                        } else {
                            for (const group of groups) {
                                for (const cell of group.cells) {
                                    if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                                        this.grid[cell.r][cell.c].scale = 1.2;
                                    }
                                }
                            }
                            resolve();
                        }
                    };
                    requestAnimationFrame(pulse);
                });
            }

            async animateExplosion(groups) {
                return new Promise(resolve => {
                    const startTime = performance.now();
                    const duration = 500;

                    const explode = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const explodeScale = 1.2 + progress * 0.4;

                        for (const group of groups) {
                            for (const cell of group.cells) {
                                if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                                    this.grid[cell.r][cell.c].scale = explodeScale;
                                    this.grid[cell.r][cell.c].opacity = 1 - progress;
                                    this.grid[cell.r][cell.c].isExploding = true;
                                }
                            }
                        }

                        if (progress < 1) {
                            requestAnimationFrame(explode);
                        } else {
                            resolve();
                        }
                    };
                    requestAnimationFrame(explode);
                });
            }

            removeExplodedSymbols(groups) {
                for (const group of groups) {
                    for (const cell of group.cells) {
                        if (this.grid[cell.r] && this.grid[cell.r][cell.c]) {
                            const gridCell = this.grid[cell.r][cell.c];
                            const x = GRID_OFFSET_X + cell.c * CELL_SIZE + CELL_SIZE / 2;
                            const y = gridCell.y + gridCell.bounceOffset;
                            this.spawnParticles(x, y, SYMBOL_COLORS[gridCell.symbol] || '#fff', 15);
                            gridCell.symbol = null;
                            gridCell.hasOrb = false;
                            gridCell.orbMultiplier = 1;
                            gridCell.isWinning = false;
                            gridCell.isExploding = false;
                            gridCell.scale = 0;
                            gridCell.opacity = 1;
                            gridCell.bounceOffset = 0;
                        }
                    }
                }
            }

            async animateCascadeDrop() {
                return new Promise(resolve => {
                    const GRAVITY = 0.85;
                    const DAMPING = 0.28;
                    let settleCount = 0;

                    const animate = () => {
                        let allSettled = true;
                        for (let c = 0; c < COLS; c++) {
                            for (let r = 0; r < ROWS; r++) {
                                if (!this.grid[r] || !this.grid[r][c]) continue;
                                const cell = this.grid[r][c];
                                if (!cell.symbol) continue;

                                cell.scale = Math.min(1, cell.scale + 0.15);

                                const target = cell.targetY;
                                const dy = target - cell.y;

                                if (Math.abs(dy) > 0.3) {
                                    allSettled = false;
                                    cell.velocity += GRAVITY;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy) + 1);

                                    if (cell.y >= target) {
                                        cell.y = target;
                                        if (Math.abs(cell.velocity) > 0.6) {
                                            cell.bounceOffset = -5;
                                            cell.velocity = -cell.velocity * DAMPING;
                                        } else {
                                            cell.velocity = 0;
                                            cell.bounceOffset = 0;
                                        }
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                    if (cell.bounceOffset < 0) {
                                        cell.bounceOffset *= 0.7;
                                        if (Math.abs(cell.bounceOffset) < 0.3) cell.bounceOffset = 0;
                                    }
                                }
                            }
                        }

                        if (!allSettled) {
                            requestAnimationFrame(animate);
                        } else {
                            settleCount++;
                            if (settleCount < 5) {
                                requestAnimationFrame(animate);
                            } else {
                                for (let c = 0; c < COLS; c++) {
                                    for (let r = 0; r < ROWS; r++) {
                                        if (this.grid[r] && this.grid[r][c]) {
                                            const cell = this.grid[r][c];
                                            cell.y = cell.targetY;
                                            cell.bounceOffset = 0;
                                            cell.velocity = 0;
                                            cell.scale = 1;
                                        }
                                    }
                                }
                                resolve();
                            }
                        }
                    };
                    requestAnimationFrame(animate);
                });
            }

            async animateWinCounter(targetWin) {
                const startWin = this.displayedWin;
                const duration = 900;
                const startTime = performance.now();

                return new Promise(resolve => {
                    const count = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        this.displayedWin = Math.round((startWin + (targetWin - startWin) * eased) * 100) /
                            100;
                        this.updateWinDisplay();

                        if (progress < 1) {
                            requestAnimationFrame(count);
                        } else {
                            this.displayedWin = Math.round(targetWin * 100) / 100;
                            this.updateWinDisplay();
                            resolve();
                        }
                    };
                    requestAnimationFrame(count);
                });
            }

            countScatters() {
                let count = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r] && this.grid[r][c] && this.grid[r][c].symbol === SYMBOLS.ZEUS_SCATTER) {
                            count++;
                        }
                    }
                }
                return count;
            }

            async enterBonusGame(spins) {
                this.state = GameStateEnum.BONUS_TRANSITION;
                this.isFreeSpins = true;
                this.freeSpinsRemaining = spins;
                this.totalMultiplier = 1;

                document.getElementById('leftPanel').classList.remove('inactive');
                document.getElementById('freespinBadge').classList.add('active');
                this.updateFreespinDisplay();
                this.updateTotalMultiplierDisplay();

                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                if (spinsDisplay) spinsDisplay.textContent = spins;
                if (overlay) overlay.classList.add('active');

                document.body.classList.add('zeus-rage');
                await this.sleep(2500);
                document.body.classList.remove('zeus-rage');

                if (overlay) overlay.classList.remove('active');
                this.state = GameStateEnum.IDLE;
            }

            exitBonusGame() {
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;
                document.getElementById('leftPanel').classList.add('inactive');
                document.getElementById('freespinBadge').classList.remove('active');
                this.updateTotalMultiplierDisplay();
            }

            showRetriggerEffect() {
                const overlay = document.getElementById('bonusOverlay');
                const spinsDisplay = document.getElementById('bonusSpinsDisplay');
                if (spinsDisplay) spinsDisplay.textContent = '+5 SPINS';
                if (overlay) overlay.classList.add('active');
                setTimeout(() => {
                    if (overlay) overlay.classList.remove('active');
                }, 1500);
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            updateWinDisplay() {
                const el = document.getElementById('winDisplay');
                if (el) {
                    el.textContent = this.displayedWin.toFixed(2);
                    el.classList.add('counting');
                    setTimeout(() => el.classList.remove('counting'), 100);
                }
            }

            updateFreespinDisplay() {
                const el = document.getElementById('freespinCountDisplay');
                if (el) el.textContent = this.freeSpinsRemaining;
            }

            updateTotalMultiplierDisplay() {
                const el = document.getElementById('totalMultiplierDisplay');
                if (el) {
                    el.textContent = this.totalMultiplier + 'x';
                    el.classList.add('pulse');
                    setTimeout(() => el.classList.remove('pulse'), 300);
                }
            }

            updateSpinButton() {
                const btn = document.getElementById('btnSpin');
                if (!btn) return;
                if (this.isFreeSpins) {
                    btn.textContent = 'FREE';
                } else {
                    btn.textContent = 'SPIN';
                }
                btn.disabled = this.state !== GameStateEnum.IDLE;
            }

            // ==================== РЕНДЕРИНГ ====================
            render(ctx) {
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

                // Фон ячеек
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cx = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const cy = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;

                        ctx.fillStyle = 'rgba(12, 12, 30, 0.55)';
                        ctx.strokeStyle = 'rgba(70, 70, 110, 0.2)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(
                            GRID_OFFSET_X + c * CELL_SIZE + 4,
                            GRID_OFFSET_Y + r * CELL_SIZE + 4,
                            CELL_SIZE - 8,
                            CELL_SIZE - 8,
                            10
                        );
                        ctx.fill();
                        ctx.stroke();
                    }
                }

                // Символы
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (!this.grid[r] || !this.grid[r][c]) continue;
                        const cell = this.grid[r][c];
                        if (!cell.symbol || cell.scale <= 0.01) continue;

                        const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const y = cell.y + cell.bounceOffset;

                        ctx.save();
                        ctx.translate(x, y);
                        ctx.scale(Math.max(0.01, cell.scale), Math.max(0.01, cell.scale));
                        ctx.globalAlpha = Math.max(0, Math.min(1, cell.opacity));

                        // Свечение выигрыша
                        if (cell.isWinning && !cell.isExploding) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 30;
                        }

                        // Ореол взрыва
                        if (cell.isExploding) {
                            ctx.shadowColor = '#fff';
                            ctx.shadowBlur = 40;
                        }

                        // Ореол сферы
                        if (cell.hasOrb && !cell.isExploding) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 25;
                            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                            ctx.beginPath();
                            ctx.arc(0, 0, SYMBOL_SIZE / 2 + 10, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }

                        // Круг символа
                        const color = SYMBOL_COLORS[cell.symbol] || '#555';
                        const gradient = ctx.createRadialGradient(-4, -9, 4, 0, 0, SYMBOL_SIZE / 2);
                        gradient.addColorStop(0, this.lightenColor(color, 55));
                        gradient.addColorStop(1, color);

                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(0, 0, SYMBOL_SIZE / 2, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.lineWidth = 2.5;
                        ctx.stroke();

                        // Эмодзи или иконка
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.font = `${SYMBOL_SIZE * 0.5}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#fff';

                        if (cell.symbol === SYMBOLS.ZEUS_SCATTER) {
                            this.drawZeusIcon(ctx, SYMBOL_SIZE);
                        } else {
                            ctx.fillText(SYMBOL_EMOJIS[cell.symbol] || '?', 0, 2);
                        }

                        // Множитель сферы
                        if (cell.hasOrb && !cell.isExploding) {
                            ctx.font = 'bold 14px Arial';
                            ctx.fillStyle = '#ffd700';
                            ctx.shadowColor = 'rgba(0,0,0,0.9)';
                            ctx.shadowBlur = 4;
                            ctx.fillText(`x${cell.orbMultiplier}`, 0, -SYMBOL_SIZE / 2 - 14);
                            ctx.shadowBlur = 0;
                        }

                        ctx.restore();
                    }
                }

                // Частицы
                for (const p of this.particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            drawZeusIcon(ctx, size) {
                const s = size * 0.65;
                // Голова
                ctx.fillStyle = '#f5e6d3';
                ctx.beginPath();
                ctx.arc(0, -s * 0.08, s * 0.38, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#c4a882';
                ctx.lineWidth = 1.8;
                ctx.stroke();

                // Борода
                ctx.fillStyle = '#e8d5c0';
                ctx.beginPath();
                ctx.moveTo(-s * 0.22, s * 0.06);
                ctx.quadraticCurveTo(0, s * 0.55, s * 0.22, s * 0.06);
                ctx.quadraticCurveTo(0, s * 0.22, -s * 0.22, s * 0.06);
                ctx.fill();
                ctx.strokeStyle = '#c4a882';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Корона
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(-s * 0.23, -s * 0.38);
                ctx.lineTo(-s * 0.18, -s * 0.55);
                ctx.lineTo(-s * 0.04, -s * 0.33);
                ctx.lineTo(0, -s * 0.6);
                ctx.lineTo(s * 0.04, -s * 0.33);
                ctx.lineTo(s * 0.18, -s * 0.55);
                ctx.lineTo(s * 0.23, -s * 0.38);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#b8860b';
                ctx.lineWidth = 1.2;
                ctx.stroke();

                // Глаза
                ctx.fillStyle = '#1a1a3a';
                ctx.beginPath();
                ctx.arc(-s * 0.09, -s * 0.14, s * 0.045, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.09, -s * 0.14, s * 0.045, 0, Math.PI * 2);
                ctx.fill();

                // Молния
                ctx.fillStyle = '#ffd700';
                ctx.font = `${s * 0.45}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('⚡', 0, -s * 0.5);
            }

            lightenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF00) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return `rgb(${R},${G},${B})`;
            }
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const engine = new SlotEngine();

        // Polyfill roundRect
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                ctx.beginPath();
                ctx.moveTo(x + r.tl, y);
                ctx.lineTo(x + w - r.tr, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                ctx.lineTo(x + w, y + h - r.br);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                ctx.lineTo(x + r.bl, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                ctx.lineTo(x, y + r.tl);
                ctx.quadraticCurveTo(x, y, x + r.tl, y);
                ctx.closePath();
            };
        }

        document.getElementById('btnSpin').addEventListener('click', () => {
            if (!engine.isProcessing && engine.state === GameStateEnum.IDLE) {
                engine.spin();
            }
        });

        // Главный цикл рендеринга
        function gameLoop() {
            engine.updateParticles();
            engine.render(ctx);
            engine.updateSpinButton();

            // Zeus Rage при больших множителях
            if (engine.activeOrbs.some(o => o.multiplier >= 50)) {
                if (!document.body.classList.contains('zeus-rage')) {
                    document.body.classList.add('zeus-rage');
                    setTimeout(() => document.body.classList.remove('zeus-rage'), 2500);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        engine.initGrid();
        engine.updateWinDisplay();
        engine.updateSpinButton();
        gameLoop();

        console.log('⚡ Zeus Thunder - Каскадный слот запущен!');
        console.log('🎰 10 символов: 5 кристаллов, Чаша, Кольцо, Песочные часы, Корона, Зевс (Scatter)');
        console.log('💥 Каскадная механика: группы 8+, взрыв, падение новых символов');
        console.log('🌩️ Множители: Common (15%): 2x-8x, Rare (5%): 10x-75x, Legendary (0.5%): 100x-500x');
        console.log('🔄 Free Spins: 4+ Зевса, накопительный множитель');
        console.log('⏱️ Задержка каскада: 2 секунды');
    </script>
</body>
</html>
