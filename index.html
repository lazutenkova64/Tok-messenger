                return;
            }
            
            messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            const fragment = [];
            
            messages[currentChat.id].forEach(msg => {
                if (deletedMessages[currentChat.id] && deletedMessages[currentChat.id].includes(msg.id)) {
                    return;
                }
                
                const status = messageStatuses[msg.id] || { status: msg.sender == currentUser.id ? 'sent' : 'delivered' };
                
                let content = '';
                let statusHtml = '';
                
                if (msg.type === 'out') {
                    statusHtml = `<span class="message-status"><span class="status-icon ${getStatusClass(status.status)}">${getStatusIcon(status.status)}</span></span>`;
                }
                
                if (msg.text) {
                    content = `<div class="message-bubble">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 10px; opacity: 0.7;">(ред.)</span>' : ''}</div>`;
                } else if (msg.audio) {
                    const messageId = msg.id;
                    const duration = msg.duration || 0;
                    
                    content = `
                        <div class="message-bubble audio-message">
                            <div class="audio-player">
                                <button class="play-pause-btn" data-message-id="${messageId}" onclick="toggleAudio('${messageId}', '${msg.audio}')">▶️</button>
                                <div class="audio-progress-container">
                                    <div class="audio-progress-bar" onclick="seekAudio('${messageId}', event)">
                                        <div class="audio-progress-fill" data-message-id="${messageId}" style="width: 0%"></div>
                                    </div>
                                    <div class="audio-time-container">
                                        <span class="audio-current-time" data-message-id="${messageId}">0:00</span>
                                        <span class="audio-duration" data-message-id="${messageId}">${formatTime(duration)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                const canDelete = currentUser.isCreator || msg.sender == currentUser.id;
                const canEdit = msg.sender == currentUser.id;
                
                let actions = '';
                if (canDelete || canEdit) {
                    actions = `
                        <div class="message-actions" data-message-id="${msg.id}">
                            ${canEdit ? `<button class="message-action-btn" onclick="editMessage('${msg.id}', event)">✏️</button>` : ''}
                            ${canDelete ? `<button class="message-action-btn delete" onclick="deleteMessage('${msg.id}', event)">🗑️</button>` : ''}
                        </div>
                    `;
                }
                
                const showCreatorBadge = msg.isAdmin && msg.senderName === CREATOR_USERNAME;
                
                fragment.push(`
                    <div class="message ${msg.type}" data-id="${msg.id}" onclick="showMessageActions('${msg.id}', event)">
                        ${actions}
                        ${msg.type === 'in' ? `<div class="message-sender">${escapeHtml(msg.senderName)}${showCreatorBadge ? ' <span class="creator-badge">СОЗДАТЕЛЬ</span>' : ''}</div>` : ''}
                        ${content}
                        <div class="message-footer">
                            <span class="message-time">${msg.time}</span>
                            ${statusHtml}
                        </div>
                    </div>
                `);
            });
            
            container.innerHTML = fragment.join('');
            
            if (isAtBottom) {
                container.scrollTo({
                    top: container.scrollHeight,
                    behavior: 'smooth'
                });
            }
            
            if (currentChat && !currentChat.isSelf && !currentChat.isFavorite) {
                markMessagesAsRead(currentChat.id);
            }
        }

        function updateChatsList() {
            const list = document.getElementById('chatsList');
            if (!list) return;
            
            let items = [];
            
            if (currentTab === 'chats') {
                items = [...myChats].sort((a, b) => {
                    const aPinned = a.pinned || a.isFavorite;
                    const bPinned = b.pinned || b.isFavorite;
                    
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    
                    if (a.isFavorite && !b.isFavorite) return -1;
                    if (!a.isFavorite && b.isFavorite) return 1;
                    
                    return (b.lastMessageTime || 0) - (a.lastMessageTime || 0);
                });
            } else if (currentTab === 'public') {
                items = publicChats;
            } else if (currentTab === 'users') {
                const allUsersList = allUsers.map(user => {
                    const onlineUser = onlineUsers[user.id.toString()];
                    const isCurrentUser = user.id === currentUser.id;
                    
                    if (isCurrentUser) return null;
                    
                    return {
                        id: user.id,
                        name: user.username,
                        avatar: user.avatar || '👤',
                        bio: user.bio || '',
                        online: onlineUser ? onlineUser.online : false,
                        isCreator: user.username === CREATOR_USERNAME,
                        dnd: onlineUser ? onlineUser.dnd : (user.dnd || false),
                        lastSeen: onlineUser ? onlineUser.lastSeen : null
                    };
                }).filter(Boolean);
                
                items = allUsersList;
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                items = items.filter(item => 
                    (item.name || '').toLowerCase().includes(searchTerm) ||
                    (item.description || '').toLowerCase().includes(searchTerm) ||
                    (item.bio || '').toLowerCase().includes(searchTerm)
                );
            }
            
            let newHTML = '';
            
            if (items.length === 0) {
                newHTML = '<div class="empty-state">Ничего не найдено</div>';
            } else {
                const fragment = [];
                
                items.forEach(item => {
                    if (currentTab === 'users') {
                        fragment.push(renderUserItem(item));
                    } else {
                        fragment.push(renderChatItem(item));
                    }
                });
                
                newHTML = fragment.join('');
            }
            
            list.innerHTML = newHTML;
        }

        function renderUserItem(user) {
            const statusClass = user.online ? (user.dnd ? 'dnd' : 'online') : 'offline';
            const lastSeenText = !user.online && user.lastSeen ? formatLastSeen(user.lastSeen) : '';
            
            return `
                <div class="chat-item" onclick="createPrivateChat({id: ${user.id}, name: '${user.name}', avatar: '${user.avatar}'})">
                    <div class="chat-avatar">${user.avatar}</div>
                    <div class="chat-details">
                        <div class="chat-name">
                            ${user.name}
                            ${user.isCreator ? '<span class="creator-badge">СОЗДАТЕЛЬ</span>' : ''}
                            <div class="status-container">
                                <span class="status-dot ${statusClass}"></span>
                                ${!user.online && lastSeenText ? `<span class="last-seen">${lastSeenText}</span>` : ''}
                                ${user.dnd && user.online ? '<span class="dnd-badge">DND</span>' : ''}
                            </div>
                        </div>
                        <div class="chat-last-message">${user.bio || 'Нет информации'}</div>
                    </div>
                </div>
            `;
        }

        function renderChatItem(chat) {
            const lastMsg = messages[chat.id] && messages[chat.id].length > 0 ? messages[chat.id][messages[chat.id].length - 1] : null;
            const unread = unreadCounts[chat.id] || 0;
            const isPinned = chat.pinned || chat.isFavorite;
            
            let lastMessageText = chat.description || 'Нет сообщений';
            if (chat.password && (!lastMsg || chat.password)) {
                lastMessageText = '🔒 Сообщения скрыты';
            } else if (lastMsg) {
                lastMessageText = lastMsg.text ? lastMsg.text : (lastMsg.audio ? '🎤 Голосовое' : '📷 Медиа');
            }
            
            const timeText = (!chat.password || (lastMsg && !chat.password)) && lastMsg ? lastMsg.time : '';
            
            const itemClass = `chat-item ${chat.isFavorite ? 'favorite' : ''} ${isPinned && !chat.isFavorite ? 'pinned' : ''} ${currentChat?.id === chat.id ? 'active' : ''}`;
            
            return `
                <div class="${itemClass}" onclick="joinChat(${JSON.stringify(chat).replace(/"/g, '&quot;')})">
                    <div class="chat-avatar">${chat.avatar || chat.name.charAt(0)}</div>
                    <div class="chat-details">
                        <div class="chat-name">
                            ${chat.name}
                            ${chat.password ? '<span class="lock-icon">🔒</span>' : ''}
                            ${chat.isFavorite ? '<span class="favorite-badge">ИЗБРАННОЕ</span>' : ''}
                            ${currentUser?.isCreator && currentUser.name === CREATOR_USERNAME && currentTab === 'public' && !chat.isSelf && !chat.isFavorite ? 
                                `<button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${chat.id}', event)">Удалить</button>` : ''}
                        </div>
                        <div class="chat-last-message ${chat.password && (!lastMsg || chat.password) ? 'hidden-messages' : ''}">${lastMessageText}</div>
                    </div>
                    <div class="chat-meta">
                        <div class="chat-time">${timeText}</div>
                        ${unread > 0 && !chat.password ? `<div class="chat-unread">${unread}</div>` : ''}
                        ${isPinned && !chat.isFavorite ? '<span class="pin-indicator">📌</span>' : ''}
                    </div>
                </div>
            `;
        }

        function joinChat(chat) {
            if (!chat) return;
            
            if (chat.password && (!chat.members || !chat.members.includes(currentUser.id))) {
                pendingChatToJoin = chat;
                document.getElementById('joinChatTitle').textContent = `Введите пароль для "${chat.name}"`;
                document.getElementById('joinChatModal').classList.add('active');
                return;
            }
            
            if (!chat.members && !chat.isSelf && !chat.isFavorite) chat.members = [];
            if (!chat.isSelf && !chat.isFavorite && chat.members && !chat.members.includes(currentUser.id)) {
                chat.members.push(currentUser.id);
                updateChatMembers(chat.id, chat.members);
            }
            
            if (!myChats.find(c => c.id === chat.id) && !chat.isSelf && !chat.isFavorite) {
                myChats.push(chat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(chat);
            }
            
            currentChat = chat;
            updateUrlWithChat(chat);
            
            const titleElement = document.getElementById('currentChatName');
            titleElement.innerHTML = chat.name + (chat.password ? ' 🔒' : '') + (chat.isFavorite ? ' ⭐' : '');
            
            if (currentUser && currentUser.isCreator && !chat.isSelf && !chat.isFavorite) {
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-chat-btn';
                deleteBtn.textContent = 'Удалить';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id, e);
                };
                titleElement.appendChild(deleteBtn);
            }
            
            if (!chat.isFavorite && !chat.isSelf) {
                const pinBtn = document.createElement('button');
                pinBtn.className = 'pin-chat-btn';
                pinBtn.innerHTML = pinnedChats[chat.id] ? '📌' : '📍';
                pinBtn.onclick = (e) => {
                    e.stopPropagation();
                    togglePinChat(chat.id, e);
                };
                titleElement.appendChild(pinBtn);
            }
            
            document.getElementById('chatStatus').textContent = chat.description || (chat.isFavorite ? 'Сохраненные сообщения' : 'Чат');
            document.getElementById('chatHeaderAvatar').textContent = chat.avatar || '👤';
            
            if (!chat.isSelf && !chat.isFavorite) {
                loadChatHistory(chat.id);
            }
            
            if (!messages[chat.id]) messages[chat.id] = [];
            messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            unreadCounts[chat.id] = 0;
            localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
            updateFavicon();
            
            renderMessages();
            updateChatsList();
            updateChatStatus();
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
            
            setTimeout(() => {
                document.getElementById('messageInput').focus();
            }, 100);
        }

        async function updateChatMembers(chatId, members) {
            try {
                await supabaseClient
                    .from('chats')
                    .update({ members: JSON.stringify(members) })
                    .eq('id', chatId);
            } catch (err) {
                console.error('Error updating chat members:', err);
            }
        }

        function createPrivateChat(user) {
            const chatId = [currentUser.id, user.id].sort().join('-');
            let privateChat = myChats.find(c => c.id === chatId);
            
            if (!privateChat) {
                privateChat = {
                    id: chatId,
                    name: user.name,
                    avatar: user.avatar,
                    isPrivate: true,
                    members: [currentUser.id, user.id]
                };
                
                myChats.push(privateChat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(privateChat);
            }
            
            joinChat(privateChat);
        }

        function deleteChat(chatId, event) {
            if (event) event.stopPropagation();
            if (!currentUser || !currentUser.isCreator) {
                alert('Только создатель может удалять чаты');
                return;
            }
            if (!confirm('Вы уверены, что хотите удалить этот чат? Это действие нельзя отменить.')) return;
            
            publicChats = publicChats.filter(c => c.id !== chatId);
            localStorage.setItem('publicChats', JSON.stringify(publicChats));
            myChats = myChats.filter(c => c.id !== chatId);
            localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
            
            supabaseClient
                .from('chats')
                .delete()
                .eq('id', chatId)
                .then(({ error }) => {
                    if (error) console.error('Error deleting chat from DB:', error);
                });
            
            if (messages[chatId]) {
                delete messages[chatId];
                saveMessagesDebounced();
            }
            if (ably) {
                const adminChannel = ably.channels.get('admin-actions');
                adminChannel.publish('delete-chat', { chatId, deletedBy: currentUser.id });
            }
            if (currentChat && currentChat.id === chatId) {
                currentChat = null;
                document.getElementById('messagesContainer').innerHTML = '<div class="chat-deleted-message">⚠️ Чат был удален</div>';
                document.getElementById('currentChatName').innerHTML = 'Чат удален';
                document.getElementById('chatStatus').innerHTML = '';
                updateUrlWithChat(null);
            }
            updateChatsList();
        }

        function joinProtectedChat() {
            const password = document.getElementById('joinPasswordInput').value;
            if (pendingChatToJoin && password === pendingChatToJoin.password) {
                if (!pendingChatToJoin.members) pendingChatToJoin.members = [];
                if (!pendingChatToJoin.members.includes(currentUser.id)) {
                    pendingChatToJoin.members.push(currentUser.id);
                    updateChatMembers(pendingChatToJoin.id, pendingChatToJoin.members);
                }
                joinChat(pendingChatToJoin);
                closeJoinChatModal();
            } else {
                alert('Неверный пароль');
            }
        }

        async function createPublicChat() {
            const name = document.getElementById('chatNameInput').value.trim();
            const password = document.getElementById('chatPasswordInput').value.trim();
            const description = document.getElementById('chatDescriptionInput').value.trim();
            
            if (!name) {
                alert('Введите название чата');
                return;
            }
            
            const newChat = {
                id: 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                name: name,
                description: description || '',
                password: password || null,
                created_by: currentUser.id,
                created_by_name: currentUser.name,
                members: JSON.stringify([currentUser.id]),
                type: 'public',
                created_at: new Date().toISOString()
            };
            
            try {
                const { data, error } = await supabaseClient
                    .from('chats')
                    .insert([newChat])
                    .select();
                
                if (error) {
                    console.error('Ошибка Supabase:', error);
                    throw error;
                }
                
                const createdChat = {
                    ...newChat,
                    members: [currentUser.id]
                };
                
                publicChats.push(createdChat);
                localStorage.setItem('publicChats', JSON.stringify(publicChats));
                
                if (ably) {
                    const globalChatsChannel = ably.channels.get('global-chats');
                    globalChatsChannel.publish('new-chat', createdChat);
                }
                
                joinChat(createdChat);
                closeCreateChatModal();
                
                document.getElementById('chatNameInput').value = '';
                document.getElementById('chatPasswordInput').value = '';
                document.getElementById('chatDescriptionInput').value = '';
                
            } catch (err) {
                console.error('Error creating chat:', err);
                alert('Ошибка при создании чата: ' + err.message);
            }
        }

        function deleteMessage(messageId, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!currentChat) return;
            
            const msg = messages[currentChat.id]?.find(m => m.id === messageId);
            if (!msg) return;
            
            if (!currentUser.isCreator && msg.sender != currentUser.id) {
                alert('Вы можете удалять только свои сообщения');
                return;
            }
            
            if (!confirm('Удалить сообщение?')) return;
            
            if (!deletedMessages[currentChat.id]) deletedMessages[currentChat.id] = [];
            if (!deletedMessages[currentChat.id].includes(messageId)) {
                deletedMessages[currentChat.id].push(messageId);
                localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
            }
            
            messages[currentChat.id] = messages[currentChat.id].filter(m => m.id !== messageId);
            saveMessagesDebounced();
            
            supabaseClient
                .from('messages')
                .delete()
                .eq('id', messageId)
                .then(({ error }) => {
                    if (error) console.error('Error deleting message from DB:', error);
                });
            
            if (ably && !currentChat.isSelf && !currentChat.isFavorite) {
                const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                chatChannel.publish('delete', { messageId, senderId: currentUser.id, timestamp: Date.now() });
                
                if (currentUser.isCreator && msg.sender != currentUser.id) {
                    const adminChannel = ably.channels.get('admin-actions');
                    adminChannel.publish('delete-message', { 
                        chatId: currentChat.id, 
                        messageId, 
                        deletedBy: currentUser.id,
                        timestamp: Date.now() 
                    });
                }
            }
            
            hideMessageActions();
            renderMessages();
            updateChatsList();
        }

        function editMessage(messageId, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!currentChat) return;
            
            const msg = messages[currentChat.id]?.find(m => m.id === messageId);
            if (!msg) return;
            
            if (msg.sender != currentUser.id) {
                alert('Вы можете редактировать только свои сообщения');
                return;
            }
            
            messageToEdit = msg;
            document.getElementById('editMessageText').value = msg.text || '';
            document.getElementById('editMessageModal').classList.add('active');
            hideMessageActions();
        }

        function saveEditedMessage() {
            const newText = document.getElementById('editMessageText').value.trim();
            if (!newText || !messageToEdit || !currentChat) return;
            
            const msgIndex = messages[currentChat.id].findIndex(m => m.id === messageToEdit.id);
            if (msgIndex !== -1) {
                messages[currentChat.id][msgIndex].text = newText;
                messages[currentChat.id][msgIndex].edited = true;
                saveMessagesDebounced();
                
                supabaseClient
                    .from('messages')
                    .update({ text: newText, edited: true })
                    .eq('id', messageToEdit.id)
                    .then(({ error }) => {
                        if (error) console.error('Error updating message in DB:', error);
                    });
                
                if (ably && !currentChat.isSelf && !currentChat.isFavorite) {
                    const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                    chatChannel.publish('edit', { 
                        messageId: messageToEdit.id, 
                        newText, 
                        editor: currentUser.id,
                        timestamp: Date.now() 
                    });
                }
                
                renderMessages();
                closeEditMessageModal();
            }
        }

        function openChatUserProfile() {
            if (!currentChat || currentChat.isSelf || currentChat.isFavorite) return;
            
            const userId = currentChat.members?.find(id => id !== currentUser.id);
            if (!userId) return;
            
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            const onlineUser = onlineUsers[userId.toString()];
            const isOnline = onlineUser ? onlineUser.online : false;
            const dnd = onlineUser ? onlineUser.dnd : user.dnd;
            const lastSeen = onlineUser ? onlineUser.lastSeen : null;
            
            let statusText = '';
            if (isOnline) {
                statusText = dnd ? 'Не беспокоит' : 'В сети';
            } else {
                statusText = lastSeen ? `Был(а) ${formatLastSeen(lastSeen)}` : 'Был(а) давно';
            }
            
            const content = `
                <div class="user-profile-avatar">${user.avatar || '👤'}</div>
                <div class="user-profile-name">${user.username}</div>
                <div class="user-profile-bio">${user.bio || 'Нет информации'}</div>
                <div class="user-profile-status">
                    <span class="status-dot ${isOnline ? (dnd ? 'dnd' : 'online') : 'offline'}"></span>
                    ${statusText}
                </div>
            `;
            
            document.getElementById('userProfileContent').innerHTML = content;
            document.getElementById('userProfileModal').classList.add('active');

        function closeUserProfileModal() {
            document.getElementById('userProfileModal').classList.remove('active');
        }

        function openProfileModal() {
            document.getElementById('profileNameInput').value = currentUser.name;
            document.getElementById('profileBioInput').value = currentUser.bio || '';
            document.getElementById('profileDNDCheckbox').checked = currentUser.dnd || false;
            document.getElementById('profileAvatarLarge').textContent = currentUser.avatar || '👤';
            
            populateThemeGrid();
            
            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }

        async function saveProfile() {
            const newName = document.getElementById('profileNameInput').value.trim();
            const newBio = document.getElementById('profileBioInput').value.trim();
            const dnd = document.getElementById('profileDNDCheckbox').checked;
            
            if (newName && newName !== currentUser.name) {
                const { data: existingUsers } = await supabaseClient
                    .from('users')
                    .select('username')
                    .eq('username', newName)
                    .neq('id', currentUser.id)
                    .limit(1);
                
                if (existingUsers && existingUsers.length > 0) {
                    alert('Пользователь с таким именем уже существует');
                    return;
                }
                
                currentUser.name = newName;
            }
            
            currentUser.bio = newBio;
            currentUser.dnd = dnd;
            
            try {
                await supabaseClient
                    .from('users')
                    .update({
                        username: currentUser.name,
                        bio: currentUser.bio,
                        dnd: currentUser.dnd,
                        avatar: currentUser.avatar
                    })
                    .eq('id', currentUser.id);
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                if (ably) {
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.update({ 
                        name: currentUser.name, 
                        avatar: currentUser.avatar,
                        bio: currentUser.bio,
                        isCreator: currentUser.isCreator,
                        dnd: dnd,
                        lastSeen: Date.now()
                    });
                }
                
                updateProfileUI();
                closeProfileModal();
                
                await loadAllUsers();
                
            } catch (err) {
                console.error('Error updating profile:', err);
                alert('Ошибка при сохранении профиля');
            }
        }

        function openAvatarModal() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            weirdEmojis.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'avatar-option';

                if (currentUser.avatar === emoji) div.classList.add('selected');
                grid.appendChild(div);

            document.getElementById('avatarModal').classList.add('active');
        }

            element.classList.add('selected');
            selectedAvatar = emoji;

                        });

                    alert('Ошибка при сохранении аватара');

            }
            closeAvatarModal();

        function closeAvatarModal() {
            document.getElementById('avatarModal').classList.remove('active');
            selectedAvatar = null;
        }

        function switchAuthMode(mode) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            if (mode === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.className = 'auth-tab active';
                registerTab.className = 'auth-tab';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginTab.className = 'auth-tab';
                registerTab.className = 'auth-tab active';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabChats').className = tab === 'chats' ? 'tab active' : 'tab';
            document.getElementById('tabPublic').className = tab === 'public' ? 'tab active' : 'tab';
            document.getElementById('tabUsers').className = tab === 'users' ? 'tab active' : 'tab';
            document.getElementById('searchInput').value = '';
            
            if (tab === 'users') {
                loadAllUsers();
            } else if (tab === 'public') {
                loadPublicChats();
            }
            
            updateChatsList();
        }

        function handleSearch() {
            updateChatsList();
        }

        function openCreateChatModal() {
            document.getElementById('createChatModal').classList.add('active');
        }

        function closeCreateChatModal() {
            document.getElementById('createChatModal').classList.remove('active');
            document.getElementById('chatNameInput').value = '';
            document.getElementById('chatPasswordInput').value = '';
            document.getElementById('chatDescriptionInput').value = '';
        }

        function closeJoinChatModal() {
            document.getElementById('joinChatModal').classList.remove('active');
            document.getElementById('joinPasswordInput').value = '';
            pendingChatToJoin = null;
        }

        function closeEditMessageModal() {
            document.getElementById('editMessageModal').classList.remove('active');
            document.getElementById('editMessageText').value = '';
            messageToEdit = null;
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'none' ? 'flex' : 'none';
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            input.value = input.value.substring(0, start) + emoji + input.value.substring(end);
            input.focus();
            input.selectionStart = input.selectionEnd = start + emoji.length;
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function handleTextInput() {}

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        function updateUrlWithChat(chat) {
            if (chat) {
                const newUrl = `${window.location.pathname}#${chat.id}`;
                window.history.replaceState({ chatId: chat.id }, chat.name, newUrl);
                document.title = `${chat.name} - Telegram Web`;
            } else {
                const newUrl = window.location.pathname;
                window.history.replaceState({}, 'Telegram Web', newUrl);
                document.title = 'Telegram Web';
            }
        }

        function checkUrlForChat() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const chat = myChats.find(c => c.id === hash) || publicChats.find(c => c.id === hash);
                if (chat) setTimeout(() => joinChat(chat), 500);
            }
        }

        function openMedia(url) {
            const viewer = document.getElementById('mediaViewer');
            const content = document.getElementById('mediaViewerContent');
            if (url.match(/\.(mp4|webm|ogg)$/i) || url.includes('video')) {
                content.innerHTML = `<video src="${url}" controls autoplay></video>`;
            } else {
                content.innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 100%;">`;
            }
            viewer.classList.add('active');
        }

        function closeMediaViewer() {
            document.getElementById('mediaViewer').classList.remove('active');
            document.getElementById('mediaViewerContent').innerHTML = '';
        }

        function startStatusUpdates() {
            if (statusUpdateInterval) clearInterval(statusUpdateInterval);
            
            statusUpdateInterval = setInterval(() => {
                if (currentTab === 'users' || currentTab === 'chats') {
                    updateChatsList();
                }
                updateChatStatus();
            }, 2000);
        }

        function updateBackButtonVisibility() {
            const backButton = document.getElementById('backButton');
            if (window.innerWidth <= 768) {
                backButton.classList.add('mobile-visible');
            } else {
                backButton.classList.remove('mobile-visible');
            }
        }

        function setupMobileHandlers() {
            const setVH = () => {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            };
            
            setVH();
            window.addEventListener('resize', setVH);
            window.addEventListener('orientationchange', setVH);
            
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('focus', () => {
                setTimeout(() => {
                    document.getElementById('messagesContainer').scrollTop = 
                        document.getElementById('messagesContainer').scrollHeight;
                }, 300);
            });
        }

        window.addEventListener('popstate', function(event) {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const chat = myChats.find(c => c.id === hash) || publicChats.find(c => c.id === hash);
                if (chat) joinChat(chat);
            } else {
                currentChat = null;
                renderMessages();
                updateUrlWithChat(null);
            }
        });

        window.addEventListener('resize', function() {
            updateBackButtonVisibility();
            if (window.innerWidth > 768) document.getElementById('sidebar').classList.remove('active');
            
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMediaViewer();
                hideMessageActions();
            }
        });

        document.addEventListener('click', function(e) {
            const emojiPicker = document.getElementById('emojiPicker');
            const emojiBtn = document.querySelector('.emoji-toggle-btn');
            if (emojiPicker.style.display === 'flex' && !emojiPicker.contains(e.target) && !emojiBtn.contains(e.target)) {
                emojiPicker.style.display = 'none';
            }
        });

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
