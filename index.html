<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gates of Olympus — Full Engine</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --gold: #d4a843;
            --gold-light: #f0d78c;
            --panel-bg: #12122a;
            --text: #ffffff;
            --accent: #6c5ce7;
            --red-accent: #e74c3c;
            --green-accent: #2ecc71;
            --btn-bg: #1a1a3e;
            --border: #2a2a5a;
            --cell-size: 64px;
            --gap: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a1040 0%, #0a0a1a 70%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 460px;
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 20px 24px 24px;
            box-shadow: 0 0 60px rgba(100, 80, 220, 0.3), 0 0 120px rgba(100, 80, 220, 0.1), 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #ffe08a 0%, #d4a843 50%, #8b6914 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .multiplier-display {
            background: linear-gradient(135deg, #2d1b69, #4a2d8f);
            border: 2px solid #6c5ce7;
            border-radius: 12px;
            padding: 6px 16px;
            color: #ffd700;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 1px;
            animation: pulseGlow 2s ease-in-out infinite;
            min-width: 80px;
            text-align: center;
            transition: all 0.3s;
        }

        .multiplier-display.bonus-active {
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            animation: pulseGlowBonus 1s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(108, 92, 231, 0.9);
            }
        }
        @keyframes pulseGlowBonus {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 215, 0, 1);
            }
        }

        .game-area {
            position: relative;
            background: linear-gradient(180deg, #0d0d2b 0%, #1a1040 50%, #0d0d2b 100%);
            border-radius: 16px;
            padding: 8px;
            margin-bottom: 14px;
            border: 3px solid #2a2a5a;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            height: 370px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: var(--gap);
            height: 100%;
            position: relative;
        }

        .cell {
            position: relative;
            background: rgba(20, 20, 50, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.1s, background 0.3s, opacity 0.3s;
            overflow: hidden;
            cursor: default;
        }

        .cell.win {
            animation: winPop 0.5s ease-out;
            background: rgba(255, 215, 0, 0.25);
            border-color: rgba(255, 215, 0, 0.6);
            z-index: 2;
        }

        .cell.multiplier-cell {
            border-color: #ff6b6b !important;
            background: rgba(255, 100, 100, 0.3) !important;
            animation: multGlow 1s ease-in-out infinite;
            z-index: 3;
        }

        .cell .mult-badge {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 10px;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 6px #ff0000;
        }

        .cell.falling {
            animation: fallIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .cell.exploding {
            animation: explode 0.4s ease-out forwards;
        }

        .cell.zeus-strike {
            animation: zeusStrike 0.2s ease-out;
            border-color: #ffff00 !important;
            box-shadow: 0 0 30px #ffff00 !important;
        }

        @keyframes winPop {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.2);
            }
            60% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes multGlow {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 80, 80, 0.6);
            }
            50% {
                box-shadow: 0 0 25px rgba(255, 80, 80, 1);
            }
        }
        @keyframes fallIn {
            0% {
                transform: translateY(-80px);
                opacity: 0;
            }
            70% {
                transform: translateY(5px);
                opacity: 1;
            }
            85% {
                transform: translateY(-3px);
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
                background: rgba(255, 215, 0, 0.6);
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
                background: rgba(255, 255, 255, 0.9);
            }
        }
        @keyframes zeusStrike {
            0% {
                box-shadow: 0 0 0px #ffff00;
                background: rgba(255, 255, 0, 0.6);
            }
            100% {
                box-shadow: 0 0 30px #ffff00;
                background: rgba(20, 20, 50, 0.8);
            }
        }

        .game-area.locked {
            filter: brightness(0.7);
            pointer-events: none;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .balance-box,
        .bet-box {
            background: #0d0d25;
            border: 2px solid #2a2a5a;
            border-radius: 12px;
            padding: 10px 16px;
            flex: 1;
            text-align: center;
        }

        .balance-label,
        .bet-label {
            font-size: 11px;
            color: #8888aa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-value,
        .bet-value {
            font-size: 22px;
            font-weight: 900;
            color: #ffd700;
        }
        .bet-value {
            color: #ffffff;
        }

        .bet-controls {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            justify-content: center;
        }

        .bet-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #4a4a7a;
            background: #1a1a3e;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bet-btn:hover {
            background: #2a2a5e;
            border-color: #ffd700;
            color: #ffd700;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .btn-spin {
            flex: 2;
            padding: 16px;
            border-radius: 50px;
            border: none;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffd700 0%, #d4a843 30%, #8b6914 100%);
            color: #1a1a3e;
            box-shadow: 0 6px 20px rgba(212, 168, 67, 0.5);
            transition: all 0.2s;
        }

        .btn-spin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 168, 67, 0.7);
        }
        .btn-spin:active {
            transform: scale(0.95);
        }
        .btn-spin:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-bonus {
            flex: 1;
            padding: 16px 10px;
            border-radius: 50px;
            border: 2px solid #6c5ce7;
            background: linear-gradient(180deg, #2d1b69 0%, #1a1040 100%);
            color: #c4b5fd;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-bonus:hover {
            background: #3d2b79;
            border-color: #a78bfa;
            color: #fff;
            box-shadow: 0 0 25px rgba(108, 92, 231, 0.5);
        }
        .btn-bonus:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-autospin {
            flex: 1;
            padding: 16px 10px;
            border-radius: 50px;
            border: 2px solid #4a4a7a;
            background: #1a1a3e;
            color: #999;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-autospin:hover {
            border-color: #ffd700;
            color: #ffd700;
        }
        .btn-autospin.active {
            border-color: #ffd700 !important;
            color: #ffd700 !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .win-notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
        .win-notification.show {
            transform: translate(-50%, -50%) scale(1);
        }

        @media (max-width: 500px) {
            .container {
                width: 95vw;
                padding: 12px 8px 14px;
                border-radius: 16px;
            }
            .cell {
                font-size: 22px;
                border-radius: 5px;
            }
            .grid {
                gap: 2px;
            }
            .game-area {
                height: 290px;
            }
            .balance-value,
            .bet-value {
                font-size: 16px;
            }
            .btn-spin {
                font-size: 16px;
                padding: 12px;
            }
            .btn-bonus,
            .btn-autospin {
                font-size: 10px;
                padding: 12px 4px;
            }
            .logo {
                font-size: 16px;
            }
            .multiplier-display {
                font-size: 16px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <span class="logo">⚡ GATES OF OLYMPUS</span>
            <div class="multiplier-display" id="totalMultiplier">x1</div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="grid" id="grid"></div>
            <div class="win-notification" id="winNotification"></div>
        </div>

        <div class="info-row">
            <div class="balance-box">
                <div class="balance-label">💎 Баланс</div>
                <div class="balance-value" id="balance">10 000</div>
            </div>
            <div class="bet-box">
                <div class="bet-label">🎯 Ставка</div>
                <div class="bet-value" id="bet">100</div>
                <div class="bet-controls">
                    <button class="bet-btn" id="betMinus">−</button>
                    <button class="bet-btn" id="betPlus">+</button>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-spin" id="btnSpin">ВРАЩАТЬ</button>
            <button class="btn-bonus" id="btnBonus">КУПИТЬ БОНУС<br>100x</button>
            <button class="btn-autospin" id="btnAuto">AUTO</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 1. СТРУКТУРА ДАННЫХ (JSON-подобная) ====================
            const COLS = 6;
            const ROWS = 5;

            /**
             * Ячейка сетки:
             * {
             *   symbolType: string,   // ID символа
             *   isMultiplier: boolean,
             *   multiplierValue: number | null,
             *   x: number,            // колонка
             *   y: number             // ряд (0 = верх)
             * }
             */

            // ==================== 2. ТАБЛИЦА ВЫПЛАТ (PayTable) ====================
            const SYMBOLS = [
                { id: 'gem_purple', emoji: '💎', name: 'Фиолетовый', minCount: 8,
                    payouts: [0, 0.25, 0.5, 0.75, 1, 2, 3, 5, 10, 15, 20], weight: 22, tier: 'low' },
                { id: 'gem_green', emoji: '🟢', name: 'Зелёный', minCount: 8,
                    payouts: [0, 0.2, 0.4, 0.6, 0.8, 1.5, 2, 4, 8, 12, 16], weight: 22, tier: 'low' },
                { id: 'gem_blue', emoji: '🔵', name: 'Синий', minCount: 8,
                    payouts: [0, 0.15, 0.3, 0.45, 0.6, 1.2, 1.8, 3, 6, 9, 12], weight: 20, tier: 'low' },
                { id: 'gem_yellow', emoji: '🟡', name: 'Жёлтый', minCount: 8,
                    payouts: [0, 0.1, 0.25, 0.4, 0.5, 1, 1.5, 2.5, 5, 7, 10], weight: 20, tier: 'low' },
                { id: 'gem_red', emoji: '🔴', name: 'Красный', minCount: 8,
                    payouts: [0, 0.1, 0.2, 0.35, 0.45, 0.9, 1.3, 2, 4, 6, 8], weight: 18, tier: 'low' },
                { id: 'cup', emoji: '🏆', name: 'Кубок', minCount: 6,
                    payouts: [0, 0.5, 1, 1.5, 2, 3, 4, 5, 10, 15, 20, 30, 40], weight: 10, tier: 'high' },
                { id: 'ring', emoji: '💍', name: 'Кольцо', minCount: 6,
                    payouts: [0, 1.5, 3, 5, 8, 12, 20, 30, 50, 75, 100, 150, 200], weight: 6, tier: 'high' },
                { id: 'timer', emoji: '⏳', name: 'Часы', minCount: 6,
                    payouts: [0, 2, 4, 6, 10, 18, 30, 50, 80, 120, 180, 250, 350], weight: 3, tier: 'high' },
                { id: 'crown', emoji: '👑', name: 'Корона', minCount: 6,
                    payouts: [0, 1, 2, 3, 4, 5, 10, 15, 25, 40, 50, 75, 100], weight: 6, tier: 'high' },
                { id: 'scatter', emoji: '⚡', name: 'Scatter (Зевс)', minCount: 4,
                    payouts: [0, 0, 0, 0, 3, 5, 10, 20, 50, 100], weight: 2, tier: 'scatter' },
            ];

            const MULTIPLIER_VALUES = [
                { value: 2, weight: 30 }, { value: 3, weight: 25 }, { value: 4, weight: 20 },
                { value: 5, weight: 15 }, { value: 6, weight: 12 }, { value: 8, weight: 10 },
                { value: 10, weight: 8 }, { value: 15, weight: 6 }, { value: 20, weight: 4 },
                { value: 25, weight: 3 }, { value: 50, weight: 2 }, { value: 100, weight: 1 },
                { value: 250, weight: 0.5 }, { value: 500, weight: 0.3 },
            ];
            const totalMultWeight = MULTIPLIER_VALUES.reduce((s, m) => s + m.weight, 0);
            const MULTIPLIER_SPAWN_CHANCE = 0.07; // 7% шанс на ячейку

            const BET_OPTIONS = [10, 25, 50, 100, 250, 500, 1000, 2500, 5000];

            // ==================== 3. СОСТОЯНИЕ ИГРЫ ====================
            let grid = []; // grid[col][row]
            let balance = 10000;
            let betAmount = 100;
            let betIndex = 3;
            let spinMultiplier = 1; // Множитель текущего спина (сумма сфер в каскадах)
            let globalBonusMultiplier = 1; // Глобальный множитель в бонусе
            let isSpinning = false;
            let isBonusGame = false;
            let bonusSpinsRemaining = 0;
            let autoSpinsRemaining = 0;
            let tumbleInProgress = false;

            // ==================== 4. DOM ЭЛЕМЕНТЫ ====================
            const gridEl = document.getElementById('grid');
            const balanceEl = document.getElementById('balance');
            const betEl = document.getElementById('bet');
            const totalMultEl = document.getElementById('totalMultiplier');
            const btnSpin = document.getElementById('btnSpin');
            const btnBonus = document.getElementById('btnBonus');
            const btnAuto = document.getElementById('btnAuto');
            const gameArea = document.getElementById('gameArea');
            const winNotification = document.getElementById('winNotification');
            const betMinusBtn = document.getElementById('betMinus');
            const betPlusBtn = document.getElementById('betPlus');

            // ==================== 5. УТИЛИТЫ ====================
            function fmt(n) {
                if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
                if (n >= 1000) return n.toLocaleString('ru-RU');
                return Math.floor(n).toString();
            }

            function getSymbolById(id) {
                return SYMBOLS.find(s => s.id === id);
            }

            function getRandomSymbolId() {
                const totalWeight = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);
                let r = Math.random() * totalWeight;
                for (const sym of SYMBOLS) {
                    r -= sym.weight;
                    if (r <= 0) return sym.id;
                }
                return SYMBOLS[0].id;
            }

            function getRandomMultiplierValue() {
                let r = Math.random() * totalMultWeight;
                for (const m of MULTIPLIER_VALUES) {
                    r -= m.weight;
                    if (r <= 0) return m.value;
                }
                return MULTIPLIER_VALUES[0].value;
            }

            // ==================== 6. ГЕНЕРАЦИЯ СЕТКИ ====================
            function generateGrid() {
                grid = [];
                for (let col = 0; col < COLS; col++) {
                    grid[col] = [];
                    for (let row = 0; row < ROWS; row++) {
                        const sid = getRandomSymbolId();
                        const isMult = Math.random() < MULTIPLIER_SPAWN_CHANCE;
                        grid[col][row] = {
                            symbolType: sid,
                            isMultiplier: isMult,
                            multiplierValue: isMult ? getRandomMultiplierValue() : null,
                            x: col,
                            y: row,
                        };
                    }
                }
            }

            // ==================== 7. ОТРИСОВКА (updateUI) ====================
            function renderGrid(animateNew = false) {
                gridEl.innerHTML = '';
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.col = col;
                        cell.dataset.row = row;
                        const data = grid[col]?.[row];
                        if (data) {
                            const sym = getSymbolById(data.symbolType);
                            cell.textContent = sym ? sym.emoji : '❓';
                            if (data.isMultiplier) {
                                cell.classList.add('multiplier-cell');
                                const badge = document.createElement('span');
                                badge.className = 'mult-badge';
                                badge.textContent = 'x' + data.multiplierValue;
                                cell.appendChild(badge);
                            }
                        }
                        if (animateNew) {
                            cell.classList.add('falling');
                            cell.style.animationDelay = (col * 0.03 + row * 0.015) + 's';
                        }
                        gridEl.appendChild(cell);
                    }
                }
            }

            function updateUIState() {
                balanceEl.textContent = fmt(balance);
                betEl.textContent = fmt(betAmount);
                const displayMult = isBonusGame ? globalBonusMultiplier : spinMultiplier;
                totalMultEl.textContent = 'x' + displayMult;
                if (isBonusGame) {
                    totalMultEl.classList.add('bonus-active');
                } else {
                    totalMultEl.classList.remove('bonus-active');
                }

                const bonusCost = betAmount * 100;
                btnBonus.textContent = isBonusGame ?
                    `БОНУС (${bonusSpinsRemaining})` :
                    `КУПИТЬ БОНУС\n${fmt(bonusCost)}`;

                const canSpin = !isSpinning && balance >= betAmount && !isBonusGame;
                const canBuyBonus = !isSpinning && !isBonusGame && balance >= bonusCost;
                btnSpin.disabled = !canSpin && !(isBonusGame && bonusSpinsRemaining > 0 && !isSpinning);
                btnBonus.disabled = !canBuyBonus;

                if (isBonusGame && bonusSpinsRemaining > 0 && !isSpinning) {
                    btnSpin.disabled = false;
                    btnSpin.textContent = `ФРИСПИН (${bonusSpinsRemaining})`;
                } else if (!isBonusGame) {
                    btnSpin.textContent = autoSpinsRemaining > 0 ?
                        `AUTO (${autoSpinsRemaining})` : 'ВРАЩАТЬ';
                }

                if (autoSpinsRemaining > 0) {
                    btnAuto.classList.add('active');
                    btnAuto.textContent = `AUTO ${autoSpinsRemaining}`;
                } else {
                    btnAuto.classList.remove('active');
                    btnAuto.textContent = 'AUTO';
                }

                if (isSpinning) gameArea.classList.add('locked');
                else gameArea.classList.remove('locked');
            }

            // ==================== 8. ГЛАВНЫЙ ЦИКЛ: ПРОВЕРКА ВЫИГРЫША (checkWin) ====================
            function checkWin(gridSnapshot) {
                const counts = {}; // { symbolType: { count, positions: [] } }
                for (let col = 0; col < COLS; col++) {
                    for (let row = 0; row < ROWS; row++) {
                        const cell = gridSnapshot[col]?.[row];
                        if (!cell) continue;
                        const id = cell.symbolType;
                        if (!counts[id]) counts[id] = { count: 0, positions: [], symbolData: getSymbolById(id) };
                        counts[id].count++;
                        counts[id].positions.push({ x: col, y: row });
                    }
                }

                const winners = [];
                for (const [id, data] of Object.entries(counts)) {
                    if (!data.symbolData) continue;
                    const minC = data.symbolData.minCount;
                    if (data.count >= minC) {
                        const idx = data.count - minC;
                        const pay = idx < data.symbolData.payouts.length ? data.symbolData.payouts[idx] : data.symbolData
                            .payouts[data.symbolData.payouts.length - 1];
                        if (pay > 0) {
                            winners.push({
                                symbolType: id,
                                count: data.count,
                                payoutMultiplier: pay,
                                positions: data.positions,
                                isScatter: data.symbolData.tier === 'scatter',
                            });
                        }
                    }
                }
                winners.sort((a, b) => b.payoutMultiplier - a.payoutMultiplier);
                return winners;
            }

            // ==================== 9. СБОР МНОЖИТЕЛЕЙ С ПОЛЯ ====================
            function collectMultipliersFromGrid(gridSnapshot) {
                const mults = [];
                for (let col = 0; col < COLS; col++) {
                    for (let row = 0; row < ROWS; row++) {
                        const cell = gridSnapshot[col]?.[row];
                        if (cell && cell.isMultiplier && cell.multiplierValue) {
                            mults.push({ x: col, y: row, value: cell.multiplierValue });
                        }
                    }
                }
                return mults;
            }

            // ==================== 10. АНИМАЦИЯ «УДАР ЗЕВСА» ====================
            function triggerZeusStrike(positions) {
                const cells = gridEl.querySelectorAll('.cell');
                cells.forEach(c => c.classList.remove('zeus-strike'));
                positions.forEach(p => {
                    const cell = gridEl.querySelector(`.cell[data-col="${p.x}"][data-row="${p.y}"]`);
                    if (cell) {
                        cell.classList.add('zeus-strike');
                        setTimeout(() => cell.classList.remove('zeus-strike'), 250);
                    }
                });
            }

            // ==================== 11. АНИМАЦИЯ ВЫИГРЫША (winExplosion) ====================
            function animateWinExplosion(positions, callback) {
                const cells = gridEl.querySelectorAll('.cell');
                cells.forEach(c => c.classList.remove('win', 'exploding'));
                positions.forEach(p => {
                    const cell = gridEl.querySelector(`.cell[data-col="${p.x}"][data-row="${p.y}"]`);
                    if (cell) cell.classList.add('win');
                });
                setTimeout(() => {
                    positions.forEach(p => {
                        const cell = gridEl.querySelector(`.cell[data-col="${p.x}"][data-row="${p.y}"]`);
                        if (cell) cell.classList.add('exploding');
                    });
                    setTimeout(callback, 400); // winExplosion = 0.4s
                }, 300);
            }

            // ==================== 12. СИСТЕМА TUMBLE ====================
            function removeWinningSymbols(positionsToRemove, multiplierPositions) {
                const allRemove = new Set();
                positionsToRemove.forEach(p => allRemove.add(`${p.x},${p.y}`));
                multiplierPositions.forEach(p => allRemove.add(`${p.x},${p.y}`));
                for (const key of allRemove) {
                    const [x, y] = key.split(',').map(Number);
                    if (grid[x] && grid[x][y]) grid[x][y] = null;
                }
            }

            function applyGravity() {
                let moved = false;
                for (let col = 0; col < COLS; col++) {
                    const existing = grid[col].filter(cell => cell !== null);
                    const newCol = [];
                    for (let i = 0; i < ROWS - existing.length; i++) newCol.push(null);
                    for (const cell of existing) newCol.push(cell);
                    for (let row = 0; row < ROWS; row++) {
                        if (grid[col][row] !== newCol[row]) moved = true;
                        if (newCol[row]) { newCol[row].x = col;
                            newCol[row].y = row; }
                    }
                    grid[col] = newCol;
                }
                return moved;
            }

            function fillEmptyCells() {
                for (let col = 0; col < COLS; col++) {
                    for (let row = 0; row < ROWS; row++) {
                        if (!grid[col][row]) {
                            const sid = getRandomSymbolId();
                            const isMult = Math.random() < MULTIPLIER_SPAWN_CHANCE;
                            grid[col][row] = {
                                symbolType: sid,
                                isMultiplier: isMult,
                                multiplierValue: isMult ? getRandomMultiplierValue() : null,
                                x: col,
                                y: row,
                            };
                        }
                    }
                }
            }

            // ==================== 13. ПОКАЗ УВЕДОМЛЕНИЯ ====================
            let notifTimeout;

            function showWinNotification(amount) {
                if (amount <= 0) return;
                clearTimeout(notifTimeout);
                winNotification.textContent = '+ ' + fmt(amount);
                winNotification.classList.add('show');
                notifTimeout = setTimeout(() => winNotification.classList.remove('show'), 1500);
            }

            // ==================== 14. ОБРАБОТКА КАСКАДОВ (Tumble Sequence) ====================
            async function processTumbles() {
                let totalSequenceWin = 0;
                let accumulatedSpinMult = 1;
                let cascadeIndex = 0;
                tumbleInProgress = true;

                while (tumbleInProgress) {
                    const multsBefore = collectMultipliersFromGrid(grid);
                    const winners = checkWin(grid);

                    // Проверка Scatter'ов для бонуса (если не в бонусе)
                    let scatterHit = null;
                    if (!isBonusGame) {
                        scatterHit = winners.find(w => w.isScatter && w.count >= 4);
                    }

                    const hasWin = winners.length > 0;
                    const hasMultipliers = multsBefore.length > 0;

                    if (!hasWin && cascadeIndex === 0) break;
                    if (!hasWin && cascadeIndex > 0) break;

                    // Анимация молнии Зевса за 0.2s до появления множителей
                    if (hasMultipliers && hasWin) {
                        triggerZeusStrike(multsBefore);
                        await sleep(200);
                    }

                    // Собираем множители этого шага
                    let stepMultAdd = 0;
                    multsBefore.forEach(m => stepMultAdd += m.value);
                    if (stepMultAdd > 0) {
                        accumulatedSpinMult += stepMultAdd;
                        spinMultiplier = accumulatedSpinMult;
                        if (isBonusGame) {
                            globalBonusMultiplier += stepMultAdd;
                        }
                        updateUIState();
                    }

                    // Считаем выигрыш
                    let stepWin = 0;
                    const allWinPositions = [];
                    winners.forEach(w => {
                        stepWin += w.payoutMultiplier * betAmount;
                        w.positions.forEach(p => allWinPositions.push(p));
                    });
                    totalSequenceWin += stepWin;

                    // Анимация и удаление
                    await new Promise(resolve => animateWinExplosion(allWinPositions, resolve));
                    removeWinningSymbols(allWinPositions, multsBefore);
                    renderGrid(false);
                    await sleep(200);

                    // Гравитация
                    const moved = applyGravity();
                    if (moved) {
                        fillEmptyCells();
                        renderGrid(true);
                        await sleep(350); // dropSpeed ~0.35s
                    }

                    cascadeIndex++;
                    if (!hasWin || cascadeIndex > 40) break;

                    // Если scatter бонус — запускаем после каскадов
                    if (scatterHit && !isBonusGame) {
                        // Откладываем запуск бонуса до конца всех каскадов
                        window._pendingBonus = true;
                    }
                }

                // Применяем множитель
                const finalWin = totalSequenceWin * accumulatedSpinMult;
                tumbleInProgress = false;
                spinMultiplier = 1;
                updateUIState();

                return { finalWin, bonusTriggered: window._pendingBonus || false };
            }

            function sleep(ms) {
                return new Promise(r => setTimeout(r, ms));
            }

            // ==================== 15. ГЛАВНАЯ ФУНКЦИЯ СПИНА ====================
            async function spin() {
                if (isSpinning) return;
                if (isBonusGame && bonusSpinsRemaining <= 0) {
                    endBonusGame();
                    return;
                }
                if (!isBonusGame && balance < betAmount && autoSpinsRemaining === 0) return;

                isSpinning = true;
                window._pendingBonus = false;
                if (!isBonusGame) balance -= betAmount;
                spinMultiplier = 1;
                updateUIState();

                generateGrid();
                renderGrid(true);
                await sleep(400);

                const { finalWin, bonusTriggered } = await processTumbles();

                if (finalWin > 0) {
                    balance += finalWin;
                    showWinNotification(finalWin);
                }

                // Обработка бонуса
                if (bonusTriggered && !isBonusGame) {
                    await sleep(500);
                    startBonusGame();
                    isSpinning = false;
                    updateUIState();
                    await sleep(600);
                    spin(); // авто-запуск первого фриспина
                    return;
                }

                if (isBonusGame) {
                    bonusSpinsRemaining--;
                    if (bonusSpinsRemaining <= 0) {
                        endBonusGame();
                    }
                }

                isSpinning = false;
                updateUIState();

                // Автоспины
                if (autoSpinsRemaining > 0 && !isBonusGame) {
                    autoSpinsRemaining--;
                    updateUIState();
                    if (autoSpinsRemaining > 0 && balance >= betAmount) {
                        await sleep(500);
                        spin();
                    } else {
                        autoSpinsRemaining = 0;
                        updateUIState();
                    }
                }

                // Автоспины в бонусе
                if (isBonusGame && bonusSpinsRemaining > 0 && !isSpinning) {
                    await sleep(600);
                    spin();
                }
            }

            // ==================== 16. БОНУСНЫЙ РАУНД ====================
            function startBonusGame() {
                isBonusGame = true;
                bonusSpinsRemaining = 15;
                globalBonusMultiplier = 1;
                autoSpinsRemaining = 0;
                updateUIState();
                showWinNotification(0); // визуальный сброс
                console.log('⚡ БОНУСНАЯ ИГРА АКТИВИРОВАНА! 15 фриспинов.');
            }

            function endBonusGame() {
                console.log('🏁 Бонусная игра завершена. Global Multiplier: x' + globalBonusMultiplier);
                isBonusGame = false;
                bonusSpinsRemaining = 0;
                globalBonusMultiplier = 1;
                updateUIState();
            }

            function buyBonus() {
                if (isSpinning || isBonusGame) return;
                const cost = betAmount * 100;
                if (balance < cost) return;
                balance -= cost;
                startBonusGame();
                updateUIState();
                setTimeout(() => spin(), 500);
            }

            // ==================== 17. УПРАВЛЕНИЕ СТАВКОЙ ====================
            function changeBet(dir) {
                if (isSpinning) return;
                betIndex = Math.max(0, Math.min(BET_OPTIONS.length - 1, betIndex + dir));
                betAmount = BET_OPTIONS[betIndex];
                updateUIState();
            }

            function toggleAutoSpin() {
                if (isSpinning || isBonusGame) return;
                if (autoSpinsRemaining > 0) {
                    autoSpinsRemaining = 0;
                    updateUIState();
                    return;
                }
                const options = [10, 25, 50, 100];
                const current = autoSpinsRemaining || 0;
                const next = options.find(o => o > current) || options[0];
                autoSpinsRemaining = next;
                updateUIState();
                if (balance >= betAmount) spin();
            }

            // ==================== 18. ОБРАБОТЧИКИ ====================
            btnSpin.addEventListener('click', spin);
            btnBonus.addEventListener('click', buyBonus);
            btnAuto.addEventListener('click', toggleAutoSpin);
            betMinusBtn.addEventListener('click', () => changeBet(-1));
            betPlusBtn.addEventListener('click', () => changeBet(1));
            document.addEventListener('keydown', e => {
                if (e.code === 'Space' && !isSpinning) { e.preventDefault();
                    spin(); }
                if (e.code === 'KeyB' && !isSpinning && !isBonusGame) { e.preventDefault();
                    buyBonus(); }
                if (e.code === 'KeyA' && !isSpinning) { e.preventDefault();
                    toggleAutoSpin(); }
            });

            // ==================== 19. ФОН ====================
            function createParticles() {
                const c = document.getElementById('particles');
                for (let i = 0; i < 35; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const s = Math.random() * 4 + 2;
                    p.style.width = s + 'px';
                    p.style.height = s + 'px';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDuration = Math.random() * 8 + 6 + 's';
                    p.style.animationDelay = Math.random() * 8 + 's';
                    c.appendChild(p);
                }
            }
            createParticles();

            // ==================== 20. ИНИЦИАЛИЗАЦИЯ ====================
            generateGrid();
            renderGrid(true);
            updateUIState();
            console.log('⚡ Gates of Olympus Engine v2.0 Ready');
            console.log('📋 Управление: SPACE=Spin, B=Buy Bonus, A=AutoSpin');
            console.log('📐 Scatter Pays, Tumble, Progressive Multiplier, Free Spins — все механики активны');
        })();
    </script>
</body>
