<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tok Messenger</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tok">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Тема 1: Основная премиум (Moonlight) */
        [data-theme="moonlight"] {
            --bg-color: #0f1218;
            --bg-secondary: #1a1f2a;
            --bg-tertiary: #242b38;
            --bg-chat: #0c0f15;
            --bg-input: #1e2430;
            --bg-header: #141a24;
            --text-primary: #e4e9f2;
            --text-secondary: #8f9bb3;
            --text-hint: #6e7a94;
            --accent-primary: #6c5ce7;
            --accent-secondary: #a29bfe;
            --accent-success: #00b894;
            --accent-danger: #ff7675;
            --accent-warning: #fdcb6e;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.03);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.2);
            --message-out: #6c5ce7;
            --message-in: #1e2430;
            --online-green: #00b894;
            --offline-gray: #636e72;
            --dnd-red: #ff7675;
            --status-sent: #8f9bb3;
            --status-delivered: #8f9bb3;
            --status-read: #6c5ce7;
            --gradient-1: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --gradient-2: linear-gradient(135deg, #00b894, #55efc4);
            --gradient-3: linear-gradient(135deg, #ff7675, #ff9f9f);
            --blur-amount: 20px;
        }

        /* Тема 2: Северное сияние */
        [data-theme="aurora"] {
            --bg-color: #0a1928;
            --bg-secondary: #122b3c;
            --bg-tertiary: #1a3d52;
            --bg-chat: #0d1f2e;
            --bg-input: #163748;
            --bg-header: #0f2636;
            --text-primary: #e0f2fe;
            --text-secondary: #94a3b8;
            --text-hint: #64748b;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --accent-success: #4ade80;
            --accent-danger: #f87171;
            --accent-warning: #facc15;
            --message-out: #38bdf8;
            --message-in: #163748;
            --online-green: #4ade80;
            --offline-gray: #64748b;
            --dnd-red: #f87171;
            --status-read: #38bdf8;
        }

        /* Тема 3: Розовый закат */
        [data-theme="sunset"] {
            --bg-color: #1a0f1a;
            --bg-secondary: #2d1f2d;
            --bg-tertiary: #402f40;
            --bg-chat: #1f1420;
            --bg-input: #322432;
            --bg-header: #261a26;
            --text-primary: #fae8ff;
            --text-secondary: #c4b5fd;
            --text-hint: #a78bfa;
            --accent-primary: #d946ef;
            --accent-secondary: #f472b6;
            --accent-success: #86efac;
            --accent-danger: #fda4af;
            --accent-warning: #fde047;
            --message-out: #d946ef;
            --message-in: #322432;
            --online-green: #86efac;
            --offline-gray: #a78bfa;
            --dnd-red: #fda4af;
            --status-read: #d946ef;
        }

        /* Тема 4: Лесная чаща */
        [data-theme="forest"] {
            --bg-color: #0a1f1a;
            --bg-secondary: #1a332b;
            --bg-tertiary: #2a473c;
            --bg-chat: #0f2620;
            --bg-input: #1f3f35;
            --bg-header: #142f27;
            --text-primary: #dcfce7;
            --text-secondary: #86efac;
            --text-hint: #4ade80;
            --accent-primary: #22c55e;
            --accent-secondary: #86efac;
            --accent-success: #4ade80;
            --accent-danger: #f87171;
            --accent-warning: #facc15;
            --message-out: #22c55e;
            --message-in: #1f3f35;
            --online-green: #4ade80;
            --offline-gray: #4ade80;
            --dnd-red: #f87171;
            --status-read: #22c55e;
        }

        /* Тема 5: Космическая туманность */
        [data-theme="nebula"] {
            --bg-color: #0f0b1f;
            --bg-secondary: #1e1535;
            --bg-tertiary: #2d1f4b;
            --bg-chat: #130e26;
            --bg-input: #221a3a;
            --bg-header: #181230;
            --text-primary: #f0e7ff;
            --text-secondary: #c4b5fd;
            --text-hint: #a78bfa;
            --accent-primary: #8b5cf6;
            --accent-secondary: #c084fc;
            --accent-success: #6ee7b7;
            --accent-danger: #fca5a5;
            --accent-warning: #fcd34d;
            --message-out: #8b5cf6;
            --message-in: #221a3a;
            --online-green: #6ee7b7;
            --offline-gray: #a78bfa;
            --dnd-red: #fca5a5;
            --status-read: #8b5cf6;
        }

        /* Тема 6: Кофейная */
        [data-theme="coffee"] {
            --bg-color: #1a1410;
            --bg-secondary: #2c231c;
            --bg-tertiary: #3e3228;
            --bg-chat: #201b16;
            --bg-input: #322a22;
            --bg-header: #261f19;
            --text-primary: #f5e6d3;
            --text-secondary: #c4a484;
            --text-hint: #a68b6f;
            --accent-primary: #b96f3f;
            --accent-secondary: #d49b6a;
            --accent-success: #8fbc8f;
            --accent-danger: #cd5c5c;
            --accent-warning: #f4a460;
            --message-out: #b96f3f;
            --message-in: #322a22;
            --online-green: #8fbc8f;
            --offline-gray: #a68b6f;
            --dnd-red: #cd5c5c;
            --status-read: #b96f3f;
        }

        /* Тема 7: Океанская глубина */
        [data-theme="ocean"] {
            --bg-color: #0a1a2a;
            --bg-secondary: #0f2b40;
            --bg-tertiary: #143c55;
            --bg-chat: #0c2135;
            --bg-input: #11324a;
            --bg-header: #0d283f;
            --text-primary: #e2f0fa;
            --text-secondary: #9ac7e7;
            --text-hint: #6ba6cc;
            --accent-primary: #0284c7;
            --accent-secondary: #38bdf8;
            --accent-success: #2dd4bf;
            --accent-danger: #fb7185;
            --accent-warning: #fbbf24;
            --message-out: #0284c7;
            --message-in: #11324a;
            --online-green: #2dd4bf;
            --offline-gray: #6ba6cc;
            --dnd-red: #fb7185;
            --status-read: #0284c7;
        }

        /* Тема 8: Фиолетовые сумерки */
        [data-theme="twilight"] {
            --bg-color: #1a1025;
            --bg-secondary: #2d1d3a;
            --bg-tertiary: #402a4f;
            --bg-chat: #20162f;
            --bg-input: #322442;
            --bg-header: #271b38;
            --text-primary: #f3e8ff;
            --text-secondary: #d8b4fe;
            --text-hint: #c084fc;
            --accent-primary: #a855f7;
            --accent-secondary: #d946ef;
            --accent-success: #7dd3fc;
            --accent-danger: #f9a8d4;
            --accent-warning: #fde047;
            --message-out: #a855f7;
            --message-in: #322442;
            --online-green: #7dd3fc;
            --offline-gray: #c084fc;
            --dnd-red: #f9a8d4;
            --status-read: #a855f7;
        }

        /* Тема 9: Индиго */
        [data-theme="indigo"] {
            --bg-color: #0e1c2f;
            --bg-secondary: #1a2b45;
            --bg-tertiary: #263a5b;
            --bg-chat: #112236;
            --bg-input: #1e314c;
            --bg-header: #14273f;
            --text-primary: #e0f2fe;
            --text-secondary: #a5b4fc;
            --text-hint: #818cf8;
            --accent-primary: #4f46e5;
            --accent-secondary: #818cf8;
            --accent-success: #6ee7b7;
            --accent-danger: #fda4af;
            --accent-warning: #fcd34d;
            --message-out: #4f46e5;
            --message-in: #1e314c;
            --online-green: #6ee7b7;
            --offline-gray: #818cf8;
            --dnd-red: #fda4af;
            --status-read: #4f46e5;
        }

        /* Тема 10: Скандинавский минимализм */
        [data-theme="nordic"] {
            --bg-color: #1e282f;
            --bg-secondary: #2e3b43;
            --bg-tertiary: #3e4e59;
            --bg-chat: #232f37;
            --bg-input: #33434d;
            --bg-header: #28363f;
            --text-primary: #eceff4;
            --text-secondary: #b0c4de;
            --text-hint: #8fa9c4;
            --accent-primary: #88c0d0;
            --accent-secondary: #81a1c1;
            --accent-success: #a3be8c;
            --accent-danger: #bf616a;
            --accent-warning: #ebcb8b;
            --message-out: #88c0d0;
            --message-in: #33434d;
            --online-green: #a3be8c;
            --offline-gray: #8fa9c4;
            --dnd-red: #bf616a;
            --status-read: #88c0d0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: background-color 0.2s ease;
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            background-color: var(--bg-secondary);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            flex-direction: column;
            max-width: 100%;
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
        }

        .sidebar.active {
            transform: translateX(0);
        }

        @media (min-width: 769px) {
            .sidebar {
                position: relative;
                transform: none;
                width: 360px;
                max-width: 360px;
                border-right: 1px solid var(--border-color);
            }
        }

        .sidebar-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            height: 64px;
            flex-shrink: 0;
            background-color: var(--bg-header);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .avatar:active {
            transform: scale(0.95);
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }

        .profile-status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--gradient-1);
            color: white;
            border: none;
            box-shadow: var(--shadow-sm);
        }

        .badge.creator {
            background: linear-gradient(135deg, #ffd700, #ffa500);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .status-dot.online {
            background-color: var(--online-green);
            box-shadow: 0 0 12px var(--online-green);
        }

        .status-dot.offline {
            background-color: var(--offline-gray);
        }

        .status-dot.dnd {
            background-color: var(--dnd-red);
            box-shadow: 0 0 12px var(--dnd-red);
        }

        .tabs {
            display: flex;
            padding: 8px 12px;
            gap: 4px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            background-color: var(--bg-secondary);
        }

        .tab {
            flex: 1;
            padding: 8px 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            text-align: center;
        }

        .tab.active {
            background: var(--gradient-1);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .search-bar {
            padding: 8px 12px;
            position: relative;
            flex-shrink: 0;
            background-color: var(--bg-secondary);
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background-color: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 2px var(--accent-primary);
        }

        .create-chat-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--gradient-1);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: 400;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .create-chat-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background-color: var(--bg-secondary);
            padding: 4px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
            min-height: 72px;
            border-radius: 0;
            margin: 0;
        }

        .chat-item.pinned {
            background: linear-gradient(90deg, var(--bg-tertiary) 0%, transparent 100%);
            border-left: 3px solid var(--accent-primary);
        }

        .chat-item.favorite {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.1) 0%, transparent 100%);
            border-left: 3px solid gold;
        }

        .chat-item:active {
            background-color: var(--bg-tertiary);
        }

        .chat-item.active {
            background-color: var(--bg-tertiary);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 22px;
            flex-shrink: 0;
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .chat-details {
            flex: 1;
            min-width: 0;
        }

        .chat-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .pin-icon {
            color: var(--accent-primary);
            font-size: 12px;
            opacity: 0.7;
            margin-left: auto;
            cursor: pointer;
            transition: opacity 0.2s;
            padding: 4px;
        }

        .pin-icon:hover {
            opacity: 1;
        }

        .pin-icon.pinned {
            opacity: 1;
            color: var(--accent-primary);
        }

        .chat-status-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .chat-last-message {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-unread {
            background: var(--gradient-1);
            color: white;
            font-size: 11px;
            font-weight: 600;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            box-shadow: var(--shadow-sm);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-width: 0;
            height: 100%;
            position: relative;
            background-color: var(--bg-chat);
        }

        .chat-header {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            height: 64px;
            flex-shrink: 0;
            background-color: var(--bg-header);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
        }

        .back-button {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background-color 0.2s;
        }

        .back-button:active {
            background-color: var(--bg-tertiary);
        }

        .back-button.mobile-visible {
            display: flex;
        }

        .chat-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 500;
            flex-shrink: 0;
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .chat-title {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .chat-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.out {
            align-self: flex-end;
        }

        .message.in {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            max-width: 100%;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .message.out .message-bubble {
            background: var(--gradient-1);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.in .message-bubble {
            background-color: var(--message-in);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 2px;
            margin-left: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 2px;
            margin-right: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .message.out .message-time {
            color: rgba(255, 255, 255, 0.7);
        }

        .message-status {
            font-size: 11px;
            display: flex;
            align-items: center;
        }

        .status-icon {
            transition: color 0.2s;
        }

<body>

    <script>
        const SUPABASE_URL = "https://olqwgfesedzrnpwfwqpa.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_nuCZ7nbXGaseOjl8VIsKpA_-o1MEZlY";
        const ABLY_API_KEY = "pYHevw.VrFP9Q:8u3IGeMI56PtA4S6Z_VCVvvXpEXEmiIlfoAjfPb6BZg";
        const CREATOR_USERNAME = "K1lame";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let ably;
        let currentUser = null;
        let myChats = [];
        let publicChats = [];
        let allUsers = [];
        let onlineUsers = {};
        let currentChat = null;
        let messages = {};
        let unreadCounts = {};
        let currentTab = 'chats';
        let pendingChatToJoin = null;
        let messageStatuses = {};
        let deletedMessages = {};
        let pinnedChats = JSON.parse(localStorage.getItem('pinnedChats')) || [];
        let pendingMessages = {};
        let messageQueue = {};

        const themes = [
            { id: 'moonlight', name: 'Moonlight (Premium)' },
            { id: 'aurora', name: 'Северное сияние' },
            { id: 'sunset', name: 'Розовый закат' },
            { id: 'forest', name: 'Лесная чаща' },
            { id: 'nebula', name: 'Космос' },
            { id: 'coffee', name: 'Кофейная' },
            { id: 'ocean', name: 'Океан' },
            { id: 'twilight', name: 'Сумерки' },
            { id: 'indigo', name: 'Индиго' },
            { id: 'nordic', name: 'Скандинавский' }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            loadFromStorage();
            applyTheme(localStorage.getItem('theme') || 'moonlight');
            populateThemeGrid();
            checkSavedSession();
            setupMessageQueue();
            setupPushNotifications();
        }

        function applyTheme(themeId) {
            document.documentElement.setAttribute('data-theme', themeId);
            localStorage.setItem('theme', themeId);
        }

        function populateThemeGrid() {
            const grid = document.getElementById('themeGrid');
            if (!grid) return;
            
            const currentTheme = localStorage.getItem('theme') || 'moonlight';
            
            grid.innerHTML = themes.map(theme => `
                <div class="theme-option ${currentTheme === theme.id ? 'selected' : ''}" onclick="selectTheme('${theme.id}')">
                    <div class="theme-preview" style="background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));"></div>
                    <span class="theme-name">${theme.name}</span>
                </div>
            `).join('');
        }

        function selectTheme(themeId) {
            applyTheme(themeId);
            populateThemeGrid();
        }

        function loadFromStorage() {
            messages = JSON.parse(localStorage.getItem('messages')) || {};
            unreadCounts = JSON.parse(localStorage.getItem('unreadCounts')) || {};
            messageStatuses = JSON.parse(localStorage.getItem('messageStatuses')) || {};
            deletedMessages = JSON.parse(localStorage.getItem('deletedMessages')) || {};
            pendingMessages = JSON.parse(localStorage.getItem('pendingMessages')) || {};
            messageQueue = JSON.parse(localStorage.getItem('messageQueue')) || {};
        }

        function setupMessageQueue() {
            setInterval(() => {
                processMessageQueue();
            }, 5000);
        }

        function setupPushNotifications() {
            if ('setAppBadge' in navigator && 'clearAppBadge' in navigator) {
                updateAppBadge();
            }
        }

        function updateAppBadge() {
            const totalUnread = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
            if (totalUnread > 0) {
                navigator.setAppBadge?.(totalUnread);
            } else {
                navigator.clearAppBadge?.();
            }
        }

        async function checkSavedSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('loginModal').classList.remove('active');
                    document.getElementById('appContainer').style.display = 'flex';
                    
                    await loadAllUsers();
                    await loadPublicChats();
                    await loadAllMessages();
                    
                    myChats = JSON.parse(localStorage.getItem(`myChats_${currentUser.id}`)) || [];
                    ensureFavoriteChat();
                    
                    updateProfileUI();
                    initAbly();
                    startHeartbeat();
                    
                    updateChatsList();
                } catch (err) {
                    console.error('Session error:', err);
                }
            } else {
                document.getElementById('loginModal').classList.add('active');
            }
        }

        function ensureFavoriteChat() {
            const favChatId = `favorite-${currentUser.id}`;
            if (!myChats.some(c => c.id === favChatId)) {
                myChats.unshift({
                    id: favChatId,
                    name: 'Избранное',
                    avatar: '⭐',
                    isPrivate: true,
                    members: [currentUser.id],
                    isFavorite: true,
                    pinned: true
                });
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
            }
        }

        async function loadAllUsers() {
            const { data } = await supabaseClient.from('users').select('*');
            allUsers = data || [];
        }

        async function loadPublicChats() {
            const { data } = await supabaseClient.from('chats').select('*').eq('type', 'public');
            publicChats = (data || []).map(chat => ({
                ...chat,
                members: typeof chat.members === 'string' ? JSON.parse(chat.members) : chat.members || []
            }));
        }

        async function loadAllMessages() {
            const { data } = await supabaseClient.from('messages').select('*').order('timestamp', { ascending: true });
            
            if (data) {
                data.forEach(msg => {
                    if (deletedMessages[msg.chat_id]?.includes(msg.id)) return;
                    
                    if (!messages[msg.chat_id]) messages[msg.chat_id] = [];
                    
                    const exists = messages[msg.chat_id].some(m => m.id === msg.id);
                    if (!exists) {
                        messages[msg.chat_id].push({
                            id: msg.id,
                            chatId: msg.chat_id,
                            sender: msg.sender_id,
                            senderName: msg.sender_name,
                            text: msg.text,
                            audio: msg.audio,
                            duration: msg.duration,
                            time: msg.time,
                            timestamp: msg.timestamp,
                            type: msg.sender_id === currentUser.id ? 'out' : 'in'
                        });
                        
                        if (msg.sender_id !== currentUser.id && currentChat?.id !== msg.chat_id) {
                            unreadCounts[msg.chat_id] = (unreadCounts[msg.chat_id] || 0) + 1;
                        }
                    }
                });
            }
            updateAppBadge();
        }

        function initAbly() {
            if (!currentUser) return;
            
            ably = new Ably.Realtime({
                key: ABLY_API_KEY,
                clientId: currentUser.id.toString(),
                transports: ['web_socket']
            });

            ably.connection.on('connected', () => {
                const presenceChannel = ably.channels.get('presence');
                presenceChannel.presence.enter({ 
                    name: currentUser.name, 
                    avatar: currentUser.avatar,
                    isCreator: currentUser.name === CREATOR_USERNAME,
                    dnd: currentUser.dnd
                });
                
                presenceChannel.presence.subscribe('enter', updateOnlineStatus);
                presenceChannel.presence.subscribe('leave', updateOnlineStatus);
                presenceChannel.presence.subscribe('update', updateOnlineStatus);
                
                presenceChannel.presence.get((err, members) => {
                    if (members) {
                        members.forEach(m => updateOnlineStatus({ clientId: m.clientId, data: m.data }));
                    }
                });
            });

            myChats.forEach(chat => subscribeToChat(chat));
        }

        function updateOnlineStatus(member) {
            if (member.clientId === currentUser.id.toString()) return;
            
            onlineUsers[member.clientId] = {
                online: true,
                ...member.data,
                lastSeen: Date.now()
            };
            
            updateChatsList();
            updateChatStatus();
        }

        function subscribeToChat(chat) {
            if (!ably || !chat) return;
            
            const channel = ably.channels.get(`chat-${chat.id}`);
            channel.unsubscribe();
            
            channel.subscribe('message', async (message) => {
                const msg = message.data;
                if (deletedMessages[chat.id]?.includes(msg.id)) return;
                
                if (!messages[chat.id]) messages[chat.id] = [];
                
                const exists = messages[chat.id].some(m => m.id === msg.id);
                if (!exists) {
                    messages[chat.id].push({
                        ...msg,
                        type: msg.sender === currentUser.id ? 'out' : 'in'
                    });
                    
                    if (msg.sender !== currentUser.id) {
                        if (currentChat?.id !== chat.id) {
                            unreadCounts[chat.id] = (unreadCounts[chat.id] || 0) + 1;
                            updateAppBadge();
                            
                            // Отправляем уведомление о доставке
                            channel.publish('delivered', { 
                                messageId: msg.id, 
                                timestamp: Date.now() 
                            });
                        } else {
                            // Если чат открыт, отмечаем как прочитанное
                            markMessagesAsRead(chat.id);
                        }
                    }
                    
                    saveMessagesDebounced();
                    
                    if (currentChat?.id === chat.id) {
                        renderMessages();
                        unreadCounts[chat.id] = 0;
                        updateAppBadge();
                    }
                    
                    updateChatsList();
                }
            });
            
            channel.subscribe('delivered', (data) => {
                const { messageId } = data.data;
                if (messageStatuses[messageId]) {
                    messageStatuses[messageId].status = 'delivered';
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) renderMessages();
                }
            });
            
            channel.subscribe('read', (data) => {
                const { messageId } = data.data;
                if (messageStatuses[messageId]) {
                    messageStatuses[messageId].status = 'read';
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) renderMessages();
                }
            });
            
            loadChatHistory(chat.id);
        }

        async function sendMessage() {
            if (!currentChat || !messageInput.value.trim()) return;
            
            const text = messageInput.value.trim();
            messageInput.value = '';
            
            const message = {
                id: Date.now() + '-' + Math.random().toString(36),
                chatId: currentChat.id,
                sender: currentUser.id,
                senderName: currentUser.name,
                text: text,
                time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
                timestamp: Date.now()
            };
            
            // Сначала добавляем в локальное хранилище
            if (!messages[currentChat.id]) messages[currentChat.id] = [];
            messages[currentChat.id].push({ ...message, type: 'out' });
            
            messageStatuses[message.id] = { status: 'pending' };
            
            renderMessages();
            
            // Сохраняем в базу данных
            try {
                await supabaseClient.from('messages').insert([{
                    id: message.id,
                    chat_id: message.chatId,
                    sender_id: message.sender,
                    sender_name: message.senderName,
                    text: message.text,
                    time: message.time,
                    timestamp: message.timestamp
                }]);
                
                // Отправляем через Ably если есть соединение
                if (ably && !currentChat.isFavorite) {
                    const channel = ably.channels.get(`chat-${currentChat.id}`);
                    channel.publish('message', message);
                    
                    // Если получатель не в сети, добавляем в очередь
                    const recipientId = currentChat.members?.find(id => id !== currentUser.id);
                    if (recipientId && !onlineUsers[recipientId]) {
                        if (!messageQueue[recipientId]) messageQueue[recipientId] = [];
                        messageQueue[recipientId].push(message);
                        localStorage.setItem('messageQueue', JSON.stringify(messageQueue));
                    }
                }
                
                messageStatuses[message.id].status = 'sent';
            } catch (err) {
                console.error('Send error:', err);
                messageStatuses[message.id].status = 'pending';
                
                if (!pendingMessages[currentChat.id]) pendingMessages[currentChat.id] = [];
                pendingMessages[currentChat.id].push(message);
                localStorage.setItem('pendingMessages', JSON.stringify(pendingMessages));
            }
            
            saveMessagesDebounced();
            updateChatsList();
        }

        function processMessageQueue() {
            if (!ably || !currentUser) return;
            
            Object.entries(messageQueue).forEach(([userId, messages]) => {
                if (onlineUsers[userId]) {
                    messages.forEach(msg => {
                        const channel = ably.channels.get(`chat-${msg.chatId}`);
                        channel.publish('message', msg);
                    });
                    delete messageQueue[userId];
                }
            });
            localStorage.setItem('messageQueue', JSON.stringify(messageQueue));
        }

        function markMessagesAsRead(chatId) {
            if (!messages[chatId]) return;
            
            messages[chatId].forEach(msg => {
                if (msg.sender !== currentUser.id) {
                    const status = messageStatuses[msg.id];
                    if (!status || status.status !== 'read') {
                        messageStatuses[msg.id] = { status: 'read', readAt: Date.now() };
                        
                        if (ably && !currentChat?.isFavorite) {
                            const channel = ably.channels.get(`chat-${chatId}`);
                            channel.publish('read', { messageId: msg.id });
                        }
                    }
                }
            });
            
            saveMessagesDebounced();
        }

        async function loadChatHistory(chatId) {
            const { data } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('chat_id', chatId)
                .order('timestamp', { ascending: true });
            
            if (data && data.length > 0) {
                if (!messages[chatId]) messages[chatId] = [];
                
                data.forEach(msg => {
                    if (deletedMessages[chatId]?.includes(msg.id)) return;
                    
                    const exists = messages[chatId].some(m => m.id === msg.id);
                    if (!exists) {
                        messages[chatId].push({
                            id: msg.id,
                            chatId: msg.chat_id,
                            sender: msg.sender_id,
                            senderName: msg.sender_name,
                            text: msg.text,
                            audio: msg.audio,
                            duration: msg.duration,
                            time: msg.time,
                            timestamp: msg.timestamp,
                            type: msg.sender_id === currentUser.id ? 'out' : 'in'
                        });
                    }
                });
                
                messages[chatId].sort((a, b) => a.timestamp - b.timestamp);
                
                if (currentChat?.id === chatId) {
                    renderMessages();
                }
            }
        }

        function updateProfileUI() {
            if (!currentUser) return;
            
            const nameSpan = document.getElementById('profileName');
            nameSpan.innerHTML = currentUser.name;
            
            if (currentUser.name === CREATOR_USERNAME) {
                nameSpan.innerHTML += ' <span class="badge creator">СОЗДАТЕЛЬ</span>';
            }
            
            const statusSpan = document.getElementById('profileStatus');
            if (currentUser.dnd) {
                statusSpan.innerHTML = '<span class="status-dot dnd"></span> Не беспокоить';
            } else {
                statusSpan.innerHTML = '<span class="status-dot online"></span> В сети';
            }
            
            document.getElementById('profileAvatar').textContent = currentUser.avatar || '👤';
            document.getElementById('profileAvatarLarge').textContent = currentUser.avatar || '👤';
            document.getElementById('profileNameInput').value = currentUser.name;
            document.getElementById('profileBioInput').value = currentUser.bio || '';
            document.getElementById('profileDNDCheckbox').checked = currentUser.dnd || false;
        }

        function updateChatsList() {
            const list = document.getElementById('chatsList');
            if (!list) return;
            
            let items = [];
            
            if (currentTab === 'chats') {
                items = [...myChats].sort((a, b) => {
                    // Сначала закрепленные
                    if (pinnedChats.includes(a.id) && !pinnedChats.includes(b.id)) return -1;
                    if (!pinnedChats.includes(a.id) && pinnedChats.includes(b.id)) return 1;
                    
                    // Избранное всегда сверху закрепленных
                    if (a.isFavorite && !b.isFavorite) return -1;
                    if (!a.isFavorite && b.isFavorite) return 1;
                    
                    // По последнему сообщению
                    const aLast = messages[a.id]?.[messages[a.id].length - 1]?.timestamp || 0;
                    const bLast = messages[b.id]?.[messages[b.id].length - 1]?.timestamp || 0;
                    return bLast - aLast;
                });
            } else if (currentTab === 'public') {
                items = publicChats;
            } else if (currentTab === 'users') {
                items = allUsers.filter(u => u.id !== currentUser.id).map(user => ({
                    ...user,
                    online: onlineUsers[user.id]?.online || false,
                    dnd: onlineUsers[user.id]?.dnd || user.dnd,
                    isCreator: user.username === CREATOR_USERNAME
                }));
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                items = items.filter(item => 
                    (item.name || item.username || '').toLowerCase().includes(searchTerm)
                );
            }
            
            list.innerHTML = items.map(item => {
                if (currentTab === 'users') return renderUserItem(item);
                return renderChatItem(item);
            }).join('');
        }

        function renderChatItem(chat) {
            const lastMsg = messages[chat.id]?.[messages[chat.id].length - 1];
            const unread = unreadCounts[chat.id] || 0;
            const isPinned = pinnedChats.includes(chat.id);
            
            return `
                <div class="chat-item ${isPinned ? 'pinned' : ''} ${chat.isFavorite ? 'favorite' : ''} ${currentChat?.id === chat.id ? 'active' : ''}" onclick="joinChat(${JSON.stringify(chat).replace(/"/g, '&quot;')})">
                    <div class="chat-avatar">${chat.avatar || '💬'}</div>
                    <div class="chat-details">
                        <div class="chat-name-row">
                            <span class="chat-name">${chat.name}</span>
                            <span class="pin-icon ${isPinned ? 'pinned' : ''}" onclick="event.stopPropagation(); togglePinChat('${chat.id}')">📌</span>
                        </div>
                        <div class="chat-status-row">
                            ${chat.password ? '<span class="status-text">🔒 Закрытый</span>' : ''}
                            ${chat.isFavorite ? '<span class="status-text">⭐ Избранное</span>' : ''}
                        </div>
                        <div class="chat-last-message">${lastMsg?.text || chat.description || 'Нет сообщений'}</div>
                    </div>
                    <div class="chat-meta">
                        <div class="chat-time">${lastMsg?.time || ''}</div>
                        ${unread > 0 ? `<div class="chat-unread">${unread}</div>` : ''}
                    </div>
                </div>
            `;
        }

        function renderUserItem(user) {
            const statusClass = user.online ? (user.dnd ? 'dnd' : 'online') : 'offline';
            const statusText = user.online ? (user.dnd ? 'Не беспокоит' : 'В сети') : 'Не в сети';
            
            return `
                <div class="chat-item" onclick="createPrivateChat({id: ${user.id}, name: '${user.username}', avatar: '${user.avatar || '👤'}'})">
                    <div class="chat-avatar">${user.avatar || '👤'}</div>
                    <div class="chat-details">
                        <div class="chat-name-row">
                            <span class="chat-name">${user.username}</span>
                            ${user.isCreator ? '<span class="badge creator">СОЗДАТЕЛЬ</span>' : ''}
                        </div>
                        <div class="chat-status-row">
                            <span class="status-dot ${statusClass}"></span>
                            <span class="status-text">${statusText}</span>
                        </div>
                        <div class="chat-last-message">${user.bio || ''}</div>
                    </div>
                </div>
            `;
        }

        function togglePinChat(chatId) {
            if (pinnedChats.includes(chatId)) {
                pinnedChats = pinnedChats.filter(id => id !== chatId);
            } else {
                pinnedChats.push(chatId);
            }
            localStorage.setItem('pinnedChats', JSON.stringify(pinnedChats));
            updateChatsList();
        }

        function joinChat(chat) {
            if (chat.password && (!chat.members || !chat.members.includes(currentUser.id))) {
                pendingChatToJoin = chat;
                document.getElementById('joinChatModal').classList.add('active');
                return;
            }
            
            currentChat = chat;
            
            if (!myChats.find(c => c.id === chat.id) && !chat.isFavorite) {
                myChats.push(chat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                subscribeToChat(chat);
            }
            
            document.getElementById('currentChatName').innerHTML = chat.name;
            document.getElementById('chatHeaderAvatar').textContent = chat.avatar || '💬';
            
            if (messages[chat.id]) {
                messages[chat.id].sort((a, b) => a.timestamp - b.timestamp);
            }
            
            unreadCounts[chat.id] = 0;
            updateAppBadge();
            
            renderMessages();
            updateChatsList();
            updateChatStatus();
            markMessagesAsRead(chat.id);
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        function createPrivateChat(user) {
            const chatId = [currentUser.id, user.id].sort().join('-');
            let privateChat = myChats.find(c => c.id === chatId);
            
            if (!privateChat) {
                privateChat = {
                    id: chatId,
                    name: user.name,
                    avatar: user.avatar,
                    isPrivate: true,
                    members: [currentUser.id, user.id]
                };
                
                myChats.push(privateChat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                subscribeToChat(privateChat);
            }
            
            joinChat(privateChat);
        }

        function updateChatStatus() {
            if (!currentChat || currentChat.isFavorite) return;
            
            const memberId = currentChat.members?.find(id => id !== currentUser.id);
            if (!memberId) return;
            
            const user = onlineUsers[memberId];
            const statusEl = document.getElementById('chatStatus');
            
            if (user?.online) {
                if (user.dnd) {
                    statusEl.innerHTML = '<span class="status-dot dnd"></span> Не беспокоит';
                } else {
                    statusEl.innerHTML = '<span class="status-dot online"></span> В сети';
                }
            } else {
                statusEl.innerHTML = '<span class="status-dot offline"></span> Не в сети';
            }
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
            
            if (!currentChat || !messages[currentChat.id]?.length) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">Нет сообщений</div>';
                return;
            }
            
            container.innerHTML = messages[currentChat.id].map(msg => {
                const status = messageStatuses[msg.id]?.status || (msg.sender === currentUser.id ? 'sent' : 'delivered');
                
                return `
                    <div class="message ${msg.type}">
                        ${msg.type === 'in' ? `
                            <div class="message-sender">
                                ${msg.senderName}
                                ${msg.senderName === CREATOR_USERNAME ? '<span class="badge creator">СОЗДАТЕЛЬ</span>' : ''}
                            </div>
                        ` : ''}
                        <div class="message-bubble">${msg.text}</div>
                        <div class="message-footer">
                            <span class="message-time">${msg.time}</span>
                            ${msg.type === 'out' ? `
                                <span class="message-status">
                                    <span class="status-icon ${status}">
                                        ${status === 'pending' ? '⏳' : status === 'sent' ? '✓' : status === 'delivered' ? '✓✓' : '✓✓'}
                                    </span>
                                </span>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            if (isAtBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function saveMessagesDebounced() {
            clearTimeout(window.saveTimeout);
            window.saveTimeout = setTimeout(() => {
                localStorage.setItem('messages', JSON.stringify(messages));
                localStorage.setItem('messageStatuses', JSON.stringify(messageStatuses));
                localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
            }, 500);
        }

        function startHeartbeat() {
            setInterval(() => {
                if (ably && currentUser) {
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.update({ 
                        name: currentUser.name,
                        avatar: currentUser.avatar,
                        isCreator: currentUser.name === CREATOR_USERNAME,
                        dnd: currentUser.dnd,
                        lastSeen: Date.now()
                    });
                }
            }, 30000);
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const { data } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password)
                .single();
            
            if (data) {
                currentUser = {
                    id: data.id,
                    name: data.username,
                    avatar: data.avatar || '👤',
                    bio: data.bio || '',
                    dnd: data.dnd || false
                };
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('appContainer').style.display = 'flex';
                
                await loadAllUsers();
                await loadPublicChats();
                await loadAllMessages();
                
                myChats = JSON.parse(localStorage.getItem(`myChats_${currentUser.id}`)) || [];
                ensureFavoriteChat();
                
                updateProfileUI();
                initAbly();
                startHeartbeat();
                
                updateChatsList();
            } else {
                alert('Неверное имя или пароль');
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirmPassword').value;
            
            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            
            const { data } = await supabaseClient
                .from('users')
                .insert([{ username, password, avatar: '👤' }])
                .select()
                .single();
            
            if (data) {
                alert('Регистрация успешна!');
                switchAuthMode('login');
            }
        }

        async function createPublicChat() {
            const name = document.getElementById('chatNameInput').value;
            const password = document.getElementById('chatPasswordInput').value;
            const description = document.getElementById('chatDescriptionInput').value;
            
            if (!name) {
                alert('Введите название');
                return;
            }
            
            const newChat = {
                id: 'chat_' + Date.now(),
                name,
                password: password || null,
                description,
                created_by: currentUser.id,
                members: JSON.stringify([currentUser.id]),
                type: 'public'
            };
            
            const { data } = await supabaseClient.from('chats').insert([newChat]).select();
            
            if (data) {
                publicChats.push({ ...newChat, members: [currentUser.id] });
                joinChat(newChat);
                closeCreateChatModal();
            }
        }

        function joinProtectedChat() {
            const password = document.getElementById('joinPasswordInput').value;
            if (pendingChatToJoin && password === pendingChatToJoin.password) {
                pendingChatToJoin.members = [...(pendingChatToJoin.members || []), currentUser.id];
                joinChat(pendingChatToJoin);
                closeJoinChatModal();
            } else {
                alert('Неверный пароль');
            }
        }

        async function saveProfile() {
            const newName = document.getElementById('profileNameInput').value;
            const newBio = document.getElementById('profileBioInput').value;
            const dnd = document.getElementById('profileDNDCheckbox').checked;
            
            currentUser.name = newName;
            currentUser.bio = newBio;
            currentUser.dnd = dnd;
            
            await supabaseClient.from('users').update({
                username: newName,
                bio: newBio,
                dnd
            }).eq('id', currentUser.id);
            
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            updateProfileUI();
            closeProfileModal();
            
            if (ably) {
                const presenceChannel = ably.channels.get('presence');
                presenceChannel.presence.update({ 
                    name: newName,
                    avatar: currentUser.avatar,
                    isCreator: newName === CREATOR_USERNAME,
                    dnd
                });
            }
        }

        function switchAuthMode(mode) {
            document.getElementById('loginForm').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = mode === 'register' ? 'block' : 'none';
            document.querySelectorAll('.auth-tab').forEach((tab, i) => {
                tab.className = 'auth-tab' + (i === (mode === 'login' ? 0 : 1) ? ' active' : '');
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.className = 'tab' + (i === (tab === 'chats' ? 0 : tab === 'public' ? 1 : 2) ? ' active' : '');
            });
            document.getElementById('searchInput').value = '';
            updateChatsList();
        }

        function handleSearch() {
            updateChatsList();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            if (picker.style.display === 'none') {
                picker.style.display = 'flex';
                if (!picker.children.length) {
                    const emojis = ['😀','😂','😊','❤️','👍','🔥','🎉','✨','⭐','💫','🌟','🌈','🌙','☀️','⭐️','💡'];
                    picker.innerHTML = emojis.map(e => `<button class="emoji-btn" onclick="addEmoji('${e}')">${e}</button>`).join('');
                }
            } else {
                picker.style.display = 'none';
            }
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function startRecording() {
            if (!currentChat) return;
            document.getElementById('micBtn').classList.add('recording');
        }

        function stopRecording() {
            document.getElementById('micBtn').classList.remove('recording');
        }

        function cancelRecording() {
            document.getElementById('micBtn').classList.remove('recording');
        }

        function openCreateChatModal() {
            document.getElementById('createChatModal').classList.add('active');
        }

        function closeCreateChatModal() {
            document.getElementById('createChatModal').classList.remove('active');
        }

        function closeJoinChatModal() {
            document.getElementById('joinChatModal').classList.remove('active');
            pendingChatToJoin = null;
        }

        function openProfileModal() {
            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }

        function openChatUserProfile() {
            if (!currentChat || currentChat.isFavorite) return;
            
            const memberId = currentChat.members?.find(id => id !== currentUser.id);
            if (!memberId) return;
            
            const user = allUsers.find(u => u.id === memberId);
            if (user) {
                alert(`${user.username}\n${user.bio || 'Нет информации'}`);
            }
        }

        // Make functions global
        window.switchAuthMode = switchAuthMode;
        window.login = login;
        window.register = register;
        window.switchTab = switchTab;
        window.handleSearch = handleSearch;
        window.openCreateChatModal = openCreateChatModal;
        window.closeCreateChatModal = closeCreateChatModal;
        window.joinChat = joinChat;
        window.createPrivateChat = createPrivateChat;
        window.toggleSidebar = toggleSidebar;
        window.sendMessage = sendMessage;
        window.toggleEmojiPicker = toggleEmojiPicker;
        window.addEmoji = addEmoji;
        window.handleKeyPress = handleKeyPress;
        window.startRecording = startRecording;
        window.stopRecording = stopRecording;
        window.cancelRecording = cancelRecording;
        window.openProfileModal = openProfileModal;
        window.closeProfileModal = closeProfileModal;
        window.saveProfile = saveProfile;
        window.openChatUserProfile = openChatUserProfile;
        window.closeJoinChatModal = closeJoinChatModal;
        window.joinProtectedChat = joinProtectedChat;
        window.togglePinChat = togglePinChat;
        window.selectTheme = selectTheme;
    </script>
</body>
</html>
