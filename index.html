<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>case-wins · Классический раунд & 1 на 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg: #06080c;
            --panel: #0f1219;
            --card: #161b24;
            --gold: #f0b34b;
            --accent: #252b38;
            --text: #c8cdd8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: var(--text);
            width: 100vw;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
        }
        .app {
            display: flex;
            width: 100%;
            min-height: 100vh;
            gap: 6px;
            padding: 6px;
        }
        .sidebar {
            width: 200px;
            background: var(--panel);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #252b38;
            flex-shrink: 0;
            position: sticky;
            top: 6px;
            align-self: flex-start;
            height: fit-content;
            max-height: calc(100vh - 12px);
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1f2b;
            padding: 10px;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .profile:hover {
            background: #252b38;
        }
        .avatar-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .nav-btn {
            background: #1a1f2b;
            border: none;
            color: var(--text);
            padding: 10px 14px;
            border-radius: 22px;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }
        .nav-btn.active {
            background: var(--gold);
            color: #000;
        }
        .main-area {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 0;
            align-items: flex-start;
        }
        .classic-section {
            flex: 1;
            background: var(--card);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #2a3140;
            min-width: 0;
        }
        .classic-header {
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }
        .bank-display {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }
        .last-winner-display {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #f0b34b;
            min-height: 20px;
            margin-bottom: 4px;
        }
        .balance-display {
            font-size: 14px;
            font-weight: 700;
            color: #3acf6e;
        }
        .place-bet-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            color: #000;
            font-weight: 800;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s, opacity 0.2s;
        }
        .place-bet-btn:disabled {
            background: #5c6170;
            color: #222;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .roulette-wrapper {
            position: relative;
            height: 70px;
            background: transparent;
            border-radius: 16px;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #252b38;
        }
        .timer-strip-bg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #0d1119;
            z-index: 0;
            border-radius: 14px;
            overflow: hidden;
        }
        .timer-strip-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #f0b34b, #e6953c, #c77a28);
            z-index: 1;
            border-radius: 14px 0 0 14px;
            transition: width 0.95s cubic-bezier(0.25, 0.1, 0.15, 1.0);
            box-shadow: inset 0 0 30px rgba(255, 200, 100, 0.35), 0 0 25px rgba(240, 179, 75, 0.45);
        }
        .timer-strip-glow {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 2;
            pointer-events: none;
            border-radius: 14px;
            box-shadow: inset 0 0 60px rgba(240, 179, 75, 0.2);
        }
        .timer-display {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-weight: 900;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 8px rgba(240, 179, 75, 0.8);
            pointer-events: none;
            letter-spacing: 2px;
        }
        .roulette-arrow-top {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f0b34b;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 10px rgba(240, 179, 75, 0.9);
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
            display: none;
        }
        .roulette-arrow-above {
            position: absolute;
            left: 50%;
            top: -22px;
            transform: translateX(-50%);
            font-size: 32px;
            color: #f0b34b;
            z-index: 30;
            pointer-events: none;
            text-shadow: 0 0 15px black, 0 0 10px rgba(240, 179, 75, 0.9);
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
            display: none;
        }
        .ticker-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            z-index: 3;
        }
        .ticker-track {
            display: flex;
            gap: 4px;
            position: absolute;
            left: 0;
            will-change: transform;
        }
        .ticket-avatar-small {
            width: 55px;
            height: 55px;
            background: #1e2432;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border: 2px solid #3a4052;
            flex-shrink: 0;
        }
        .winner-avatar-center {
            width: 70px;
            height: 70px;
            background: #1e2432;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: 3px solid #f0b34b;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            box-shadow: 0 0 30px rgba(240, 179, 75, 0.8), 0 0 60px rgba(240, 179, 75, 0.4);
        }
        .winner-info {
            text-align: center;
            font-weight: 800;
            color: #f0b34b;
            font-size: 14px;
            margin-top: 4px;
            display: none;
        }
        .winner-info.show {
            display: block;
        }
        .bets-table {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
        }
        .bet-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1f2b;
            border-radius: 14px;
            padding: 8px 12px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .bet-user {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .onevsone-section {
            flex: 1;
            background: var(--card);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #2a3140;
            min-width: 0;
        }
        .rooms-scroll {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }
        .room-card {
            background: #1a1f2b;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #2f3748;
        }
        .room-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn {
            background: #f0b34b;
            border: none;
            color: #000;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn:disabled {
            background: #5c6170;
            color: #222;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .inventory-panel {
            width: 200px;
            background: var(--panel);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #252b38;
            flex-shrink: 0;
            position: sticky;
            top: 6px;
            align-self: flex-start;
            height: fit-content;
            max-height: calc(100vh - 12px);
        }
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .inv-slot {
            aspect-ratio: 1;
            background: #1a1f2b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bet-input-inv {
            background: #1a1f2b;
            border: 1px solid #353d4e;
            padding: 8px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .bet-input-inv::-webkit-inner-spin-button,
        .bet-input-inv::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .bet-input-inv[type=number] {
            -moz-appearance: textfield;
        }
        .spectator-overlay,
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .spectator-card,
        .admin-card {
            background: #161b24;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 550px;
            border: 2px solid #f0b34b;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .admin-card {
            max-width: 700px;
        }
        .spec-bet-row,
        .admin-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e2432;
            border-radius: 14px;
            padding: 10px 14px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .auth-card {
            background: #161b24;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #f0b34b;
        }
        .auth-input {
            background: #1a1f2b;
            border: 1px solid #353d4e;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 150;
        }
        .profile-modal-content {
            background: #161b24;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #f0b34b;
        }
        .avatar-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            background: #1a1f2b;
            transition: border-color 0.2s;
        }
        .avatar-option.selected {
            border-color: #f0b34b;
        }
        .avatar-option:hover {
            border-color: #f0b34b;
        }
        @keyframes pulse-gold {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(240, 179, 75, 0.8), 0 0 60px rgba(240, 179, 75, 0.4);
            }
            50% {
                box-shadow: 0 0 50px rgba(240, 179, 75, 1), 0 0 90px rgba(240, 179, 75, 0.7);
            }
        }
        .winner-avatar-center {
            animation: pulse-gold 0.8s ease-in-out infinite;
        }
        .auth-error {
            color: #ff4444;
            font-size: 14px;
            text-align: center;
            display: none;
            padding: 8px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 8px;
        }
        .auth-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="authContainer"></div>
    <div class="app" id="mainApp" style="display:none;">
        <div class="sidebar">
            <div class="profile" id="profileButton">
                <span class="avatar-circle" id="profileAvatar">🐺</span>
                <div>
                    <div id="profileName">PlayerOne</div>

        <div class="main-area">
            <div class="classic-section" id="classicBlock">
                <div class="classic-header">🏆 КЛАССИЧЕСКИЙ РАУНД</div>
                <div class="last-winner-display" id="classicLastWinnerDisplay"></div>
                <div class="bank-display" id="classicBankDisplay">Банк: 0</div>
                <button class="place-bet-btn" id="classicPlaceBetBtn">🎯 ПОСТАВИТЬ</button>
                <div class="roulette-wrapper" id="rouletteWrapper">
                    <div class="roulette-arrow-above" id="rouletteArrowAbove">▼</div>
                    <div class="timer-strip-bg">
                        <div class="timer-strip-fill" id="timerStripFill"></div>
                        <div class="timer-strip-glow"></div>
                    </div>
                    <div class="timer-display" id="classicTimerDisplay">⏳ 3</div>
                    <div class="roulette-arrow-top" id="rouletteArrowTop" style="display:none;">▼</div>
                    <div class="ticker-viewport" id="tickerViewport">
                        <div class="ticker-track" id="tickerTrack"></div>
                    </div>
                </div>
                <div class="winner-info" id="classicWinnerInfo"></div>
                <div class="bets-table" id="betsTable"></div>
            </div>
            <div class="onevsone-section">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3>🎲 1 НА 1</h3>
                    <button class="btn" id="createRoomBtn">+ Создать</button>
                </div>
                <div class="rooms-scroll" id="roomsList"></div>
            </div>
        </div>
        <div class="inventory-panel">
            <h3>🎒 Инвентарь</h3>
            <div class="inv-grid">
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
                <div class="inv-slot">🔹</div>
            </div>
            <div>💰 Скины: 0</div>
            <button class="btn">Купить</button>
            <button class="btn" style="background:#3e4455;">Продать</button>
            <input type="number" class="bet-input-inv" id="classicBetInput" value="5" min="1" placeholder="Сумма ставки">
            <span style="font-size:10px;color:#7f8690;text-align:center;">Ставка для классики и 1 на 1</span>
        </div>
    </div>
    <div id="spectatorContainer"></div>
    <div id="profileModalContainer"></div>
    <div id="adminContainer"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://jwjbjdzncshylthzbwtq.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_xCVgHMfqaAI5BH7kcYuNbQ_KYZdAoRO';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const ADMIN_PASSWORD = '4321!';

            const AVAILABLE_AVATARS = ['🐺', '🦊', '🐱', '👑', '🐲', '🦁', '🐯', '🐻', '🐼', '🐨', '🐸', '🦄', '🐙', '🦑', '🐋', '🦈'];

            const state = {
                user: null,
                classicBets: [],
                classicTicketMap: null,
                classicTimer: 3,
                classicInterval: null,
                classicSpinning: false,
                classicBettingLock: false,
                rooms: [],
                nextRoomId: 1,
                roomAnimations: {},
                classicChannel: null,
                roomsChannel: null,
                balanceChannel: null,
                avatarChannel: null,
                isInGame: false,
                lastClassicWinner: null
            };

            const $ = function(id) { return document.getElementById(id); };

            function totalBank() { return state.classicBets.reduce(function(s, b) { return s + b.amount; }, 0); }

            function buildTicketMap(bets) {
                var ticketMap = [];
                var ticketIndex = 1;
                bets.forEach(function(b) {
                    var start = ticketIndex;
                    var end = ticketIndex + b.amount - 1;
                    for (var i = 0; i < b.amount; i++) {
                        ticketMap.push({ user: b.user, ticketNumber: ticketIndex });
                        ticketIndex++;
                    }
                    b.ticketStart = start;
                    b.ticketEnd = end;
                });
                return ticketMap;
            }

            function buildWeightedTicketArray(bets) {
                var tickets = [];
                if (!bets.length) {
                    tickets.push({ avatar: '❓', userId: null });
                    return tickets;
                }
                bets.forEach(function(b) {
                    for (var i = 0; i < b.amount; i++) {
                        tickets.push({ avatar: b.user.avatar, userId: b.user.id });
                    }
                });
                return tickets;
            }

            function updateTimerStrip(seconds) {
                $('timerStripFill').style.width = Math.max(0, (seconds / 3) * 100) + '%';
            }

            function updateBalanceDisplay() {
                if (state.user) $('sidebarBalance').textContent = '💰 ' + state.user.balance;
            }

            function updateLastWinnerDisplay() {
                var displayEl = $('classicLastWinnerDisplay');
                if (state.lastClassicWinner) {
                    displayEl.textContent = '🏆 Последний победитель: ' + state.lastClassicWinner.username + ' (+' + state.lastClassicWinner.wonAmount + '💰)';
                } else {
                    displayEl.textContent = '';
                }
            }

            function checkIsInGame() {
                var userInClassic = state.classicBets.some(function(b) { return b.user.id === state.user.id; });
                var userInRoom = state.rooms.some(function(r) {
                    return (r.creator.id === state.user.id || (r.opponent && r.opponent.id === state.user.id)) && r.status !== 'finished';
                });
                state.isInGame = userInClassic || userInRoom || state.classicSpinning || state.classicBettingLock;
            }

            function updateUI() {
                if (!state.user) return;
                $('profileAvatar').textContent = state.user.avatar;
                $('profileName').textContent = state.user.username;
                updateBalanceDisplay();
                updateLastWinnerDisplay();
                $('classicBankDisplay').textContent = 'Банк: ' + totalBank();
                checkIsInGame();
                renderBetsTable();
                renderRooms();
                if (!state.classicSpinning && !state.classicInterval) {
                    updateTimerStrip(3);
                    $('classicTimerDisplay').textContent = '⏳ 3';
                }
                $('classicPlaceBetBtn').disabled = state.classicBettingLock || state.classicSpinning;
            }

            function renderBetsTable() {
                var totalBankValue = totalBank() || 1;
                var userBetsMap = new Map();
                var currentTicket = 1;
                state.classicBets.forEach(function(b) {
                    var key = b.user.id;
                    if (userBetsMap.has(key)) {
                        var existing = userBetsMap.get(key);
                        existing.totalAmount += b.amount;
                        existing.ticketEnd += b.amount;
                    } else {
                        userBetsMap.set(key, {
                            user: b.user,
                            totalAmount: b.amount,
                            ticketStart: currentTicket,
                            ticketEnd: currentTicket + b.amount - 1
                        });
                    }
                    currentTicket += b.amount;
                });
                var aggregatedBets = [];
                userBetsMap.forEach(function(v) { aggregatedBets.push(v); });

                $('betsTable').innerHTML = aggregatedBets.map(function(b) {
                    var percent = ((b.totalAmount / totalBankValue) * 100).toFixed(1);
                    var isCurrentUser = state.user && b.user.id === state.user.id;
                    var ticketRange = b.ticketStart === b.ticketEnd ? String(b.ticketStart) : (b.ticketStart + '-' + b.ticketEnd);
                    return '<div class="bet-row" style="' + (isCurrentUser ? 'border: 1px solid #f0b34b;' : '') + '">' +
                        '<div class="bet-user">' +
                        '<span class="avatar-circle" style="width:30px;height:30px;font-size:16px;">' + b.user.avatar + '</span> ' +
                        '<span>' + b.user.username + (isCurrentUser ? ' (Вы)' : '') + '</span>' +
                        '</div>' +
                        '<span>' + b.totalAmount + '💰</span>' +
                        '<span>Билеты: ' + ticketRange + '</span>' +
                        '<span style="color:#f0b34b;font-weight:bold;">' + percent + '%</span>' +
                        '</div>';
                }).join('');
            }

            function animateRoulette(trackElement, viewportElement, arrowElement, weightedTickets, winnerAvatar, winnerName, winningTicket, callback) {
                if (state.roomAnimations[trackElement.id]) cancelAnimationFrame(state.roomAnimations[trackElement.id]);
                trackElement.innerHTML = '';
                var allDisplayTickets = [];
                for (var i = 0; i < 40; i++) {
                    weightedTickets.forEach(function(t) { allDisplayTickets.push(t.avatar); });
                }
                allDisplayTickets.forEach(function(av) {
                    var el = document.createElement('div');
                    el.className = 'ticket-avatar-small';
                    el.textContent = av;
                    trackElement.appendChild(el);
                });
                var pos = 0;
                var speed = 0.5;
                var startTime = Date.now();

                function step() {
                    var elapsed = Date.now() - startTime;
                    if (elapsed < 2000) {
                        speed = 0.5 + (elapsed / 2000) * 4;
                    } else if (elapsed < 5000) {
                        speed = 4.5;
                    } else if (elapsed < 15000) {
                        speed = 4.5 * (1 - (elapsed - 5000) / 10000);
                    } else {
                        var ew = document.querySelector('#' + viewportElement.id + ' .winner-avatar-center');
                        if (ew) ew.remove();
                        var winnerEl = document.createElement('div');
                        winnerEl.className = 'winner-avatar-center';
                        winnerEl.textContent = winnerAvatar;
                        winnerEl.title = winnerName + ' | Билет #' + winningTicket;
                        viewportElement.appendChild(winnerEl);
                        if (arrowElement) arrowElement.style.display = 'block';
                        if (callback) setTimeout(callback, 3000);
                        return;
                    }
                    pos -= speed;
                    trackElement.style.transform = 'translateX(' + pos + 'px)';
                    state.roomAnimations[trackElement.id] = requestAnimationFrame(step);
                }
                state.roomAnimations[trackElement.id] = requestAnimationFrame(step);
            }

            async function placeBetClassic() {
                if (state.classicSpinning || state.classicBettingLock || !state.user) return;
                var amt = parseInt($('classicBetInput').value, 10);
                if (isNaN(amt) || amt <= 0) return alert('Введите сумму ставки');
                if (state.user.balance < amt) return alert('Недостаточно монет');

                state.classicBettingLock = true;
                $('classicPlaceBetBtn').disabled = true;

                try {
                    var newBalance = state.user.balance - amt;

                    var updateResult = await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                    if (updateResult.error) {
                        state.classicBettingLock = false;
                        updateUI();
                        return alert('Ошибка баланса: ' + updateResult.error.message);
                    }

                    var betResult = await supabase.from('bets').insert([{
                        user_id: state.user.id,
                        user_name: state.user.username,
                        user_avatar: state.user.avatar,
                        amount: amt,
                        game_type: 'classic',
                        status: 'active'
                    }]).select();

                    if (betResult.error) {
                        await supabase.from('users').update({ balance: state.user.balance }).eq('id', state.user.id);
                        state.classicBettingLock = false;
                        updateUI();
                        return alert('Ошибка ставки: ' + betResult.error.message);
                    }

                    state.user.balance = newBalance;
                    updateBalanceDisplay();

                    if (betResult.data && betResult.data[0]) {
                        state.classicBets.push({
                            id: betResult.data[0].id,
                            user: { id: state.user.id, username: state.user.username, avatar: state.user.avatar },
                            amount: amt
                        });
                    }

                    state.classicBettingLock = false;
                    updateUI();

                    if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
                        startClassicCountdown();
                    }
                } catch (e) {
                    state.classicBettingLock = false;
                    updateUI();
                    alert('Ошибка сети: ' + e.message);
                }
            }

            function startClassicCountdown() {
                if (state.classicBets.length < 2) return;
                clearClassicInterval();
                state.classicTimer = 3;
                $('classicTimerDisplay').textContent = '⏳ ' + state.classicTimer;
                updateTimerStrip(state.classicTimer);
                state.classicInterval = setInterval(function() {
                    state.classicTimer--;
                    $('classicTimerDisplay').textContent = '⏳ ' + state.classicTimer;
                    updateTimerStrip(state.classicTimer);
                    if (state.classicTimer <= 0) {
                        clearClassicInterval();
                        runClassicGame();
                    }
                }, 1000);
            }

            async function runClassicGame() {
                state.classicSpinning = true;
                state.classicBettingLock = true;
                $('classicPlaceBetBtn').disabled = true;
                $('classicWinnerInfo').classList.remove('show');
                updateTimerStrip(0);
                $('classicTimerDisplay').style.display = 'none';
                $('rouletteArrowAbove').style.display = 'none';
                $('rouletteArrowTop').style.display = 'block';

                var weightedTickets = buildWeightedTicketArray(state.classicBets);

                animateRoulette($('tickerTrack'), $('tickerViewport'), $('rouletteArrowTop'), weightedTickets, winner.user.avatar, winner.user.username, winner.ticketNumber, async function() {

                    await supabase.from('bets').update({ status: 'completed', is_winner: false }).in('id', betIds);

                    var winnerIds = state.classicBets.filter(function(b) { return b.user.id === winner.user.id; }).map(function(b) { return b.id; });
                    if (winnerIds.length) {
                        await supabase.from('bets').update({ is_winner: true, won_amount: bank }).in('id', winnerIds);
                    }

                    if (winner.user.id === state.user.id) {
                        var newBalance = state.user.balance + bank;
                        await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                        state.user.balance = newBalance;
                    }

                    state.lastClassicWinner = {
                        username: winner.user.username,
                        avatar: winner.user.avatar,
                        wonAmount: bank,
                        ticketNumber: winner.ticketNumber
                    };

                    $('classicWinnerInfo').textContent = '🏆 Победитель: ' + winner.user.username + ' (' + winner.user.avatar + ') | Билет #' + winner.ticketNumber + ' | Выигрыш: ' + bank + '💰';
                    $('classicWinnerInfo').classList.add('show');

                    state.classicBets = [];
                    state.classicSpinning = false;
                    state.classicBettingLock = false;
                    $('classicPlaceBetBtn').disabled = false;

                    $('classicTimerDisplay').textContent = '⏳ 3';

                    $('rouletteArrowTop').style.display = 'none';
                    $('rouletteArrowAbove').style.display = 'none';

            }

            async function createRoom() {
                if (!state.user) return;
                var bet = parseInt($('classicBetInput').value, 10);
                if (!bet || bet <= 0) return alert('Введите сумму ставки');
                if (state.user.balance < bet) return alert('Недостаточно средств');

                var newBalance = state.user.balance - bet;
                var updateResult = await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                if (updateResult.error) return alert('Ошибка баланса: ' + updateResult.error.message);

                state.user.balance = newBalance;
                updateBalanceDisplay();

                var roomId = Date.now();
                var betResult = await supabase.from('bets').insert([{
                    user_id: state.user.id,
                    user_name: state.user.username,
                    user_avatar: state.user.avatar,
                    amount: bet,
                    game_type: '1v1',
                    room_id: roomId,
                    status: 'active'
                }]).select();

                if (betResult.error) {
                    await supabase.from('users').update({ balance: state.user.balance + bet }).eq('id', state.user.id);
                    state.user.balance += bet;
                    updateBalanceDisplay();
                    return alert('Ошибка создания комнаты: ' + betResult.error.message);
                }

                state.rooms.push({
                    id: roomId,
                    creator: { id: state.user.id, username: state.user.username, avatar: state.user.avatar },
                    bet: bet,
                    opponent: null,
                    status: 'waiting',
                    timer: 3,
                    intervalId: null,
                    winner: null,
                    trackId: 'rt' + roomId,
                    viewportId: 'rv' + roomId,
                    arrowId: 'ra' + roomId,
                    arrowAboveId: 'raa' + roomId,
                    betIds: betResult.data ? [betResult.data[0].id] : []
                });
                updateUI();
            }

            async function joinRoom(roomId) {
                if (!state.user) return;
                var room = state.rooms.find(function(r) { return r.id === roomId; });
                if (!room || room.status !== 'waiting' || room.creator.id === state.user.id) return;
                if (state.user.balance < room.bet) return alert('Недостаточно монет');

                var newBalance = state.user.balance - room.bet;
                var updateResult = await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                if (updateResult.error) return alert('Ошибка баланса');

                state.user.balance = newBalance;
                updateBalanceDisplay();

                var betResult = await supabase.from('bets').insert([{
                    user_id: state.user.id,
                    user_name: state.user.username,
                    user_avatar: state.user.avatar,
                    amount: room.bet,
                    game_type: '1v1',
                    room_id: roomId,
                    status: 'active'
                }]).select();

                if (betResult.error) {
                    await supabase.from('users').update({ balance: state.user.balance + room.bet }).eq('id', state.user.id);
                    state.user.balance += room.bet;
                    updateBalanceDisplay();
                    return alert('Ошибка присоединения');
                }

                room.opponent = { id: state.user.id, username: state.user.username, avatar: state.user.avatar };
                if (betResult.data) room.betIds.push(betResult.data[0].id);
                room.status = 'countdown';
                room.timer = 3;
                startRoomCountdown(room);
                updateUI();
            }

            function startRoomCountdown(room) {
                clearRoomInterval(room);
                room.intervalId = setInterval(function() {
                    room.timer--;
                    updateUI();
                    if (room.timer <= 0) {
                        clearRoomInterval(room);
                        runRoomGame(room);
                    }
                }, 1000);
            }

            async function runRoomGame(room) {
                room.status = 'spinning';
                updateUI();
                var ticketMap = buildTicketMap([
                    { user: room.creator, amount: room.bet },
                    { user: room.opponent, amount: room.bet }
                ]);
                var weightedTickets = buildWeightedTicketArray([
                    { user: room.creator, amount: room.bet },
                    { user: room.opponent, amount: room.bet }
                ]);
                var winnerTicketIndex = Math.floor(Math.random() * ticketMap.length);
                var winner = ticketMap[winnerTicketIndex];
                room.winner = winner;

                setTimeout(function() {
                    var trackEl = document.getElementById(room.trackId);
                    var viewportEl = document.getElementById(room.viewportId);
                    var arrowEl = document.getElementById(room.arrowId);
                    var arrowAboveEl = document.getElementById(room.arrowAboveId);
                    if (trackEl && viewportEl) {
                        if (arrowEl) arrowEl.style.display = 'block';
                        if (arrowAboveEl) arrowAboveEl.style.display = 'block';
                        animateRoulette(trackEl, viewportEl, arrowEl, weightedTickets, winner.user.avatar, winner.user.username, winner.ticketNumber, async function() {
                            room.status = 'finished';
                            await supabase.from('bets').update({ status: 'completed', is_winner: false }).in('id', room.betIds);
                            await supabase.from('bets').update({ is_winner: true, won_amount: room.bet * 2 }).eq('room_id', room.id).eq('user_id', winner.user.id);

                            if (room.winner.user.id === state.user.id) {
                                var newBalance = state.user.balance + room.bet * 2;
                                await supabase.from('users').update({ balance: newBalance }).eq('id', state.user.id);
                                state.user.balance = newBalance;
                            }
                            updateBalanceDisplay();
                            updateUI();
                            setTimeout(function() {
                                if (arrowAboveEl) arrowAboveEl.style.display = 'none';
                                state.rooms = state.rooms.filter(function(r) { return r.id !== room.id; });
                                updateUI();
                            }, 5000);
                        });
                    }
                }, 100);
            }

                    room.intervalId = null; } }

                                if (!r.error) {
                                    if (state.user && state.user.id === userId) {
                                        state.user.balance = newBalance;
                                        updateBalanceDisplay();
                                    }
                                    alert('Баланс обновлён!');
                                } else {
                                    alert('Ошибка: ' + r.error.message);
                                }
                            } catch (e) {
                                alert('Ошибка сети: ' + e.message);
                            }
                        });
                    });

                    document.getElementById('adminRefreshBtn').addEventListener('click', function() {
                        $('adminContainer').innerHTML = '';
                        openAdminPanel();
                    });

                    document.getElementById('adminClosePanelBtn').addEventListener('click', function() { $('adminContainer').innerHTML = ''; });
                } catch (e) {
                    alert('Ошибка загрузки админ панели: ' + e.message);
                }
            }

            async function registerByNickname(nickname, password) {
                try {
                    var existResult = await supabase.from('user_nicknames').select('user_id').eq('nickname', nickname).maybeSingle();
                    if (existResult.data) return { success: false, message: 'Никнейм уже занят' };

                    var newId = crypto.randomUUID();
                    var userResult = await supabase.from('users').insert([{ id: newId, username: nickname, balance: 1000, avatar: '🐺' }]);
                    if (userResult.error) return { success: false, message: 'Ошибка: ' + userResult.error.message };

                    var nickResult = await supabase.from('user_nicknames').insert([{ user_id: newId, nickname: nickname, password_hash: password }]);
                    if (nickResult.error) {
                        await supabase.from('users').delete().eq('id', newId);
                        return { success: false, message: 'Ошибка: ' + nickResult.error.message };
                    }
                    return { success: true, user: { id: newId, username: nickname, balance: 1000, avatar: '🐺' } };
                } catch (e) {
                    return { success: false, message: 'Ошибка сети: ' + e.message };
                }
            }

            async function loginByNickname(nickname, password) {
                try {
                    var nickResult = await supabase.from('user_nicknames').select('user_id, password_hash').eq('nickname', nickname).maybeSingle();
                    if (!nickResult.data || nickResult.data.password_hash !== password) return { success: false, message: 'Неверный никнейм или пароль' };

                    var userResult = await supabase.from('users').select('*').eq('id', nickResult.data.user_id).single();
                    if (!userResult.data) return { success: false, message: 'Пользователь не найден' };

                    return {
                        success: true,
                        user: { id: userResult.data.id, username: userResult.data.username, balance: userResult.data.balance, avatar: userResult.data.avatar }
                    };
                } catch (e) {
                    return { success: false, message: 'Ошибка сети: ' + e.message };
                }
            }

            function showAuthForm() {
                $('authContainer').innerHTML =
                    '<div class="auth-overlay"><div class="auth-card">' +
                    '<h2 style="text-align:center;color:#f0b34b;">🎰 case-wins</h2>' +
                    '<p style="text-align:center;color:#7f8690;font-size:14px;">Вход по никнейму</p>' +
                    '<div class="auth-error" id="authError"></div>' +
                    '<input type="text" class="auth-input" id="authNickname" placeholder="Никнейм" autocomplete="off" maxlength="20">' +
                    '<input type="password" class="auth-input" id="authPassword" placeholder="Пароль" maxlength="50">' +
                    '<button class="btn" id="authSignUpBtn" style="padding:12px;font-size:16px;">📝 Регистрация</button>' +
                    '<button class="btn" id="authSignInBtn" style="padding:12px;font-size:16px;background:#4a5068;">🔑 Войти</button>' +
                    '</div></div>';

                var errDiv = document.getElementById('authError');
                var showErr = function(m) { errDiv.textContent = m;
                    errDiv.classList.add('show');
                    setTimeout(function() { errDiv.classList.remove('show'); }, 3000); };

                var doAuth = async function(isReg) {
                    var nick = document.getElementById('authNickname').value.trim();
                    var pass = document.getElementById('authPassword').value;
                    if (!nick || !pass) return showErr('Заполните все поля');
                    if (isReg && nick.length < 3) return showErr('Никнейм от 3 символов');
                    if (isReg && pass.length < 4) return showErr('Пароль от 4 символов');

                    var result = isReg ? await registerByNickname(nick, pass) : await loginByNickname(nick, pass);
                    if (result.success) {
                        state.user = result.user;
                        localStorage.setItem('casewins_session', JSON.stringify({ userId: state.user.id, username: state.user.username, password: pass }));
                        $('authContainer').innerHTML = '';
                        $('mainApp').style.display = 'flex';
                        await loadGameData();
                        initRealtime();
                        updateUI();
                    } else {
                        showErr(result.message);
                    }
                };

                document.getElementById('authSignUpBtn').addEventListener('click', function() { doAuth(true); });
                document.getElementById('authSignInBtn').addEventListener('click', function() { doAuth(false); });

                var passInput = document.getElementById('authPassword');
                if (passInput) passInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') doAuth(false); });

                var nickInput = document.getElementById('authNickname');
                if (nickInput) nickInput.focus();
            }

            async function loadGameData() {
                try {
                    var betsResult = await supabase.from('bets').select('*').eq('status', 'active');
                    if (!betsResult.data || betsResult.error) return;

                    state.classicBets = [];
                    var roomMap = new Map();

                    betsResult.data.forEach(function(bet) {
                        if (bet.game_type === 'classic') {
                            state.classicBets.push({
                                id: bet.id,
                                user: { id: bet.user_id, username: bet.user_name, avatar: bet.user_avatar },
                                amount: bet.amount
                            });
                        } else if (bet.game_type === '1v1') {
                            var rid = bet.room_id;
                            if (!roomMap.has(rid)) {
                                roomMap.set(rid, {
                                    id: rid,
                                    bet: bet.amount,
                                    betIds: [],
                                    status: 'waiting',
                                    creator: null,
                                    opponent: null,
                                    timer: 3,
                                    intervalId: null,
                                    winner: null,
                                    trackId: 'rt' + rid,
                                    viewportId: 'rv' + rid,
                                    arrowId: 'ra' + rid,
                                    arrowAboveId: 'raa' + rid
                                });
                            }
                            var room = roomMap.get(rid);
                            room.betIds.push(bet.id);
                            if (!room.creator) {
                                room.creator = { id: bet.user_id, username: bet.user_name, avatar: bet.user_avatar };
                            } else if (!room.opponent && room.creator.id !== bet.user_id) {
                                room.opponent = { id: bet.user_id, username: bet.user_name, avatar: bet.user_avatar };
                                room.status = 'countdown';
                            }
                        }
                    });

                    state.rooms = Array.from(roomMap.values());
                    var maxRoomId = 0;
                    state.rooms.forEach(function(r) { if (r.id > maxRoomId) maxRoomId = r.id; });
                    state.nextRoomId = Math.max(maxRoomId + 1, 1);

                    state.rooms.forEach(function(room) {
                        if (room.opponent && room.status === 'countdown') startRoomCountdown(room);
                    });

                    if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) {
                        startClassicCountdown();
                    }
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                }
            }

            function initRealtime() {
                if (state.classicChannel) supabase.removeChannel(state.classicChannel);
                if (state.roomsChannel) supabase.removeChannel(state.roomsChannel);
                if (state.balanceChannel) supabase.removeChannel(state.balanceChannel);
                if (state.avatarChannel) supabase.removeChannel(state.avatarChannel);

                state.classicChannel = supabase.channel('cb')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bets', filter: 'game_type=eq.classic' }, function(payload) {
                        var b = payload.new;
                        if (b.status === 'active' && !state.classicBets.some(function(x) { return x.id === b.id; })) {
                            state.classicBets.push({ id: b.id, user: { id: b.user_id, username: b.user_name, avatar: b.user_avatar }, amount: b.amount });
                            updateUI();
                            if (state.classicBets.length >= 2 && !state.classicInterval && !state.classicSpinning) startClassicCountdown();
                        }
                    })
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bets', filter: 'game_type=eq.classic' }, function(payload) {
                        if (payload.new.status === 'completed') {
                            state.classicBets = state.classicBets.filter(function(b) { return b.id !== payload.new.id; });
                            updateUI();
                            if (!state.classicBets.length) {
                                clearClassicInterval();
                                state.classicSpinning = false;
                                state.classicBettingLock = false;
                                $('classicPlaceBetBtn').disabled = false;
                                $('classicTimerDisplay').style.display = 'block';
                                $('classicTimerDisplay').textContent = '⏳ 3';
                                updateTimerStrip(3);
                                $('rouletteArrowTop').style.display = 'none';
                                $('rouletteArrowAbove').style.display = 'none';
                                var ew = document.querySelector('#tickerViewport .winner-avatar-center');
                                if (ew) ew.remove();
                                $('tickerTrack').innerHTML = '';
                                $('tickerTrack').style.transform = 'translateX(0px)';
                                $('classicWinnerInfo').classList.remove('show');
                            }
                        }
                    }).subscribe();

                state.roomsChannel = supabase.channel('rv')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bets', filter: 'game_type=eq.1v1' }, function(payload) {
                        var b = payload.new;
                        if (b.status !== 'active') return;
                        var room = state.rooms.find(function(r) { return r.id === b.room_id; });
                        if (!room) {
                            state.rooms.push({
                                id: b.room_id,
                                bet: b.amount,
                                betIds: [b.id],
                                status: 'waiting',
                                creator: { id: b.user_id, username: b.user_name, avatar: b.user_avatar },
                                opponent: null,
                                timer: 3,
                                intervalId: null,
                                winner: null,
                                trackId: 'rt' + b.room_id,
                                viewportId: 'rv' + b.room_id,
                                arrowId: 'ra' + b.room_id,
                                arrowAboveId: 'raa' + b.room_id
                            });
                            state.nextRoomId = Math.max(state.nextRoomId, b.room_id + 1);
                            updateUI();
                        } else if (room.status === 'waiting' && room.creator.id !== b.user_id) {
                            room.opponent = { id: b.user_id, username: b.user_name, avatar: b.user_avatar };
                            room.betIds.push(b.id);
                            room.status = 'countdown';
                            room.timer = 3;
                            startRoomCountdown(room);
                            updateUI();
                        }
                    })
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bets', filter: 'game_type=eq.1v1' }, function(payload) {
                        if (payload.new.status === 'completed') {
                            var room = state.rooms.find(function(r) { return r.betIds.includes(payload.new.id); });
                            if (room && room.status === 'finished') {
                                state.rooms = state.rooms.filter(function(r) { return r.id !== room.id; });
                                updateUI();
                            }
                        }
                    }).subscribe();

                if (state.user) {
                    state.balanceChannel = supabase.channel('bl')
                        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: 'id=eq.' + state.user.id }, function(payload) {
                            if (payload.new.balance !== state.user.balance) {
                                state.user.balance = payload.new.balance;
                                updateBalanceDisplay();
                            }
                        }).subscribe();

                    state.avatarChannel = supabase.channel('av')
                        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: 'id=eq.' + state.user.id }, function(payload) {
                            if (payload.new.avatar !== state.user.avatar) {
                                state.user.avatar = payload.new.avatar;
                                $('profileAvatar').textContent = state.user.avatar;
                            }
                        }).subscribe();
                }
            }

            async function restoreSession() {
                var saved = localStorage.getItem('casewins_session');
                if (!saved) return false;
                try {
                    var data = JSON.parse(saved);
                    var result = await loginByNickname(data.username, data.password);
                    if (result.success) {
                        state.user = result.user;
                        $('mainApp').style.display = 'flex';
                        await loadGameData();
                        initRealtime();
                        updateUI();
                        return true;
                    }
                } catch (e) {}
                localStorage.removeItem('casewins_session');
                return false;
            }

            $('createRoomBtn').addEventListener('click', createRoom);
            $('profileButton').addEventListener('click', showProfileModal);

            updateTimerStrip(3);
            (async function() { if (!await restoreSession()) showAuthForm(); })();
        })();
    </script>
