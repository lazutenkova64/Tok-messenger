<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Thunder - Tumble Slot</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --gold: #ffd700;
            --red: #e63946;
            --dark-gold: #b8860b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        body.zeus-rage {
            animation: rageBg 0.4s ease-in-out forwards;
        }

        @keyframes rageBg {
            0% { background: var(--bg); }
            50% { background: #2d0a0a; }
            100% { background: #1a0800; }
        }

        .game-container {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        /* ---- ЛЕВАЯ ПАНЕЛЬ (счетчик множителя в бонусе) ---- */
        .left-panel {
            width: 80px;
            background: linear-gradient(180deg, #1a1a3a 0%, #0d0d2b 100%);
            border: 2px solid #3a3a6a;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 10px;
            transition: all 0.3s;
        }

        .left-panel.inactive {
            opacity: 0.3;
            border-color: #2a2a4a;
        }

        .left-panel .panel-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .left-panel .multiplier-counter {
            color: #ffd700;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            transition: all 0.2s;
        }

        .left-panel .multiplier-counter.pulse {
            animation: counterPulse 0.3s ease-out;
        }

        @keyframes counterPulse {
            0% { transform: scale(1.6); color: #fff; }
            100% { transform: scale(1); color: #ffd700; }
        }

        /* ---- ОСНОВНОЕ ПОЛЕ ---- */
        .main-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 10px;
        }

        .game-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 3px;
        }

        .freespin-badge {
            background: linear-gradient(135deg, #e63946, #ff6b6b);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            animation: badgeGlow 1.5s ease-in-out infinite;
            display: none;
        }

        .freespin-badge.active {
            display: block;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(230, 57, 70, 0.5); }
            50% { box-shadow: 0 0 30px rgba(230, 57, 70, 0.9); }
        }

        .freespin-counter {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
        }

        .freespin-counter span {
            color: #fff;
            font-size: 24px;
        }

        /* ---- Canvas ---- */
        canvas {
            border: 3px solid #4a3a2a;
            border-radius: 15px;
            background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s;
        }

        body.zeus-rage canvas {
            box-shadow: 0 0 60px rgba(255, 80, 0, 0.6), inset 0 0 80px rgba(200, 50, 0, 0.3);
            border-color: #8b0000;
        }

        /* ---- ПРАВАЯ ПАНЕЛЬ (Зевс) ---- */
        .right-panel {
            width: 120px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .zeus-container {
            position: relative;
            width: 100%;
            height: 250px;
        }

        .zeus-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 200px;
            background: linear-gradient(180deg, #e8d5b7 0%, #c4a882 60%, #8b7355 100%);
            border-radius: 25px 25px 5px 5px;
            transition: transform 0.2s;
        }

        .zeus-head {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #f0e0c0 0%, #c4a882 100%);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .zeus-beard {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 25px;
            background: #d4c4a8;
            border-radius: 0 0 15px 15px;
        }

        .zeus-crown {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: #ffd700;
            clip-path: polygon(0% 100%, 10% 20%, 30% 0%, 50% 40%, 70% 0%, 90% 20%, 100% 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
        }

        .zeus-arm {
            position: absolute;
            top: 30px;
            right: -35px;
            width: 25px;
            height: 70px;
            background: linear-gradient(180deg, #e8d5b7, #c4a882);
            border-radius: 10px;
            transform-origin: top center;
            transform: rotate(-30deg);
            transition: transform 0.4s ease-in-out;
        }

        .zeus-arm.raised {
            transform: rotate(-140deg);
        }

        .zeus-lightning {
            position: absolute;
            top: -10px;
            right: -40px;
            width: 6px;
            height: 30px;
            background: #fff;
            border-radius: 3px;
            box-shadow: 0 0 20px #fff, 0 0 40px #ffd700, 0 0 60px #ff8c00;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .zeus-lightning.active {
            opacity: 1;
            animation: lightningFlash 0.2s ease-out;
        }

        @keyframes lightningFlash {
            0% { opacity: 1; height: 30px; }
            50% { opacity: 0.8; height: 80px; }
            100% { opacity: 0; height: 10px; }
        }

        /* ---- НИЖНЯЯ ПАНЕЛЬ ---- */
        .bottom-panel {
            display: flex;
            align-items: center;
            gap: 25px;
            background: linear-gradient(180deg, #1a1a3a, #0d0d2b);
            border: 2px solid #3a3a6a;
            border-radius: 40px;
            padding: 12px 30px;
        }

        .win-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .win-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .win-amount {
            color: #ffd700;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: all 0.1s;
            min-width: 120px;
            text-align: center;
        }

        .win-amount.counting {
            animation: winCount 0.1s ease-out;
        }

        @keyframes winCount {
            0% { transform: scale(1.15); color: #fff; }
            100% { transform: scale(1); color: #ffd700; }
        }

        .bet-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bet-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bet-amount {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
        }

        .btn-spin {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #e63946, #c0392b);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(230, 57, 70, 0.4);
            text-transform: uppercase;
        }

        .btn-spin:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(230, 57, 70, 0.7);
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.2);
        }

        /* ---- ВСПЛЫВАЮЩИЕ МНОЖИТЕЛИ ---- */
        .orb-popup {
            position: absolute;
            font-size: 22px;
            font-weight: 900;
            pointer-events: none;
            animation: orbFloat 1.8s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        @keyframes orbFloat {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.4); opacity: 1; }
            70% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(0.7); opacity: 0; }
        }

        /* ---- ЧАСТИЦЫ ---- */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 20;
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                gap: 10px;
            }
            .left-panel {
                width: 100%;
                flex-direction: row;
                height: 60px;
                padding: 10px;
            }
            .right-panel {
                display: none;
            }
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Левая панель: накопительный множитель (бонус) -->
        <div class="left-panel inactive" id="leftPanel">
            <div class="panel-label">Total<br>Multiplier</div>
            <div class="multiplier-counter" id="totalMultiplierDisplay">1x</div>
        </div>

        <!-- Основная область -->
        <div class="main-area" id="mainArea">
            <div class="game-header">
                <div class="game-title">⚡ ZEUS THUNDER ⚡</div>
                <div class="freespin-badge" id="freespinBadge">
                    FREE SPINS <span id="freespinCountDisplay">15</span>
                </div>
            </div>
            <canvas id="gameCanvas" width="600" height="500"></canvas>
            <div class="bottom-panel">
                <div class="win-display">
                    <div class="win-label">Выигрыш</div>
                    <div class="win-amount" id="winDisplay">0</div>
                </div>
                <div class="bet-display">
                    <div class="bet-label">Ставка</div>
                    <div class="bet-amount" id="betDisplay">1.00</div>
                </div>
                <button class="btn-spin" id="btnSpin">SPIN</button>
            </div>
        </div>

        <!-- Правая панель: Зевс -->
        <div class="right-panel">
            <div class="zeus-container" id="zeusContainer">
                <div class="zeus-body">
                    <div class="zeus-head">
                        <div class="zeus-crown"></div>
                        <div class="zeus-beard"></div>
                    </div>
                    <div class="zeus-arm" id="zeusArm"></div>
                </div>
                <div class="zeus-lightning" id="zeusLightning"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== КОНСТАНТЫ ====================
        const COLS = 6;
        const ROWS = 5;
        const CELL_SIZE = 80;
        const PADDING = 10;
        const GRID_OFFSET_X = 40;
        const GRID_OFFSET_Y = 40;
        const SYMBOL_SIZE = 55;

        // Типы символов
        const SYMBOLS = {
            LOW: ['stone_1', 'stone_2', 'stone_3', 'stone_4', 'stone_5'],
            MID: ['cup', 'ring'],
            HIGH: ['hourglass', 'crown'],
            SCATTER: 'zeus_scatter'
        };

        const ALL_SYMBOLS = [...SYMBOLS.LOW, ...SYMBOLS.MID, ...SYMBOLS.HIGH, SYMBOLS.SCATTER];

        // Таблица выплат (Scatter Pays: количество -> множитель ставки)
        const PAYTABLE = {
            stone_1: { 8: 2, 10: 5, 12: 10 },
            stone_2: { 8: 2, 10: 5, 12: 10 },
            stone_3: { 8: 3, 10: 6, 12: 12 },
            stone_4: { 8: 3, 10: 6, 12: 12 },
            stone_5: { 8: 4, 10: 8, 12: 15 },
            cup: { 8: 5, 10: 12, 12: 25 },
            ring: { 8: 5, 10: 12, 12: 25 },
            hourglass: { 8: 10, 10: 25, 12: 50 },
            crown: { 8: 15, 10: 40, 12: 100 },
            zeus_scatter: { 4: 3, 5: 10, 6: 50 } // Скаттер от 4 штук
        };

        // Множители для сфер
        const ORB_MULTIPLIERS = [2, 3, 4, 5, 8, 10, 12, 15, 20, 25, 50, 100, 250, 500];

        // Цвета для символов
        const SYMBOL_COLORS = {
            stone_1: '#8e44ad',
            stone_2: '#2980b9',
            stone_3: '#27ae60',
            stone_4: '#f39c12',
            stone_5: '#e74c3c',
            cup: '#3498db',
            ring: '#f1c40f',
            hourglass: '#e67e22',
            crown: '#e74c3c',
            zeus_scatter: '#ffd700'
        };

        const SYMBOL_EMOJIS = {
            stone_1: '💎',
            stone_2: '🔮',
            stone_3: '🟢',
            stone_4: '🔥',
            stone_5: '💥',
            cup: '🏆',
            ring: '💍',
            hourglass: '⏳',
            crown: '👑',
            zeus_scatter: '⚡'
        };

        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        const GameStateEnum = {
            IDLE: 'IDLE',
            SPINNING: 'SPINNING',
            TUMBLING: 'TUMBLING',
            WIN_ANIMATION: 'WIN_ANIMATION',
            BONUS_TRANSITION: 'BONUS_TRANSITION'
        };

        class SlotEngine {
            constructor() {
                // Сетка: grid[row][col] = { symbol, y, targetY, velocity, scale, opacity, isWinning, hasOrb, orbMultiplier }
                this.grid = this.createEmptyGrid();
                this.state = GameStateEnum.IDLE;
                this.bet = 1.0;
                this.totalWin = 0;
                this.displayedWin = 0;
                this.winAnimationId = null;

                // Бонусный режим
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1; // Накопительный множитель

                // Сферы на текущем поле
                this.activeOrbs = []; // { row, col, multiplier, color }

                // Для анимаций
                this.tumbleDelay = 0;
                this.tumbleCheckTimer = null;
                this.spinAnimationFrame = null;
                this.particles = [];

                // Зевс
                this.zeusArmRaised = false;
                this.zeusLightningActive = false;

                // Инициализация
                this.initGrid();
            }

            createEmptyGrid() {
                const grid = [];
                for (let r = 0; r < ROWS; r++) {
                    grid[r] = [];
                    for (let c = 0; c < COLS; c++) {
                        grid[r][c] = {
                            symbol: null,
                            y: -100 - r * 60, // Начало сверху
                            targetY: GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2,
                            velocity: 0,
                            scale: 1,
                            opacity: 1,
                            isWinning: false,
                            hasOrb: false,
                            orbMultiplier: 1
                        };
                    }
                }
                return grid;
            }

            // Заполнить сетку случайными символами (без начальной анимации)
            initGrid() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        this.grid[r][c].symbol = this.randomSymbol();
                        this.grid[r][c].y = this.grid[r][c].targetY;
                        this.grid[r][c].scale = 1;
                        this.grid[r][c].opacity = 1;
                        this.grid[r][c].isWinning = false;
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                    }
                }
            }

            randomSymbol() {
                const rand = Math.random();
                if (rand < 0.03) return SYMBOLS.SCATTER;
                if (rand < 0.10) return SYMBOLS.HIGH[Math.floor(Math.random() * SYMBOLS.HIGH.length)];
                if (rand < 0.25) return SYMBOLS.MID[Math.floor(Math.random() * SYMBOLS.MID.length)];
                return SYMBOLS.LOW[Math.floor(Math.random() * SYMBOLS.LOW.length)];
            }

            // Сброс всех орбов
            clearOrbs() {
                this.activeOrbs = [];
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                    }
                }
            }

            // ==================== ПОИСК ГРУПП ====================
            findGroups() {
                const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
                const groups = [];

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (visited[r][c] || !this.grid[r][c].symbol) continue;
                        const symbol = this.grid[r][c].symbol;
                        const group = [];
                        const stack = [{ r, c }];

                        while (stack.length > 0) {
                            const { r: cr, c: cc } = stack.pop();
                            if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
                            if (visited[cr][cc]) continue;
                            if (this.grid[cr][cc].symbol !== symbol) continue;

                            visited[cr][cc] = true;
                            group.push({ r: cr, c: cc });

                            // 4 направления
                            stack.push({ r: cr - 1, c: cc });
                            stack.push({ r: cr + 1, c: cc });
                            stack.push({ r: cr, c: cc - 1 });
                            stack.push({ r: cr, c: cc + 1 });
                        }

                        if (group.length >= 8 || (symbol === SYMBOLS.SCATTER && group.length >= 4)) {
                            groups.push({
                                symbol,
                                cells: group,
                                count: group.length,
                                payout: this.getPayout(symbol, group.length)
                            });
                        }
                    }
                }
                return groups;
            }

            getPayout(symbol, count) {
                const table = PAYTABLE[symbol];
                if (!table) return 0;
                // Найти ближайший порог
                const thresholds = Object.keys(table).map(Number).sort((a, b) => a - b);
                let payout = 0;
                for (const threshold of thresholds) {
                    if (count >= threshold) {
                        payout = table[threshold];
                    }
                }
                return payout * this.bet;
            }

            // ==================== TUMBLE: СДВИГ СИМВОЛОВ ====================
            applyGravity() {
                let moved = false;
                for (let c = 0; c < COLS; c++) {
                    // Снизу вверх
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (this.grid[r][c].symbol === null) {
                            // Ищем символ сверху
                            for (let above = r - 1; above >= 0; above--) {
                                if (this.grid[above][c].symbol !== null) {
                                    // Перемещаем символ вниз
                                    this.grid[r][c].symbol = this.grid[above][c].symbol;
                                    this.grid[r][c].hasOrb = this.grid[above][c].hasOrb;
                                    this.grid[r][c].orbMultiplier = this.grid[above][c].orbMultiplier;
                                    this.grid[r][c].y = this.grid[above][c].y;
                                    this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                                    this.grid[r][c].scale = this.grid[above][c].scale;
                                    this.grid[r][c].opacity = this.grid[above][c].opacity;
                                    this.grid[r][c].isWinning = false;

                                    // Очищаем верхнюю ячейку
                                    this.grid[above][c].symbol = null;
                                    this.grid[above][c].hasOrb = false;
                                    this.grid[above][c].orbMultiplier = 1;
                                    this.grid[above][c].isWinning = false;
                                    moved = true;
                                    break;
                                }
                            }
                        }
                    }
                }
                return moved;
            }

            fillEmptyCells() {
                for (let c = 0; c < COLS; c++) {
                    let emptyCount = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (this.grid[r][c].symbol === null) {
                            emptyCount++;
                        }
                    }
                    // Заполняем сверху новыми символами
                    let newSymbolIndex = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (this.grid[r][c].symbol === null) {
                            this.grid[r][c].symbol = this.randomSymbol();
                            this.grid[r][c].y = GRID_OFFSET_Y - (emptyCount - newSymbolIndex) * CELL_SIZE - 50;
                            this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                            this.grid[r][c].velocity = 0;
                            this.grid[r][c].scale = 1;
                            this.grid[r][c].opacity = 1;
                            this.grid[r][c].isWinning = false;
                            this.grid[r][c].hasOrb = false;
                            this.grid[r][c].orbMultiplier = 1;
                            newSymbolIndex++;
                        }
                    }
                }
            }

            removeWinningSymbols(groups) {
                const cellsToRemove = new Set();
                for (const group of groups) {
                    for (const cell of group.cells) {
                        cellsToRemove.add(`${cell.r},${cell.c}`);
                        this.grid[cell.r][cell.c].isWinning = true;
                    }
                }
                // Создаем частицы для выигрышных символов
                for (const key of cellsToRemove) {
                    const [r, c] = key.split(',').map(Number);
                    this.spawnParticles(
                        GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2,
                        this.grid[r][c].y,
                        SYMBOL_COLORS[this.grid[r][c].symbol] || '#fff'
                    );
                }
                // Удаляем
                setTimeout(() => {
                    for (const key of cellsToRemove) {
                        const [r, c] = key.split(',').map(Number);
                        this.grid[r][c].symbol = null;
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                        this.grid[r][c].isWinning = false;
                        this.grid[r][c].scale = 1;
                    }
                    // Сдвиг и заполнение
                    this.applyGravity();
                    this.fillEmptyCells();
                    this.state = GameStateEnum.TUMBLING;
                }, 400); // Задержка на анимацию пульсации
            }

            spawnParticles(x, y, color) {
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 / 8) * i;
                    const speed = 2 + Math.random() * 4;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 2,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                        color,
                        size: 2 + Math.random() * 3
                    });
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // Гравитация
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            // ==================== СФЕРЫ ОТ ЗЕВСА ====================
            zeusThrowOrbs() {
                // Зевс поднимает руку
                this.zeusArmRaised = true;
                document.getElementById('zeusArm').classList.add('raised');

                setTimeout(() => {
                    // Удар молнии
                    this.zeusLightningActive = true;
                    document.getElementById('zeusLightning').classList.add('active');

                    // Создаем сферы на случайных позициях
                    const orbCount = 2 + Math.floor(Math.random() * 4);
                    const newOrbs = [];
                    const usedCells = new Set();

                    for (let i = 0; i < orbCount; i++) {
                        let r, c;
                        do {
                            r = Math.floor(Math.random() * ROWS);
                            c = Math.floor(Math.random() * COLS);
                        } while (usedCells.has(`${r},${c}`) && usedCells.size < ROWS * COLS);
                        usedCells.add(`${r},${c}`);

                        const multiplier = ORB_MULTIPLIERS[Math.floor(Math.random() * ORB_MULTIPLIERS.length)];
                        const colors = ['#2ecc71', '#3498db', '#e91e90', '#ffd700'];
                        const color = colors[Math.floor(Math.random() * colors.length)];

                        this.grid[r][c].hasOrb = true;
                        this.grid[r][c].orbMultiplier = multiplier;
                        newOrbs.push({ r, c, multiplier, color });
                        this.activeOrbs.push({ r, c, multiplier, color });

                        // Визуальный эффект
                        this.spawnOrbEffect(r, c, color, multiplier);
                    }

                    // Сброс анимации Зевса
                    setTimeout(() => {
                        this.zeusArmRaised = false;
                        this.zeusLightningActive = false;
                        document.getElementById('zeusArm').classList.remove('raised');
                        document.getElementById('zeusLightning').classList.remove('active');
                    }, 400);

                }, 400);
            }

            spawnOrbEffect(r, c, color, multiplier) {
                const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                const y = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                const orbDiv = document.createElement('div');
                orbDiv.className = 'orb-popup';
                orbDiv.textContent = `${multiplier}x`;
                orbDiv.style.left = x + 'px';
                orbDiv.style.top = y + 'px';
                orbDiv.style.color = color;
                document.getElementById('mainArea').appendChild(orbDiv);
                setTimeout(() => orbDiv.remove(), 1800);
            }

            // Применение орбов к выигрышу
            applyOrbsToWin(baseWin) {
                if (this.activeOrbs.length === 0) return baseWin;

                let totalOrbMultiplier = 1;
                for (const orb of this.activeOrbs) {
                    totalOrbMultiplier += orb.multiplier;
                }

                // В бонусном режиме добавляем накопительный множитель
                if (this.isFreeSpins && baseWin > 0) {
                    // Добавляем текущие орбы в накопительный счетчик
                    for (const orb of this.activeOrbs) {
                        this.totalMultiplier += orb.multiplier;
                    }
                    totalOrbMultiplier = this.totalMultiplier;
                }

                return baseWin * totalOrbMultiplier;
            }

            // ==================== ОСНОВНОЙ ЦИКЛ ИГРЫ ====================
            async spin() {
                if (this.state !== GameStateEnum.IDLE) return;

                this.state = GameStateEnum.SPINNING;
                this.totalWin = 0;
                this.clearOrbs();

                // Анимация падения новых символов
                await this.animateInitialDrop();

                // Проверка на выигрыш
                await this.tumbleCycle();

                // Зевс может бросить сферы
                if (Math.random() < 0.4) {
                    this.zeusThrowOrbs();
                    // Ждем завершения анимации Зевса
                    await this.sleep(1000);
                }

                // Применяем орбы к финальному выигрышу
                const finalWin = this.applyOrbsToWin(this.totalWin);
                this.totalWin = finalWin;

                // Анимация счетчика выигрыша
                await this.animateWinCounter(finalWin);

                // Проверка на скаттеры для бонуса
                const scatterCount = this.countScatters();
                if (scatterCount >= 4 && !this.isFreeSpins) {
                    await this.enterBonusGame(15);
                } else if (scatterCount >= 3 && this.isFreeSpins) {
                    this.freeSpinsRemaining += 5;
                    this.updateFreespinDisplay();
                }

                // В бонусе уменьшаем счетчик
                if (this.isFreeSpins) {
                    this.freeSpinsRemaining--;
                    this.updateFreespinDisplay();
                    if (this.freeSpinsRemaining <= 0) {
                        this.exitBonusGame();
                    }
                }

                this.state = GameStateEnum.IDLE;
                this.updateSpinButton();
            }

            async animateInitialDrop() {
                // Сброс всех символов наверх
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS; r++) {
                        this.grid[r][c].symbol = this.randomSymbol();
                        this.grid[r][c].y = -100 - r * 60 - c * 20;
                        this.grid[r][c].targetY = GRID_OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                        this.grid[r][c].velocity = 0;
                        this.grid[r][c].scale = 1;
                        this.grid[r][c].opacity = 1;
                        this.grid[r][c].isWinning = false;
                        this.grid[r][c].hasOrb = false;
                        this.grid[r][c].orbMultiplier = 1;
                    }
                }

                // Падение по столбцам с задержкой
                const dropPromises = [];
                for (let c = 0; c < COLS; c++) {
                    dropPromises.push(this.dropColumn(c, c * 50));
                }
                await Promise.all(dropPromises);
                await this.sleep(300); // Пауза после остановки
            }

            dropColumn(col, delay) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const animate = () => {
                            let allSettled = true;
                            for (let r = 0; r < ROWS; r++) {
                                const cell = this.grid[r][col];
                                const target = cell.targetY;
                                const dy = target - cell.y;
                                if (Math.abs(dy) > 0.5) {
                                    allSettled = false;
                                    cell.velocity += 0.8; // Ускорение
                                    cell.y += Math.min(cell.velocity, Math.abs(dy));
                                    // Эффект отскока при достижении цели
                                    if (cell.y >= target) {
                                        cell.y = target - 8; // Отскок вверх
                                        cell.velocity = -cell.velocity * 0.3;
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                }
                            }
                            if (!allSettled) {
                                requestAnimationFrame(animate);
                            } else {
                                // Финальный отскок
                                setTimeout(() => {
                                    for (let r = 0; r < ROWS; r++) {
                                        this.grid[r][col].y = this.grid[r][col].targetY;
                                    }
                                    resolve();
                                }, 50);
                            }
                        };
                        animate();
                    }, delay);
                });
            }

            async tumbleCycle() {
                let hasWins = true;
                while (hasWins) {
                    this.state = GameStateEnum.TUMBLING;
                    await this.sleep(300); // Пауза перед проверкой

                    const groups = this.findGroups();
                    if (groups.length === 0) {
                        hasWins = false;
                        break;
                    }

                    // Суммируем выигрыш
                    let cycleWin = 0;
                    for (const group of groups) {
                        cycleWin += group.payout;
                    }
                    this.totalWin += cycleWin;

                    // Анимация выигрыша
                    this.state = GameStateEnum.WIN_ANIMATION;
                    await this.animateWinningSymbols(groups);

                    // Удаление и сдвиг
                    this.removeWinningSymbols(groups);
                    await this.sleep(500); // Ждем завершения удаления

                    // Анимация падения новых/сдвинутых символов
                    await this.animateGravityDrop();
                    await this.sleep(200);
                }
            }

            async animateWinningSymbols(groups) {
                // Пульсация выигрышных символов
                const winningCells = [];
                for (const group of groups) {
                    for (const cell of group.cells) {
                        winningCells.push(this.grid[cell.r][cell.c]);
                    }
                }

                return new Promise(resolve => {
                    const startTime = performance.now();
                    const duration = 400;

                    const pulse = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        // Эффект пульсации: увеличивается до 1.1, потом обратно
                        const scale = 1 + Math.sin(progress * Math.PI * 2) * 0.1;
                        for (const cell of winningCells) {
                            cell.scale = scale;
                        }
                        if (progress < 1) {
                            requestAnimationFrame(pulse);
                        } else {
                            for (const cell of winningCells) {
                                cell.scale = 1;
                            }
                            resolve();
                        }
                    };
                    requestAnimationFrame(pulse);
                });
            }

            async animateGravityDrop() {
                return new Promise(resolve => {
                    const animate = () => {
                        let allSettled = true;
                        for (let c = 0; c < COLS; c++) {
                            for (let r = 0; r < ROWS; r++) {
                                const cell = this.grid[r][c];
                                if (!cell.symbol) continue;
                                const target = cell.targetY;
                                const dy = target - cell.y;
                                if (Math.abs(dy) > 0.5) {
                                    allSettled = false;
                                    cell.velocity += 0.6;
                                    cell.y += Math.min(cell.velocity, Math.abs(dy));
                                    if (cell.y >= target) {
                                        cell.y = target - 5;
                                        cell.velocity = -cell.velocity * 0.25;
                                    }
                                } else {
                                    cell.y = target;
                                    cell.velocity = 0;
                                }
                            }
                        }
                        if (!allSettled) {
                            requestAnimationFrame(animate);
                        } else {
                            resolve();
                        }
                    };
                    animate();
                });
            }

            async animateWinCounter(targetWin) {
                return new Promise(resolve => {
                    const startWin = this.displayedWin;
                    const duration = 800;
                    const startTime = performance.now();

                    const count = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        // Эффект быстрого счета в начале
                        const eased = 1 - Math.pow(1 - progress, 3);
                        this.displayedWin = Math.round(startWin + (targetWin - startWin) * eased);
                        this.updateWinDisplay();

                        if (progress < 1) {
                            requestAnimationFrame(count);
                        } else {
                            this.displayedWin = Math.round(targetWin);
                            this.updateWinDisplay();
                            resolve();
                        }
                    };
                    requestAnimationFrame(count);
                });
            }

            countScatters() {
                let count = 0;
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c].symbol === SYMBOLS.SCATTER) count++;
                    }
                }
                return count;
            }

            async enterBonusGame(spins) {
                this.state = GameStateEnum.BONUS_TRANSITION;
                this.isFreeSpins = true;
                this.freeSpinsRemaining = spins;
                this.totalMultiplier = 1;
                document.getElementById('leftPanel').classList.remove('inactive');
                document.getElementById('freespinBadge').classList.add('active');
                this.updateFreespinDisplay();
                this.updateTotalMultiplierDisplay();

                // Эффект перехода
                document.body.classList.add('zeus-rage');
                await this.sleep(1500);
                document.body.classList.remove('zeus-rage');
            }

            exitBonusGame() {
                this.isFreeSpins = false;
                this.freeSpinsRemaining = 0;
                this.totalMultiplier = 1;
                document.getElementById('leftPanel').classList.add('inactive');
                document.getElementById('freespinBadge').classList.remove('active');
                this.updateTotalMultiplierDisplay();
            }

            // ==================== ВСПОМОГАТЕЛЬНЫЕ МЕТОДЫ ====================
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            updateWinDisplay() {
                const el = document.getElementById('winDisplay');
                el.textContent = this.displayedWin.toFixed(2);
                el.classList.add('counting');
                setTimeout(() => el.classList.remove('counting'), 100);
            }

            updateFreespinDisplay() {
                document.getElementById('freespinCountDisplay').textContent = this.freeSpinsRemaining;
            }

            updateTotalMultiplierDisplay() {
                const el = document.getElementById('totalMultiplierDisplay');
                el.textContent = this.totalMultiplier + 'x';
                el.classList.add('pulse');
                setTimeout(() => el.classList.remove('pulse'), 300);
            }

            updateSpinButton() {
                const btn = document.getElementById('btnSpin');
                if (this.isFreeSpins) {
                    btn.textContent = 'FREE';
                } else {
                    btn.textContent = 'SPIN';
                }
                btn.disabled = this.state !== GameStateEnum.IDLE;
            }

            // ==================== РЕНДЕРИНГ ====================
            render(ctx) {
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

                // Сетка
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = this.grid[r][c];
                        const x = GRID_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                        const y = cell.y;

                        // Ячейка фона
                        ctx.fillStyle = 'rgba(20, 20, 40, 0.6)';
                        ctx.strokeStyle = 'rgba(100, 100, 150, 0.3)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(
                            GRID_OFFSET_X + c * CELL_SIZE + 5,
                            GRID_OFFSET_Y + r * CELL_SIZE + 5,
                            CELL_SIZE - 10,
                            CELL_SIZE - 10,
                            8
                        );
                        ctx.fill();
                        ctx.stroke();

                        if (!cell.symbol) continue;

                        // Свечение для выигрышных
                        if (cell.isWinning) {
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 20;
                        }

                        // Сфера
                        if (cell.hasOrb) {
                            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                            ctx.beginPath();
                            ctx.arc(x, y, SYMBOL_SIZE / 2 + 5, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        // Символ
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.scale(cell.scale, cell.scale);
                        ctx.globalAlpha = cell.opacity;

                        // Круг символа
                        const color = SYMBOL_COLORS[cell.symbol] || '#888';
                        const gradient = ctx.createRadialGradient(0, -5, 5, 0, 0, SYMBOL_SIZE / 2);
                        gradient.addColorStop(0, this.lightenColor(color, 40));
                        gradient.addColorStop(1, color);
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(0, 0, SYMBOL_SIZE / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        // Эмодзи
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.font = `${SYMBOL_SIZE * 0.6}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#fff';
                        ctx.fillText(SYMBOL_EMOJIS[cell.symbol] || '?', 0, 2);

                        // Множитель сферы
                        if (cell.hasOrb) {
                            ctx.font = 'bold 14px Arial';
                            ctx.fillStyle = '#ffd700';
                            ctx.fillText(`x${cell.orbMultiplier}`, 0, -SYMBOL_SIZE / 2 - 10);
                        }

                        ctx.restore();
                    }
                }

                // Частицы
                for (const p of this.particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            lightenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF00) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return `rgb(${R},${G},${B})`;
            }
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const engine = new SlotEngine();

        // Polyfill roundRect
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                ctx.beginPath();
                ctx.moveTo(x + r.tl, y);
                ctx.lineTo(x + w - r.tr, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                ctx.lineTo(x + w, y + h - r.br);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                ctx.lineTo(x + r.bl, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                ctx.lineTo(x, y + r.tl);
                ctx.quadraticCurveTo(x, y, x + r.tl, y);
                ctx.closePath();
            };
        }

        // Обработчик кнопки Spin
        document.getElementById('btnSpin').addEventListener('click', () => {
            engine.spin();
        });

        // Главный цикл рендеринга
        function gameLoop() {
            engine.updateParticles();
            engine.render(ctx);
            engine.updateSpinButton();

            // Эффект ярости Зевса при больших множителях
            if (engine.activeOrbs.some(o => o.multiplier >= 50)) {
                document.body.classList.add('zeus-rage');
                setTimeout(() => document.body.classList.remove('zeus-rage'), 2000);
            }

            requestAnimationFrame(gameLoop);
        }

        // Начальный рендеринг
        engine.initGrid();
        engine.updateWinDisplay();
        engine.updateSpinButton();
        gameLoop();

        console.log('⚡ Zeus Thunder - Игровой автомат запущен!');
        console.log('Механики: Tumble (падение + группы 8+), Scatter Pays, Сферы Зевса, Free Spins с накопительным множителем');
    </script>
</body>
</html>
